id: demo-mock-bank.transfer
name: Mock Bank Transfer
org_id: default
steps:
  validate:
    id: validate
    name: Validate Request
    type: transform
    input:
      amount: "${input.amount}"
      currency: "${input.currency}"
      customer: "${input.customer}"
      reason: "${input.reason}"
      note: "${input.note}"
      requested_by: "${input.requested_by}"

  execute_low:
    id: execute_low
    name: Execute Transfer
    type: worker
    depends_on:
      - validate
    condition: "input.amount < 100"
    topic: job.demo-mock-bank.transfer
    input:
      amount: "${input.amount}"
      currency: "${input.currency}"
      customer: "${input.customer}"
      reason: "${input.reason}"
      note: "${input.note}"
    meta:
      pack_id: demo-mock-bank
      capability: demo-mock-bank.transfer
      risk_tags:
        - finance
        - transfer
        - low

  execute_review:
    id: execute_review
    name: Execute Transfer (Review)
    type: worker
    depends_on:
      - validate
    condition: "input.amount >= 100 && input.amount < 300"
    topic: job.demo-mock-bank.transfer
    input:
      amount: "${input.amount}"
      currency: "${input.currency}"
      customer: "${input.customer}"
      reason: "${input.reason}"
      note: "${input.note}"
    meta:
      pack_id: demo-mock-bank
      capability: demo-mock-bank.transfer
      risk_tags:
        - finance
        - transfer
        - review

  execute_high:
    id: execute_high
    name: Execute Transfer (High Value)
    type: worker
    depends_on:
      - validate
    condition: "input.amount >= 300"
    topic: job.demo-mock-bank.transfer
    input:
      amount: "${input.amount}"
      currency: "${input.currency}"
      customer: "${input.customer}"
      reason: "${input.reason}"
      note: "${input.note}"
    meta:
      pack_id: demo-mock-bank
      capability: demo-mock-bank.transfer
      risk_tags:
        - finance
        - transfer
        - blocked
