name: cordum

services:
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    # No host port exposure — internal service accessible via Docker network only.
    volumes:
      - ./config/nats.conf:/etc/nats/nats.conf:ro
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?error: REDIS_PASSWORD is not set}"]
    # No host port exposure — internal service accessible via Docker network only.
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  context-engine:
    image: ghcr.io/cordum-io/cordum/control-plane:${CORDUM_VERSION:-latest}-context-engine
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CORDUM_ENV: production
      REDIS_URL: "redis://:${REDIS_PASSWORD:?error: REDIS_PASSWORD is not set}@redis:6379"
      CONTEXT_ENGINE_ADDR: ":50070"
      CONTEXT_ENGINE_METRICS_ADDR: ":9094"
      CONTEXT_ENGINE_METRICS_PUBLIC: "true"
      # Redis TLS (enable when Redis is TLS-terminated):
      REDIS_TLS_INSECURE: "${REDIS_TLS_INSECURE:-true}"
      # Server TLS (enable for mTLS between services):
      # CONTEXT_ENGINE_TLS_CERT: /etc/cordum/tls/server.crt
      # CONTEXT_ENGINE_TLS_KEY: /etc/cordum/tls/server.key
    # No host port exposure — internal gRPC service accessible via Docker network only.
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50070"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  safety-kernel:
    image: ghcr.io/cordum-io/cordum/control-plane:${CORDUM_VERSION:-latest}-safety-kernel
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      CORDUM_ENV: production
      NATS_URL: "nats://nats:4222"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?error: REDIS_PASSWORD is not set}@redis:6379"
      SAFETY_KERNEL_ADDR: ":50051"
      SAFETY_POLICY_PATH: /etc/cordum/safety.yaml
      # Metrics (exposed on Docker network for Prometheus):
      SAFETY_KERNEL_METRICS_ADDR: ":9095"
      SAFETY_KERNEL_METRICS_PUBLIC: "true"
      # Redis TLS (enable when Redis is TLS-terminated):
      REDIS_TLS_INSECURE: "${REDIS_TLS_INSECURE:-true}"
      # NATS TLS (enable when NATS is TLS-terminated):
      NATS_TLS_INSECURE: "${NATS_TLS_INSECURE:-true}"
      # Policy signature verification — set SAFETY_POLICY_PUBLIC_KEY to enforce:
      SAFETY_POLICY_SIGNATURE_REQUIRED: "${SAFETY_POLICY_SIGNATURE_REQUIRED:-false}"
      # SAFETY_POLICY_PUBLIC_KEY: ${SAFETY_POLICY_PUBLIC_KEY:-}
      # Server TLS (enable for mTLS between services):
      # SAFETY_KERNEL_TLS_CERT: /etc/cordum/tls/server.crt
      # SAFETY_KERNEL_TLS_KEY: /etc/cordum/tls/server.key
    volumes:
      - ./config/safety.yaml:/etc/cordum/safety.yaml:ro
    # No host port exposure — internal gRPC service accessible via Docker network only.
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  scheduler:
    image: ghcr.io/cordum-io/cordum/control-plane:${CORDUM_VERSION:-latest}-scheduler
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      safety-kernel:
        condition: service_healthy
    environment:
      CORDUM_ENV: production
      NATS_URL: "nats://nats:4222"
      NATS_USE_JETSTREAM: "1"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?error: REDIS_PASSWORD is not set}@redis:6379"
      SAFETY_KERNEL_ADDR: "safety-kernel:50051"
      OUTPUT_POLICY_ENABLED: "${OUTPUT_POLICY_ENABLED:-true}"
      POOL_CONFIG_PATH: /etc/cordum/pools.yaml
      TIMEOUT_CONFIG_PATH: /etc/cordum/timeouts.yaml
      JOB_META_TTL: "168h"
      WORKER_SNAPSHOT_INTERVAL: "5s"
      # Metrics (exposed on Docker network for Prometheus):
      SCHEDULER_METRICS_ADDR: ":9090"
      SCHEDULER_METRICS_PUBLIC: "true"
      # Redis TLS (enable when Redis is TLS-terminated):
      REDIS_TLS_INSECURE: "${REDIS_TLS_INSECURE:-true}"
      # NATS TLS (enable when NATS is TLS-terminated):
      NATS_TLS_INSECURE: "${NATS_TLS_INSECURE:-true}"
      # Server TLS (enable for mTLS between services):
      # SCHEDULER_TLS_CERT: /etc/cordum/tls/server.crt
      # SCHEDULER_TLS_KEY: /etc/cordum/tls/server.key
    volumes:
      - ./config/pools.yaml:/etc/cordum/pools.yaml:ro
      - ./config/timeouts.yaml:/etc/cordum/timeouts.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  api-gateway:
    image: ghcr.io/cordum-io/cordum/control-plane:${CORDUM_VERSION:-latest}-api-gateway
    restart: unless-stopped
    networks:
      default:
        aliases:
          - cordum-api-gateway
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      CORDUM_ENV: production
      NATS_URL: "nats://nats:4222"
      NATS_USE_JETSTREAM: "1"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?error: REDIS_PASSWORD is not set}@redis:6379"
      SAFETY_KERNEL_ADDR: "safety-kernel:50051"
      CORDUM_API_KEY: "${CORDUM_API_KEY:?error: CORDUM_API_KEY is not set}"
      TENANT_ID: default
      API_RATE_LIMIT_RPS: "50"
      API_RATE_LIMIT_BURST: "100"
      REDIS_DATA_TTL: "24h"
      JOB_META_TTL: "168h"
      # Metrics (exposed on Docker network for Prometheus):
      GATEWAY_METRICS_ADDR: ":9092"
      GATEWAY_METRICS_PUBLIC: "true"
      # Redis TLS (enable when Redis is TLS-terminated):
      REDIS_TLS_INSECURE: "${REDIS_TLS_INSECURE:-true}"
      # NATS TLS (enable when NATS is TLS-terminated):
      NATS_TLS_INSECURE: "${NATS_TLS_INSECURE:-true}"
      # Server TLS (enable for mTLS between services):
      # GRPC_TLS_CERT: /etc/cordum/tls/server.crt
      # GRPC_TLS_KEY: /etc/cordum/tls/server.key
      # GATEWAY_HTTP_TLS_CERT: /etc/cordum/tls/server.crt
      # GATEWAY_HTTP_TLS_KEY: /etc/cordum/tls/server.key
    ports:
      - "8080:8080"
      - "8081:8081"
      # Metrics port (9092) not exposed — use internal Docker network or kubectl port-forward.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  workflow-engine:
    image: ghcr.io/cordum-io/cordum/control-plane:${CORDUM_VERSION:-latest}-workflow-engine
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      CORDUM_ENV: production
      NATS_URL: "nats://nats:4222"
      NATS_USE_JETSTREAM: "1"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?error: REDIS_PASSWORD is not set}@redis:6379"
      WORKFLOW_ENGINE_HTTP_ADDR: ":9093"
      WORKFLOW_ENGINE_SCAN_INTERVAL: "5s"
      WORKFLOW_ENGINE_RUN_SCAN_LIMIT: "200"
      # Metrics (exposed on Docker network for Prometheus):
      WORKFLOW_METRICS_ADDR: ":9096"
      WORKFLOW_METRICS_PUBLIC: "true"
      # Redis TLS (enable when Redis is TLS-terminated):
      REDIS_TLS_INSECURE: "${REDIS_TLS_INSECURE:-true}"
      # NATS TLS (enable when NATS is TLS-terminated):
      NATS_TLS_INSECURE: "${NATS_TLS_INSECURE:-true}"
      # Server TLS (enable for mTLS between services):
      # WORKFLOW_TLS_CERT: /etc/cordum/tls/server.crt
      # WORKFLOW_TLS_KEY: /etc/cordum/tls/server.key
    # No host port exposure — internal service accessible via Docker network only.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9093/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  dashboard:
    image: ghcr.io/cordum-io/cordum/dashboard:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      CORDUM_API_BASE_URL: "${CORDUM_API_BASE_URL:-}"
      CORDUM_API_KEY: "${CORDUM_API_KEY:-}"
      CORDUM_DASHBOARD_EMBED_API_KEY: "${CORDUM_DASHBOARD_EMBED_API_KEY:-false}"
      CORDUM_TENANT_ID: "${CORDUM_TENANT_ID:-default}"
      CORDUM_PRINCIPAL_ID: "${CORDUM_PRINCIPAL_ID:-}"
      CORDUM_PRINCIPAL_ROLE: "${CORDUM_PRINCIPAL_ROLE:-}"
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  nats_data:
  redis_data:
