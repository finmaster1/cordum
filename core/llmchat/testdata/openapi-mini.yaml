openapi: 3.0.0
info:
  title: Test API
  version: 1.0.0
paths:
  /api/v1/jobs:
    get:
      summary: List jobs
      operationId: listJobs
      security:
        - apiKey: []
      parameters:
        - name: limit
          in: query
          required: false
        - name: tenant_id
          in: query
          required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
        '401':
          description: Unauthorized
    post:
      summary: Submit a job
      operationId: submitJob
      security:
        - apiKey: []
      parameters:
        - name: tenant_id
          in: header
          required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
  /api/v1/audit/verify:
    get:
      summary: Verify audit chain
      operationId: verifyAudit
      security:
        - apiKey: []
      responses:
        '200':
          description: OK
        '503':
          description: Audit unavailable
