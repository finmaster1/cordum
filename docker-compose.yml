name: cordum

services:
  nats:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
    volumes:
      - ./config/nats.conf:/etc/nats/nats.conf:ro
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-cordum-dev}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cordum-dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  context-engine:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-context-engine
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cordum-dev}@redis:6379
      - CONTEXT_ENGINE_ADDR=:50070
    ports:
      - "50070:50070"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50070"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  safety-kernel:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-safety-kernel
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cordum-dev}@redis:6379
      - SAFETY_KERNEL_ADDR=:50051
      - SAFETY_POLICY_PATH=/etc/cordum/safety.yaml
    volumes:
      - ./config/safety.yaml:/etc/cordum/safety.yaml:ro
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  scheduler:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-scheduler
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      safety-kernel:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_USE_JETSTREAM=1
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cordum-dev}@redis:6379
      - SAFETY_KERNEL_ADDR=safety-kernel:50051
      - POOL_CONFIG_PATH=/etc/cordum/pools.yaml
      - TIMEOUT_CONFIG_PATH=/etc/cordum/timeouts.yaml
      - JOB_META_TTL=168h
      - WORKER_SNAPSHOT_INTERVAL=5s
    volumes:
      - ./config/pools.yaml:/etc/cordum/pools.yaml:ro
      - ./config/timeouts.yaml:/etc/cordum/timeouts.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  api-gateway:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-api-gateway
    networks:
      default:
        aliases:
          - cordum-api-gateway
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
      safety-kernel:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_USE_JETSTREAM=1
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cordum-dev}@redis:6379
      - SAFETY_KERNEL_ADDR=safety-kernel:50051
      - "CORDUM_API_KEY=${CORDUM_API_KEY:?error: CORDUM_API_KEY is not set}"
      - TENANT_ID=default
      - API_RATE_LIMIT_RPS=2000
      - API_RATE_LIMIT_BURST=4000
      - REDIS_DATA_TTL=24h
      - JOB_META_TTL=168h
      # User authentication (set CORDUM_USER_AUTH_ENABLED=true to enable)
      - CORDUM_USER_AUTH_ENABLED=${CORDUM_USER_AUTH_ENABLED:-false}
      - CORDUM_ADMIN_USERNAME=${CORDUM_ADMIN_USERNAME:-admin}
      # Required when CORDUM_USER_AUTH_ENABLED=true. Gateway refuses to start if empty.
      - CORDUM_ADMIN_PASSWORD=${CORDUM_ADMIN_PASSWORD:-}
      - CORDUM_ADMIN_EMAIL=${CORDUM_ADMIN_EMAIL:-}
    ports:
      - "8080:8080"
      - "8081:8081"
      - "9092:9092"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  workflow-engine:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-workflow-engine
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_USE_JETSTREAM=1
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cordum-dev}@redis:6379
      - WORKFLOW_ENGINE_HTTP_ADDR=:9093
      - WORKFLOW_ENGINE_SCAN_INTERVAL=5s
      - WORKFLOW_ENGINE_RUN_SCAN_LIMIT=200
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9093/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  dashboard:
    restart: unless-stopped
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      - CORDUM_API_BASE_URL=${CORDUM_API_BASE_URL:-}
      - CORDUM_API_KEY=${CORDUM_API_KEY:-}
      - CORDUM_DASHBOARD_EMBED_API_KEY=${CORDUM_DASHBOARD_EMBED_API_KEY:-false}
      - CORDUM_TENANT_ID=${CORDUM_TENANT_ID:-default}
      - CORDUM_PRINCIPAL_ID=${CORDUM_PRINCIPAL_ID:-}
      - CORDUM_PRINCIPAL_ROLE=${CORDUM_PRINCIPAL_ROLE:-}
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  nats_data:
  redis_data:
