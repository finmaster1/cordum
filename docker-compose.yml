name: cordum

# Default path: `docker compose pull && docker compose up -d` pulls every
# Cordum service image from ghcr.io/cordum-io/cordum (tag from
# ${CORDUM_VERSION:-latest}) — no source checkout or local build needed.
#
# Contributor path: `docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build`
# overrides every `image:` with a local build from this tree. The Makefile
# target `make dev-up` chains both files for convenience.

services:
  nats:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
    volumes:
      - ./config/nats.dev-tls.conf:/etc/nats/nats.conf:ro
      - ./certs:/etc/cordum/tls:ro
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:?REDIS_PASSWORD_not_set}"
      - --port
      - "0"
      - --tls-port
      - "6379"
      - --tls-cert-file
      - /etc/cordum/tls/server/tls.crt
      - --tls-key-file
      - /etc/cordum/tls/server/tls.key
      - --tls-ca-cert-file
      - /etc/cordum/tls/ca/ca.crt
      - --tls-auth-clients
      - "no"
    ports:
      - "6379:6379"
    volumes:
      - ./certs:/etc/cordum/tls:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cacert", "/etc/cordum/tls/ca/ca.crt", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD_not_set}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  context-engine:
    image: ghcr.io/cordum-io/cordum/context-engine:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-context-engine
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD_not_set}@redis:6379
      - REDIS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - REDIS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - REDIS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - REDIS_TLS_SERVER_NAME=redis
      - CONTEXT_ENGINE_ADDR=:50070
      - CONTEXT_ENGINE_TLS_CERT=/etc/cordum/tls/server/tls.crt
      - CONTEXT_ENGINE_TLS_KEY=/etc/cordum/tls/server/tls.key
    volumes:
      - ./certs:/etc/cordum/tls:ro
    ports:
      - "50400:50070"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9094/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  safety-kernel:
    image: ghcr.io/cordum-io/cordum/safety-kernel:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-safety-kernel
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=tls://nats:4222
      - NATS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - NATS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - NATS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - NATS_TLS_SERVER_NAME=nats
      - NATS_TOKEN=${NATS_TOKEN:-cordum-dev-token}
      - REDIS_URL=rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD_not_set}@redis:6379
      - REDIS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - REDIS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - REDIS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - REDIS_TLS_SERVER_NAME=redis
      - SAFETY_KERNEL_ADDR=:50051
      - SAFETY_KERNEL_TLS_CERT=/etc/cordum/tls/server/tls.crt
      - SAFETY_KERNEL_TLS_KEY=/etc/cordum/tls/server/tls.key
      - SAFETY_POLICY_PATH=/etc/cordum/safety.yaml
      - SAFETY_POLICY_RELOAD_INTERVAL=${SAFETY_POLICY_RELOAD_INTERVAL:-60s}
      - CORDUM_POLICY_SIGNING_KEY_ID=${CORDUM_POLICY_SIGNING_KEY_ID:-dev-local}
      - CORDUM_POLICY_DEV_SIGNING_SEED=${CORDUM_POLICY_DEV_SIGNING_SEED:-cordum-local-policy-signing-v1}
      - CORDUM_LICENSE_TOKEN=${CORDUM_LICENSE_TOKEN:-}
      - CORDUM_LICENSE_PUBLIC_KEY=${CORDUM_LICENSE_PUBLIC_KEY:-}
    volumes:
      - ./config/safety.yaml:/etc/cordum/safety.yaml:ro
      - ./config/safety.yaml.sig:/etc/cordum/safety.yaml.sig:ro
      - ./certs:/etc/cordum/tls:ro
    ports:
      - "50051:50051"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9095/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  scheduler:
    image: ghcr.io/cordum-io/cordum/scheduler:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-scheduler
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      safety-kernel:
        condition: service_healthy
    environment:
      # Audit chain runs unconditionally at gateway boot (task-096de016); CORDUM_AUDIT_EXPORT_TYPE now
      # controls external SIEM export only. See docs/deployment/audit-chain.md.
      - NATS_URL=tls://nats:4222
      - NATS_USE_JETSTREAM=1
      - NATS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - NATS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - NATS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - NATS_TLS_SERVER_NAME=nats
      - NATS_TOKEN=${NATS_TOKEN:-cordum-dev-token}
      - REDIS_URL=rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD_not_set}@redis:6379
      - REDIS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - REDIS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - REDIS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - REDIS_TLS_SERVER_NAME=redis
      - SAFETY_KERNEL_ADDR=safety-kernel:50051
      - SAFETY_KERNEL_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - CONTEXT_ENGINE_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - OUTPUT_POLICY_ENABLED=${OUTPUT_POLICY_ENABLED:-true}
      - POLICY_CHECK_FAIL_MODE=${POLICY_CHECK_FAIL_MODE:-closed}
      - POOL_CONFIG_PATH=/etc/cordum/pools.yaml
      - TIMEOUT_CONFIG_PATH=/etc/cordum/timeouts.yaml
      - JOB_META_TTL=168h
      - WORKER_SNAPSHOT_INTERVAL=5s
      - CORDUM_LICENSE_TOKEN=${CORDUM_LICENSE_TOKEN:-}
      - CORDUM_LICENSE_PUBLIC_KEY=${CORDUM_LICENSE_PUBLIC_KEY:-}
    volumes:
      - ./config/pools.yaml:/etc/cordum/pools.yaml:ro
      - ./config/timeouts.yaml:/etc/cordum/timeouts.yaml:ro
      - ./certs:/etc/cordum/tls:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  api-gateway:
    image: ghcr.io/cordum-io/cordum/api-gateway:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    tmpfs:
      - /tmp
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-api-gateway
    networks:
      default:
        aliases:
          - cordum-api-gateway
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
      safety-kernel:
        condition: service_healthy
    environment:
      - NATS_URL=tls://nats:4222
      - NATS_USE_JETSTREAM=1
      - NATS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - NATS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - NATS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - NATS_TLS_SERVER_NAME=nats
      - NATS_TOKEN=${NATS_TOKEN:-cordum-dev-token}
      - REDIS_URL=rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD_not_set}@redis:6379
      - REDIS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - REDIS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - REDIS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - REDIS_TLS_SERVER_NAME=redis
      - SAFETY_KERNEL_ADDR=safety-kernel:50051
      - SAFETY_KERNEL_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - CONTEXT_ENGINE_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - GATEWAY_HTTP_TLS_CERT=/etc/cordum/tls/server/tls.crt
      - GATEWAY_HTTP_TLS_KEY=/etc/cordum/tls/server/tls.key
      - GRPC_TLS_CERT=/etc/cordum/tls/server/tls.crt
      - GRPC_TLS_KEY=/etc/cordum/tls/server/tls.key
      - "CORDUM_API_KEY=${CORDUM_API_KEY:?error: CORDUM_API_KEY is not set}"
      - CORDUM_API_KEY_SOURCE=${CORDUM_API_KEY_SOURCE:-compose}
      - CORDUM_API_KEY_SOURCE_FILE=${CORDUM_API_KEY_SOURCE_FILE:-.env}
      # Wired so the gateway's startup-side guard can refuse to boot in
      # production when this flag is on (the dashboard would otherwise
      # serve the API key in plaintext at /config.json). Default `false`
      # — set to `true` only in trusted dev environments.
      - CORDUM_DASHBOARD_EMBED_API_KEY=${CORDUM_DASHBOARD_EMBED_API_KEY:-false}
      - TENANT_ID=default
      # Browser WebSocket handshakes cannot attach X-Principal-* headers.
      # In the local embedded-API-key stack, use the same dev principal that
      # /config.json exposes so the gateway can forward a trusted identity to
      # cordum-llm-chat.
      - CORDUM_PRINCIPAL_ID=${CORDUM_PRINCIPAL_ID:-dev-admin}
      - CORDUM_PRINCIPAL_ROLE=${CORDUM_PRINCIPAL_ROLE:-admin}
      - CORDUM_LLM_CHAT_URL=${CORDUM_LLM_CHAT_URL:-http://llm-chat:8090}
      # LLM chat connects through the gateway MCP surface. Keep MCP HTTP
      # enabled in the local compose stack so chat turns can list/call tools
      # instead of hanging on a 503 /mcp/sse response.
      - CORDUM_MCP_ENABLED=${CORDUM_MCP_ENABLED:-true}
      - CORDUM_MCP_TRANSPORT=${CORDUM_MCP_TRANSPORT:-http}
      # MCP SSE is a long-lived response consumed by cordum-llm-chat.
      # The gateway default WriteTimeout is intentionally short for normal
      # REST calls; extend it in the compose stack so healthy SSE sessions do
      # not reconnect every 30s and spam warnings.
      - GATEWAY_HTTP_WRITE_TIMEOUT=${GATEWAY_HTTP_WRITE_TIMEOUT:-1h}
      - CORDUM_LICENSE_TOKEN=${CORDUM_LICENSE_TOKEN:-}
      - CORDUM_LICENSE_PUBLIC_KEY=${CORDUM_LICENSE_PUBLIC_KEY:-}
      - CORDUM_POLICY_SIGNING_KEY_ID=${CORDUM_POLICY_SIGNING_KEY_ID:-dev-local}
      - CORDUM_POLICY_DEV_SIGNING_SEED=${CORDUM_POLICY_DEV_SIGNING_SEED:-cordum-local-policy-signing-v1}
      # Dev-only deterministic delegation key. Override all three values in
      # production; without a signing key the llm-chat service cannot mint
      # per-session delegation tokens and chat websocket startup fails closed.
      - CORDUM_DELEGATION_PRIVATE_KEY=${CORDUM_DELEGATION_PRIVATE_KEY:-Y29yZHVtLWxvY2FsLWRlbGVnYXRpb24tc2VlZC12MSE=}
      - CORDUM_DELEGATION_KEY_ID=${CORDUM_DELEGATION_KEY_ID:-dlg-dev}
      - CORDUM_DELEGATION_PUBLIC_KEY_DLG_DEV=${CORDUM_DELEGATION_PUBLIC_KEY_DLG_DEV:-8MkfJWjv1UYc2AfaNTTvpPCsRv3SCXmTLJAZ2ldsTwg=}
      - CORDUM_TELEMETRY_MODE=off
      # Unset by default — the audit chain engages unconditionally at gateway boot. Set this to
      # webhook|syslog|datadog|cloudwatch to stream events to an external SIEM, or to
      # null|discard|chain-only for an explicit no-op exporter (matches audit-export metrics shape).
      - CORDUM_AUDIT_EXPORT_TYPE=${CORDUM_AUDIT_EXPORT_TYPE:-}
      - AUDIT_TRANSPORT=${AUDIT_TRANSPORT:-nats}
      - CORDUM_AUDIT_CHAIN_FAIL=${CORDUM_AUDIT_CHAIN_FAIL:-permissive}
      - CORDUM_AUDIT_EXPORT_WEBHOOK_URL=${CORDUM_AUDIT_EXPORT_WEBHOOK_URL:-}
      - CORDUM_AUDIT_EXPORT_WEBHOOK_SECRET=${CORDUM_AUDIT_EXPORT_WEBHOOK_SECRET:-}
      - CORDUM_AUDIT_EXPORT_SYSLOG_ADDR=${CORDUM_AUDIT_EXPORT_SYSLOG_ADDR:-}
      - CORDUM_AUDIT_EXPORT_DD_API_KEY=${CORDUM_AUDIT_EXPORT_DD_API_KEY:-}
      - CORDUM_AUDIT_EXPORT_DD_SITE=${CORDUM_AUDIT_EXPORT_DD_SITE:-}
      - CORDUM_AUDIT_EXPORT_DD_TAGS=${CORDUM_AUDIT_EXPORT_DD_TAGS:-}
      - CORDUM_AUDIT_EXPORT_CW_LOG_GROUP=${CORDUM_AUDIT_EXPORT_CW_LOG_GROUP:-}
      - CORDUM_AUDIT_EXPORT_CW_LOG_STREAM=${CORDUM_AUDIT_EXPORT_CW_LOG_STREAM:-}
      - API_RATE_LIMIT_RPS=2000
      - API_RATE_LIMIT_BURST=4000
      - REDIS_DATA_TTL=24h
      - JOB_META_TTL=168h
      # User authentication (set CORDUM_USER_AUTH_ENABLED=true to enable)
      - CORDUM_USER_AUTH_ENABLED=${CORDUM_USER_AUTH_ENABLED:-false}
      - CORDUM_ADMIN_USERNAME=${CORDUM_ADMIN_USERNAME:-admin}
      # Required when CORDUM_USER_AUTH_ENABLED=true. Gateway refuses to start if empty.
      - CORDUM_ADMIN_PASSWORD=${CORDUM_ADMIN_PASSWORD:-}
      - CORDUM_ADMIN_EMAIL=${CORDUM_ADMIN_EMAIL:-}
      # OIDC SSO (uncomment to enable browser login and/or bearer-token validation)
      # - CORDUM_OIDC_ENABLED=true
      # - CORDUM_OIDC_ISSUER=https://login.example.com/realms/main
      # - CORDUM_OIDC_AUDIENCE=cordum-api
      # - CORDUM_OIDC_CLIENT_ID=cordum-dashboard
      # - CORDUM_OIDC_CLIENT_SECRET=replace-me
      # - CORDUM_OIDC_REDIRECT_URI=https://gateway.example.com/api/v1/auth/sso/oidc/callback
      # - CORDUM_OIDC_SCOPES=openid,profile,email
      # - CORDUM_OIDC_STATE_TTL=10m
      # - CORDUM_AUTH_REDIRECT_URL=https://dashboard.example.com/login
      # SAML SSO (uncomment and provide cert/key + IdP metadata URL to enable)
      # - CORDUM_SAML_ENABLED=true
      # - CORDUM_SAML_IDP_METADATA_URL=https://idp.example.com/metadata
      # - CORDUM_SAML_BASE_URL=https://gateway.example.com
      # - CORDUM_SAML_ENTITY_ID=https://gateway.example.com/api/v1/auth/sso/saml/metadata
      # - CORDUM_SAML_BINDING=redirect
      # - CORDUM_SAML_RESPONSE_BINDING=post
      # - CORDUM_SAML_ALLOW_IDP_INITIATED=false
      # - CORDUM_SAML_STATE_TTL=10m
      # - CORDUM_AUTH_REDIRECT_URL=https://dashboard.example.com/login
      # - CORDUM_SAML_CERT_PATH=/etc/cordum/saml/tls.crt
      # - CORDUM_SAML_KEY_PATH=/etc/cordum/saml/tls.key
    volumes:
      - ./certs:/etc/cordum/tls:ro
      # - ./certs/saml:/etc/cordum/saml:ro
    ports:
      - "9080:8080"
      - "8081:8081"
      - "9092:9092"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://127.0.0.1:8081/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  workflow-engine:
    image: ghcr.io/cordum-io/cordum/workflow-engine:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-workflow-engine
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      - NATS_URL=tls://nats:4222
      - NATS_USE_JETSTREAM=1
      - NATS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - NATS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - NATS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - NATS_TLS_SERVER_NAME=nats
      - NATS_TOKEN=${NATS_TOKEN:-cordum-dev-token}
      - REDIS_URL=rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD_not_set}@redis:6379
      - REDIS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - REDIS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - REDIS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - REDIS_TLS_SERVER_NAME=redis
      - WORKFLOW_ENGINE_HTTP_ADDR=:9093
      - WORKFLOW_ENGINE_SCAN_INTERVAL=5s
      - WORKFLOW_ENGINE_RUN_SCAN_LIMIT=200
      - CORDUM_LICENSE_TOKEN=${CORDUM_LICENSE_TOKEN:-}
      - CORDUM_LICENSE_PUBLIC_KEY=${CORDUM_LICENSE_PUBLIC_KEY:-}
    volumes:
      - ./certs:/etc/cordum/tls:ro
    ports:
      - "9093:9093"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9093/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  dashboard:
    image: ghcr.io/cordum-io/cordum/dashboard:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
      - /etc/nginx/conf.d:uid=101,gid=101
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_LLM_CHAT_ASSISTANT: ${VITE_LLM_CHAT_ASSISTANT:-true}
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      - CORDUM_API_BASE_URL=${CORDUM_API_BASE_URL:-}
      - CORDUM_API_KEY=${CORDUM_API_KEY:-}
      - CORDUM_DASHBOARD_EMBED_API_KEY=${CORDUM_DASHBOARD_EMBED_API_KEY:-false}
      - CORDUM_TENANT_ID=${CORDUM_TENANT_ID:-default}
      - CORDUM_PRINCIPAL_ID=${CORDUM_PRINCIPAL_ID:-dev-admin}
      - CORDUM_PRINCIPAL_ROLE=${CORDUM_PRINCIPAL_ROLE:-admin}
      - CORDUM_API_UPSTREAM_SCHEME=https
    volumes:
      - ./certs:/etc/cordum/tls:ro
    ports:
      - "8082:8080"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  mock-bank-worker:
    profiles: [demo]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    build:
      context: .
      dockerfile: demo/mock-bank/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      - NATS_URL=tls://nats:4222
      - NATS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - NATS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - NATS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - NATS_TLS_SERVER_NAME=nats
      - NATS_TOKEN=${NATS_TOKEN:-cordum-dev-token}
      - REDIS_URL=rediss://:${REDIS_PASSWORD:-cordum-dev}@redis:6379
      - REDIS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - REDIS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - REDIS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - REDIS_TLS_SERVER_NAME=redis
    volumes:
      - ./certs:/etc/cordum/tls:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  mock-bank-ui:
    profiles: [demo]
    image: nginx:alpine
    depends_on:
      api-gateway:
        condition: service_healthy
    volumes:
      - ./demo/mock-bank:/usr/share/nginx/html:ro
      - ./demo/mock-bank/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  # Greeter for the demo-quickstart pack. Subscribes to job.demo-quickstart.greet and
  # echoes "hello, <name>!". Brought up only with `--profile demo` so the
  # default stack stays lean for new users who only want the platform.
  demo-quickstart-worker:
    profiles: [demo]
    image: ghcr.io/cordum-io/cordum/demo-quickstart-worker:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    build:
      context: .
      dockerfile: demo/quickstart/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
      safety-kernel:
        condition: service_healthy
    environment:
      - NATS_URL=tls://nats:4222
      - NATS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - NATS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - NATS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - NATS_TLS_SERVER_NAME=nats
      - NATS_TOKEN=${NATS_TOKEN:-cordum-dev-token}
      - REDIS_URL=rediss://:${REDIS_PASSWORD:-cordum-dev}@redis:6379
      - REDIS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - REDIS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - REDIS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - REDIS_TLS_SERVER_NAME=redis
    volumes:
      - ./certs:/etc/cordum/tls:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9091/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # vLLM serving Qwen3-Coder-30B-A3B-Instruct-FP8 for the local LLM chat
  # assistant. Brought up only with `--profile llmchat` so the default
  # stack stays lean for users without a GPU. See docs/llmchat/helm.md
  # for hardware-tier guidance and the qwen3_xml parser rationale.
  qwen-inference:
    profiles: [llmchat]
    image: vllm/vllm-openai:v0.16.0
    restart: unless-stopped
    command:
      - --model
      - Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
      - --served-model-name
      - qwen3-coder
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --max-model-len
      - "131072"
      - --kv-cache-dtype
      - fp8
      - --enable-prefix-caching
      # Do not log prompts / request bodies from chat traffic. vLLM is pinned
      # to v0.16.0 because that tag still accepts this deprecated-but-supported
      # request-log suppression flag; later releases removed it.
      # Synthetic security probes grep vLLM logs for JWT/API-key shapes and
      # must find zero hits.
      - --disable-log-requests
      - --gpu-memory-utilization
      - "0.9"
      - --host
      # Bind to the container bridge so llm-chat can reach vLLM via
      # http://qwen-inference:8000/v1. The host exposure boundary remains
      # the loopback-only port mapping below.
      - 0.0.0.0
      - --port
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      # Loopback ONLY on the host. The vLLM process binds to the container
      # bridge above for Docker DNS reachability, but the inference endpoint
      # is not exposed off-host.
      - "127.0.0.1:8000:8000"
    volumes:
      - qwen_hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      # FP8 weights are ~30GB; first load takes 3-5min on NVMe + CUDA
      # warmup. start_period MUST cover the cold path or the stack will
      # mark the service unhealthy before vLLM finishes loading.
      start_period: 300s

  # Cordum LLM Chat Assistant — connects to the local vLLM via OpenAI
  # API; talks to the rest of Cordum over the existing MCP server (for
  # mutations) and REST API (for reads). Profile-gated alongside
  # qwen-inference; both up together via `--profile llmchat`.
  llm-chat:
    profiles: [llmchat]
    image: ghcr.io/cordum-io/cordum/llm-chat:${CORDUM_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    dns:
      - 1.1.1.1
      - 8.8.8.8
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cordum-llm-chat
    depends_on:
      # service_started (NOT service_healthy) — vLLM cold-load can take
      # 5+ minutes; healthy-gating the chat service would block the
      # whole stack. llm-chat /readyz probes vLLM and reports not-ready
      # until /v1/models returns 200; the dashboard chat button hides
      # accordingly.
      qwen-inference:
        condition: service_started
      api-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - CORDUM_LLM_CHAT_ADDR=:8090
      - CORDUM_API_KEY=${CORDUM_API_KEY:?CORDUM_API_KEY_not_set}
      - CORDUM_LICENSE_TOKEN=${CORDUM_LICENSE_TOKEN:-}
      - CORDUM_LICENSE_PUBLIC_KEY=${CORDUM_LICENSE_PUBLIC_KEY:-}
      - REDIS_URL=rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD_not_set}@redis:6379
      - REDIS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - REDIS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - REDIS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - REDIS_TLS_SERVER_NAME=redis
      - NATS_URL=tls://nats:4222
      - NATS_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - NATS_TLS_CERT=/etc/cordum/tls/client/tls.crt
      - NATS_TLS_KEY=/etc/cordum/tls/client/tls.key
      - NATS_TLS_SERVER_NAME=nats
      - NATS_TOKEN=${NATS_TOKEN:-cordum-dev-token}
      - CORDUM_TLS_CA=/etc/cordum/tls/ca/ca.crt
      - CORDUM_GATEWAY_URL=${CORDUM_GATEWAY_URL:-https://cordum-api-gateway:8081}
      - LLMCHAT_BASE_URL=${LLMCHAT_BASE_URL:-http://qwen-inference:8000/v1}
      - LLMCHAT_MODEL=qwen3-coder
      - LLMCHAT_PROVIDER=openai
      - LLMCHAT_TOOL_TEMPERATURE=${LLMCHAT_TOOL_TEMPERATURE:-0.3}
      - LLMCHAT_TOOL_TOP_P=${LLMCHAT_TOOL_TOP_P:-0.9}
      - LLMCHAT_SUMMARY_TEMPERATURE=${LLMCHAT_SUMMARY_TEMPERATURE:-0.7}
      - LLMCHAT_SUMMARY_TOP_P=${LLMCHAT_SUMMARY_TOP_P:-0.8}
      - LLMCHAT_TENANT=${CORDUM_TENANT_ID:-default}
      - LLMCHAT_KNOWLEDGE_PACK_ENABLED=${LLMCHAT_KNOWLEDGE_PACK_ENABLED:-true}
      - LLMCHAT_KNOWLEDGE_PACK_BUDGET=${LLMCHAT_KNOWLEDGE_PACK_BUDGET:-65536}
      - LLMCHAT_OPENAPI_PATH=/etc/cordum-llm-chat/openapi.yaml
      - LLMCHAT_CORDUM_IO_PATH=/etc/cordum-llm-chat/cordum-io
    volumes:
      - ./certs:/etc/cordum/tls:ro
      - ./config/llmchat:/home/cordum/config/llmchat:ro
      - ./docs/api/openapi/cordum-api.yaml:/etc/cordum-llm-chat/openapi.yaml:ro
      - ./docs-site/docs/concepts:/etc/cordum-llm-chat/cordum-io/concepts:ro
      - ./docs-site/docs/getting-started:/etc/cordum-llm-chat/cordum-io/getting-started:ro
      - ./docs-site/docs/operations:/etc/cordum-llm-chat/cordum-io/operations:ro
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  nats_data:
  redis_data:
  # Persisted across restarts — re-pulling 30GB FP8 weights on every
  # `docker compose up` is unacceptable.
  qwen_hf_cache:
