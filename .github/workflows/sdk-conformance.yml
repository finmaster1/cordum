name: SDK Conformance

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - 'docs/api/openapi/**'
      - '.github/workflows/sdk-conformance.yml'
  pull_request:
    paths:
      - 'sdk/**'
      - 'docs/api/openapi/**'
      - '.github/workflows/sdk-conformance.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-fixtures:
    name: validate-fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate fixture JSON + operationId drift
        working-directory: sdk/conformance
        run: |
          node ci/validate_fixtures.mjs \
            --fixtures fixtures \
            --operation-spec ../../docs/api/openapi/cordum-api.yaml

  build-sim:
    name: build-sim
    runs-on: ubuntu-latest
    needs: validate-fixtures
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - name: Build gateway simulator
        working-directory: sdk/conformance/simulator
        run: |
          go build -o bin/cordum-gateway-sim ./cmd/cordum-gateway-sim
          chmod +x bin/cordum-gateway-sim
      - name: Upload simulator binary
        uses: actions/upload-artifact@v4
        with:
          name: cordum-gateway-sim
          path: sdk/conformance/simulator/bin/cordum-gateway-sim
          if-no-files-found: error

  conformance-go:
    name: conformance-go
    runs-on: ubuntu-latest
    needs: build-sim
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Download simulator binary
        uses: actions/download-artifact@v4
        with:
          name: cordum-gateway-sim
          path: sdk/conformance/simulator/bin/
      - name: Ensure simulator is executable
        run: chmod +x sdk/conformance/simulator/bin/cordum-gateway-sim
      - name: Run Go harness
        working-directory: sdk/conformance/harness/go
        run: |
          go run . \
            --sim-bin ../../simulator/bin/cordum-gateway-sim \
            --fixtures ../../fixtures \
            --report ../../reports/go.xml
      - name: Upload Go JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-go-junit
          path: sdk/conformance/reports/go.xml
          if-no-files-found: warn

  conformance-python:
    name: conformance-python (py${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: build-sim
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Require Python SDK workspace
        run: test -f sdk/python/pyproject.toml
      - name: Install Python SDK from workspace path
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e sdk/python
      - name: Download simulator binary
        uses: actions/download-artifact@v4
        with:
          name: cordum-gateway-sim
          path: sdk/conformance/simulator/bin/
      - name: Ensure simulator is executable
        run: chmod +x sdk/conformance/simulator/bin/cordum-gateway-sim
      - name: Run Python harness
        working-directory: sdk/conformance/harness/python
        run: |
          python -m conformance \
            --sim-bin ../../simulator/bin/cordum-gateway-sim \
            --fixtures ../../fixtures \
            --report ../../reports/python.xml
      - name: Upload Python JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-python-junit-py${{ matrix.python }}
          path: sdk/conformance/reports/python.xml
          if-no-files-found: warn

  conformance-typescript:
    name: conformance-typescript (node${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build-sim
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Require TypeScript SDK workspace
        run: test -f sdk/typescript/package.json
      - name: Install TypeScript SDK from workspace path
        # npm install (not npm ci) tolerates the platform-specific
        # @emnapi optional-dep drift in the lockfile between host OSes.
        run: |
          (cd sdk/typescript && npm install --no-audit --no-fund && npm run build)
      - name: Download simulator binary
        uses: actions/download-artifact@v4
        with:
          name: cordum-gateway-sim
          path: sdk/conformance/simulator/bin/
      - name: Ensure simulator is executable
        run: chmod +x sdk/conformance/simulator/bin/cordum-gateway-sim
      - name: Run TS harness unit tests
        working-directory: sdk/conformance/harness/typescript
        run: node --test tests/diff.test.mjs
      - name: Run TS harness against simulator
        working-directory: sdk/conformance/harness/typescript
        run: |
          node src/main.mjs \
            --sim-bin ../../simulator/bin/cordum-gateway-sim \
            --fixtures ../../fixtures \
            --report ../../reports/typescript.xml
      - name: Upload TypeScript JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-typescript-junit-node${{ matrix.node }}
          path: sdk/conformance/reports/typescript.xml
          if-no-files-found: warn

  grade:
    name: grade
    runs-on: ubuntu-latest
    needs: [conformance-go, conformance-python, conformance-typescript]
    if: always()
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download all harness JUnits
        uses: actions/download-artifact@v4
        with:
          path: sdk/conformance/_ci_artifacts/
          pattern: conformance-*-junit*
          merge-multiple: false
      - name: Flatten artifacts into reports/
        working-directory: sdk/conformance
        run: |
          mkdir -p reports
          # Each junit-upload comes in its own directory under
          # _ci_artifacts/; copy the single XML inside to the flat
          # reports/ layout the aggregator expects. The matrix Python
          # + Node legs all emit the same filename; the last one wins,
          # which is fine since every leg must pass anyway.
          for d in _ci_artifacts/conformance-go-junit*; do
            [ -d "$d" ] && cp "$d/go.xml" reports/go.xml 2>/dev/null || true
          done
          for d in _ci_artifacts/conformance-python-junit*; do
            [ -d "$d" ] && cp "$d/python.xml" reports/python.xml 2>/dev/null || true
          done
          for d in _ci_artifacts/conformance-typescript-junit*; do
            [ -d "$d" ] && cp "$d/typescript.xml" reports/typescript.xml 2>/dev/null || true
          done
      - name: Aggregate matrix
        working-directory: sdk/conformance
        run: |
          node ci/aggregate_reports.mjs \
            --go reports/go.xml \
            --python reports/python.xml \
            --typescript reports/typescript.xml \
            --out-md reports/summary.md \
            --out-json reports/summary.json
      - name: Upload aggregate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-summary
          path: |
            sdk/conformance/reports/summary.md
            sdk/conformance/reports/summary.json
          if-no-files-found: warn
      - name: Comment PR with matrix
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: sdk-conformance
          path: sdk/conformance/reports/summary.md
