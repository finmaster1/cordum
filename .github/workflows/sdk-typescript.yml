# TypeScript SDK CI + Trusted Publisher release for `@cordum/sdk`.
#
# One-time npm Trusted Publisher setup (no long-lived tokens):
#   1. On npmjs.com add a Trusted Publisher for package `@cordum/sdk`.
#   2. Choose provider "GitHub Actions" and configure:
#        Owner / Repository:  cordum-io / cordum
#        Workflow filename:   sdk-typescript.yml
#        Environment:         npm (optional)
#   3. Push a tag matching `sdk-ts-v*.*.*` on the upstream repo.
#
# npm's current Trusted Publishing docs require GitHub-hosted runners and a
# modern npm CLI. The publish job uses Node 24 to satisfy that requirement and
# publishes with provenance without storing `NPM_TOKEN`.

name: sdk-typescript

on:
  push:
    branches: [main]
    paths:
      - 'sdk/typescript/**'
      - '.github/workflows/sdk-typescript.yml'
    tags:
      - 'sdk-ts-v*.*.*'
  pull_request:
    paths:
      - 'sdk/typescript/**'
      - '.github/workflows/sdk-typescript.yml'

defaults:
  run:
    working-directory: sdk/typescript

jobs:
  test:
    name: Test (${{ matrix.os }} / node${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version (tag builds only)
        if: startsWith(github.ref, 'refs/tags/sdk-ts-v')
        shell: bash
        run: |
          TAG_VER="${GITHUB_REF_NAME#sdk-ts-v}"
          FILE_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo "::error::tag=$TAG_VER but package.json version=$FILE_VER"
            exit 1
          fi
          echo "tag $TAG_VER matches package.json version"

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        # Use `npm install` instead of `npm ci`. The SDK's lockfile
        # includes platform-specific optional subtrees (nested @emnapi
        # under @rolldown/binding-wasm32-wasi) that resolve differently
        # on Windows dev vs Linux CI, which breaks the strict lockfile
        # match that `npm ci` enforces. `npm install` tolerates the
        # platform drift and regenerates only the affected entries.
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check browser bundle for Node builtins
        run: npm run check:no-node-builtins

      - name: Size budget
        run: npm run size

      - name: Pack dry-run
        run: npm pack --dry-run

  browser:
    name: Browser smoke (Playwright)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        # Use `npm install` instead of `npm ci`. The SDK's lockfile
        # includes platform-specific optional subtrees (nested @emnapi
        # under @rolldown/binding-wasm32-wasi) that resolve differently
        # on Windows dev vs Linux CI, which breaks the strict lockfile
        # match that `npm ci` enforces. `npm install` tolerates the
        # platform drift and regenerates only the affected entries.
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run browser smoke harness
        run: npm run test:browser

  publish:
    name: Publish to npm
    needs: [test, browser]
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/sdk-ts-v') &&
      github.repository == 'cordum-io/cordum'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/@cordum/sdk
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24 for npm Trusted Publishing
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        # Use `npm install` instead of `npm ci`. The SDK's lockfile
        # includes platform-specific optional subtrees (nested @emnapi
        # under @rolldown/binding-wasm32-wasi) that resolve differently
        # on Windows dev vs Linux CI, which breaks the strict lockfile
        # match that `npm ci` enforces. `npm install` tolerates the
        # platform drift and regenerates only the affected entries.
        run: npm install --no-audit --no-fund

      - name: Build publish artifact
        run: npm run build

      - name: Publish to npm (Trusted Publisher OIDC)
        run: npm publish --provenance --access public
