# Unit tests + build + Trusted-Publisher release for cordum-sdk.
#
# One-time PyPI Trusted Publisher setup (no long-lived API tokens):
#   1. On https://pypi.org/manage/account/publishing/ create a pending publisher:
#        PyPI project name:       cordum-sdk
#        Owner / Repository:      cordum-io / cordum
#        Workflow:                sdk-python.yml
#        Environment (optional):  pypi
#   2. Push a tag matching `sdk-python-v*.*.*` on the upstream repo.
#   3. The publish job exchanges GitHub's OIDC token for a short-lived PyPI
#      token scoped to this workflow. Do not store `PYPI_API_TOKEN`.

name: sdk-python

on:
  push:
    branches: [main]
    paths:
      - 'sdk/python/**'
      - '.github/workflows/sdk-python.yml'
    tags:
      - 'sdk-python-v*.*.*'
  pull_request:
    paths:
      - 'sdk/python/**'
      - '.github/workflows/sdk-python.yml'

defaults:
  run:
    working-directory: sdk/python

jobs:
  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install package + tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install mypy ruff build twine

      - name: Run tests
        run: python -m pytest -q

      - name: Run mypy
        run: python -m mypy src

      - name: Run Ruff
        run: python -m ruff check src tests

  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches __version__ (tag builds only)
        if: startsWith(github.ref, 'refs/tags/sdk-python-v')
        run: |
          TAG_VER="${GITHUB_REF_NAME#sdk-python-v}"
          FILE_VER=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/cordum_sdk/__init__.py)
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo "::error::tag=$TAG_VER but src/cordum_sdk/__init__.py __version__=$FILE_VER"
            exit 1
          fi
          echo "tag $TAG_VER matches __version__"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cordum-sdk-dist
          path: sdk/python/dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/sdk-python-v') &&
      github.repository == 'cordum-io/cordum'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/cordum-sdk/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: cordum-sdk-dist
          path: dist

      - name: Publish to PyPI (Trusted Publisher OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
