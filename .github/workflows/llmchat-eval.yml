name: llmchat-eval

# Tool-call eval harness for cordum-llm-chat (phase 11). Runs the
# 30+ YAML golden cases in tests/eval/cases/ against a running cordum
# stack with vLLM, scores tool-call accuracy + arg validity + summary
# substring hits, and posts the diff vs the pinned baseline as a PR
# comment when triggered manually with a PR number.
#
# Eval is expensive (each case round-trips a real LLM call), so this
# workflow is NOT triggered on every PR push. For v1 it is manual-only:
# GitHub-hosted runners do not have the GPU required to run the local
# Qwen FP8 vLLM profile, so callers must provide a staging/external
# OpenAI-compatible vLLM URL. Nightly drift-watching moves to v2 after a
# self-hosted GPU runner or durable staging-vLLM endpoint is available.
#
# Branch-protection promotion to required check is OUT OF SCOPE for
# v1 (per task rail #1: harness + baseline only); promote after a
# v2 GPU-budget decision.

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Model identifier (matches tests/eval/baseline/<name>.json)'
        required: false
        default: 'qwen3_coder_30b_fp8'
      vllm_url:
        description: 'Required OpenAI-compat URL of the staging/external vLLM under test'
        required: true
      pr_number:
        description: 'PR number to post the diff comment on (optional)'
        required: false

permissions:
  contents: read
  pull-requests: write   # required for PR-comment posting

concurrency:
  group: llmchat-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  llmchat-eval:
    name: llmchat-eval
    runs-on: ubuntu-latest
    timeout-minutes: 90   # 30 cases x ~60s budget = 30min worst-case + stack startup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm (for stack startup)
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Build cordumctl
        run: |
          mkdir -p ./bin
          go build -o ./bin/cordumctl ./cmd/cordumctl

      - name: Generate per-run secrets + TLS certs
        run: |
          echo "CORDUM_API_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          echo "REDIS_PASSWORD=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          ./bin/cordumctl generate-certs --dir ./certs
          chmod -R a+rX ./certs

      - name: Configure eval license entitlement
        env:
          EVAL_LICENSE_TOKEN: ${{ secrets.CORDUM_LLMCHAT_EVAL_LICENSE_TOKEN }}
          EVAL_LICENSE_PUBLIC_KEY: ${{ secrets.CORDUM_LLMCHAT_EVAL_LICENSE_PUBLIC_KEY }}
        run: |
          if [ -z "${EVAL_LICENSE_TOKEN}" ] || [ -z "${EVAL_LICENSE_PUBLIC_KEY}" ]; then
            echo "::error title=Missing eval license secrets::Set repository secrets CORDUM_LLMCHAT_EVAL_LICENSE_TOKEN and CORDUM_LLMCHAT_EVAL_LICENSE_PUBLIC_KEY to an eval Enterprise license with llm_chat_assistant enabled."
            exit 1
          fi
          {
            echo "CORDUM_LICENSE_TOKEN<<__CORDUM_LLMCHAT_EVAL_LICENSE_TOKEN__"
            printf '%s\n' "${EVAL_LICENSE_TOKEN}"
            echo "__CORDUM_LLMCHAT_EVAL_LICENSE_TOKEN__"
            echo "CORDUM_LICENSE_PUBLIC_KEY<<__CORDUM_LLMCHAT_EVAL_LICENSE_PUBLIC_KEY__"
            printf '%s\n' "${EVAL_LICENSE_PUBLIC_KEY}"
            echo "__CORDUM_LLMCHAT_EVAL_LICENSE_PUBLIC_KEY__"
          } >> "$GITHUB_ENV"

      - name: Bring up the compose stack (llmchat profile)
        env:
          CORDUM_API_KEY: ${{ env.CORDUM_API_KEY }}
          REDIS_PASSWORD: ${{ env.REDIS_PASSWORD }}
        run: |
          # The eval harness targets the cordum-llm-chat service directly
          # (http://127.0.0.1:8090), not the API gateway. When a caller
          # supplies an external vLLM URL, still start cordum-llm-chat and
          # pass that URL through LLMCHAT_BASE_URL; do not start only the
          # demo profile, because that omits /api/v1/chat entirely.
          : "${CORDUM_LICENSE_TOKEN:?CORDUM_LICENSE_TOKEN_missing}"
          : "${CORDUM_LICENSE_PUBLIC_KEY:?CORDUM_LICENSE_PUBLIC_KEY_missing}"
          external_vllm="${{ inputs.vllm_url }}"
          if [ -z "${external_vllm}" ]; then
            echo "::error title=Missing vLLM URL::workflow_dispatch input vllm_url is required for the v1 eval workflow."
            exit 1
          fi
          if [ "${external_vllm}" = "http://127.0.0.1:8000/v1" ]; then
            echo "::error title=Local GPU vLLM unavailable::This v1 workflow runs on ubuntu-latest and cannot start the Qwen FP8 GPU compose profile. Provide a staging/external vLLM URL or move this workflow to a self-hosted GPU runner in v2."
            exit 1
          fi
          echo "Using external vLLM at ${external_vllm}; starting core stack plus llm-chat with LLMCHAT_BASE_URL override."
          export LLMCHAT_BASE_URL="${external_vllm}"
          docker compose --profile demo up -d --build
          docker compose --profile llmchat up -d --build --no-deps llm-chat
          docker compose ps

      - name: Wait for gateway /api/v1/status
        run: |
          attempts=0
          until curl -ksf --connect-timeout 2 --max-time 5 \
            -H "X-API-Key: ${CORDUM_API_KEY}" \
            https://127.0.0.1:8081/api/v1/status >/dev/null; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge 30 ]; then
              echo "gateway /api/v1/status did not return 200 within 60s"
              exit 1
            fi
            sleep 2
          done

      - name: Wait for cordum-llm-chat /readyz
        run: |
          attempts=0
          until curl -sf --connect-timeout 2 --max-time 5 \
            http://127.0.0.1:8090/readyz >/dev/null; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge 90 ]; then
              echo "cordum-llm-chat /readyz did not return 200 within 180s"
              docker compose logs --no-color llm-chat qwen-inference || true
              exit 1
            fi
            sleep 2
          done

      - name: Smoke-test llm-chat entitlement gate
        env:
          CORDUM_API_KEY: ${{ env.CORDUM_API_KEY }}
        run: |
          body="$(mktemp)"
          http_code="$(curl -sS -o "${body}" -w '%{http_code}' \
            -X POST http://127.0.0.1:8090/api/v1/chat \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${CORDUM_API_KEY}" \
            -H "X-Cordum-Principal: eval-runner" \
            -H "X-Cordum-Tenant: default" \
            -H "X-Cordum-Role: operator" \
            --data '{}')"
          echo "llm-chat entitlement smoke POST returned HTTP ${http_code}"
          if [ "${http_code}" = "402" ]; then
            if jq -e '.code == "feature_unavailable"' "${body}" >/dev/null; then
              echo "::error title=LLM chat entitlement closed::Expected eval license to enable llm_chat_assistant; /api/v1/chat returned 402 feature_unavailable before the eval could reach the model."
            else
              echo "::error title=LLM chat entitlement closed::Expected eval license to enable llm_chat_assistant; /api/v1/chat returned 402 before the eval could reach the model."
            fi
            cat "${body}"
            exit 1
          fi
          if [ "${http_code}" != "400" ]; then
            echo "::error title=Unexpected llm-chat smoke status::Expected 400 empty_message after entitlement/auth checks, got ${http_code}."
            cat "${body}"
            exit 1
          fi
          if ! jq -e '.code == "empty_message"' "${body}" >/dev/null; then
            echo "::error title=Unexpected llm-chat smoke body::Expected JSON error code empty_message, proving the request passed the entitlement gate without invoking the model."
            cat "${body}"
            exit 1
          fi

      - name: Install demo-mock-bank pack
        env:
          CORDUM_API_KEY: ${{ env.CORDUM_API_KEY }}
          CORDUM_GATEWAY: https://127.0.0.1:8081
          CORDUM_TLS_INSECURE: '1'
        run: ./bin/cordumctl pack install demo/mock-bank/pack

      - name: Run llm-chat tool-call eval
        env:
          EVAL_LLMCHAT_URL: http://127.0.0.1:8090
          EVAL_VLLM_URL: ${{ inputs.vllm_url }}
          EVAL_API_KEY: ${{ env.CORDUM_API_KEY }}
          EVAL_PRINCIPAL: eval-runner
          EVAL_TENANT: default
          EVAL_ROLE: operator
          EVAL_MODEL_NAME: ${{ inputs.model_name || 'qwen3_coder_30b_fp8' }}
          EVAL_BASELINE: tests/eval/baseline/${{ inputs.model_name || 'qwen3_coder_30b_fp8' }}.json
        run: |
          go test -tags=eval -run TestLLMChatToolEval -count=1 -timeout 60m -v ./tests/eval/...

      - name: Locate latest results dir
        id: results
        if: always()
        run: |
          # Newest run dir under tests/eval/results.
          dir=$(ls -dt tests/eval/results/*/ 2>/dev/null | head -n1 || echo "")
          echo "dir=${dir%/}" >> "$GITHUB_OUTPUT"

      - name: Upload eval artifacts
        if: always() && steps.results.outputs.dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: llmchat-eval-${{ github.run_id }}
          path: ${{ steps.results.outputs.dir }}/
          retention-days: 30

      - name: Prepare PR comment body
        id: prepare_body
        if: always() && inputs.pr_number != ''
        run: |
          dir="${{ steps.results.outputs.dir }}"
          body="$RUNNER_TEMP/llmchat-eval-pr-comment.md"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "${dir}" ] && [ -f "${dir}/diff.md" ]; then
            cp "${dir}/diff.md" "${body}"
            printf '\n---\n\n[Run details](%s)\n' "${run_url}" >> "${body}"
          elif [ -n "${dir}" ] && [ -f "${dir}/summary.json" ]; then
            passed=$(jq -r '.passed_cases' "${dir}/summary.json")
            total=$(jq -r '.total_cases' "${dir}/summary.json")
            model=$(jq -r '.model_name' "${dir}/summary.json")
            {
              echo "# llm-chat eval - ${model}"
              echo
              echo "Passed: ${passed}/${total} cases"
              echo
              echo "_No baseline diff produced for this run - either \`EVAL_BASELINE\` was unset, or the named baseline file was missing. Use this run's \`summary.json\` as the next captured baseline per docs/llmchat/model-version-bump.md step 4._"
              echo
              echo "---"
              echo
              echo "[Run details](${run_url})"
            } > "${body}"
          else
            {
              echo "# llm-chat eval - failed before producing a summary"
              echo
              echo "The harness did not write \`summary.json\` for this run. This can happen when compose startup, /readyz, pack installation, or the Go test command fails before the harness creates \`tests/eval/results/<run_id>/\`. See the workflow logs for the failure."
              echo
              echo "[Run details](${run_url})"
            } > "${body}"
          fi
          echo "body=${body}" >> "$GITHUB_OUTPUT"

      - name: Post comment to PR
        if: always() && inputs.pr_number != '' && steps.prepare_body.outputs.body != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ inputs.pr_number }}
          body-path: ${{ steps.prepare_body.outputs.body }}
          edit-mode: replace

      - name: Capture compose logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/llmchat-eval-logs
          for svc in api-gateway scheduler safety-kernel workflow-engine llm-chat qwen-inference redis nats; do
            docker compose logs --no-color "$svc" > "/tmp/llmchat-eval-logs/${svc}.log" 2>&1 || true
          done

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: llmchat-eval-failure-${{ github.run_id }}
          path: /tmp/llmchat-eval-logs/
          retention-days: 7

      - name: Tear down compose stack
        if: always()
        run: |
          export CORDUM_API_KEY="${CORDUM_API_KEY:-teardown-placeholder-api-key}"
          export REDIS_PASSWORD="${REDIS_PASSWORD:-teardown-placeholder-redis-password}"
          docker compose --profile llmchat down -v 2>/dev/null || true
          docker compose --profile demo down -v 2>/dev/null || true
