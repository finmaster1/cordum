# Continuous-push workflow for the `main` branch.
#
# Triggered by any push to main that touches code, the Dockerfile, or the
# Go module graph. Publishes floating :main and :sha-<short> tags to GHCR
# only — Docker Hub is skipped to avoid pull-rate pollution with
# contributor-grade builds. No cosign signing (these are dev tags, not
# release artefacts), no :latest promotion, no helm chart push.
#
# Gives contributors a one-command way to try in-progress changes:
#   docker pull ghcr.io/cordum-io/cordum/api-gateway:main
#   docker pull ghcr.io/cordum-io/cordum/api-gateway:sha-abc1234
name: Build and Push Docker Images (main)

on:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "core/**"
      - "dashboard/**"
      - "Dockerfile"
      - "dashboard/Dockerfile"
      - "go.mod"
      - "go.sum"

# Coalesce concurrent main-branch pushes — each new commit supersedes the
# previous build because :main is a floating tag and older builds are
# instantly stale.
concurrency:
  group: docker-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  control-plane:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            service: cordum-api-gateway
          - name: scheduler
            service: cordum-scheduler
          - name: safety-kernel
            service: cordum-safety-kernel
          - name: workflow-engine
            service: cordum-workflow-engine
          - name: context-engine
            service: cordum-context-engine
          - name: mcp
            service: cordum-mcp
          - name: cordumctl
            service: cordumctl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        run: |
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/cordum-io/cordum/${{ matrix.name }}:main
            ghcr.io/cordum-io/cordum/${{ matrix.name }}:sha-${{ env.SHORT_SHA }}
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=main-${{ env.SHORT_SHA }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short sha + build date
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push dashboard image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/cordum-io/cordum/dashboard:main
            ghcr.io/cordum-io/cordum/dashboard:sha-${{ env.SHORT_SHA }}

  demo-quickstart-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short sha + build date
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push demo-quickstart-worker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: demo/quickstart/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/cordum-io/cordum/demo-quickstart-worker:main
            ghcr.io/cordum-io/cordum/demo-quickstart-worker:sha-${{ env.SHORT_SHA }}
          build-args: |
            VERSION=main-${{ env.SHORT_SHA }}
            COMMIT=${{ github.sha }}
