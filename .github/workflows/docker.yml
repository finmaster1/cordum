# Build and push Docker images + Helm chart to GHCR and Docker Hub.
# Triggered automatically on git tag push: git tag v0.9.3 && git push --tags
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token (PAT)
#
# Published artifacts:
#   Docker Hub: cordum/api-gateway:0.9.3, cordum/scheduler:0.9.3, ...
#   GHCR:       ghcr.io/cordum-io/cordum/api-gateway:0.9.3, ...
#   Helm (OCI): ghcr.io/cordum-io/cordum/charts/cordum:0.9.3

name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"

# Serialize tag-triggered runs per ref so two concurrent pushes (or a
# re-run while the previous run is still finishing) cannot race on the
# :latest tag in any registry. cancel-in-progress is false because a
# half-pushed multi-arch image would leave an inconsistent manifest.
concurrency:
  group: docker-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write  # cosign keyless signing
  security-events: write  # Trivy SARIF upload
  issues: write           # smoke-test failure auto-issue

jobs:
  control-plane:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            service: cordum-api-gateway
          - name: scheduler
            service: cordum-scheduler
          - name: safety-kernel
            service: cordum-safety-kernel
          - name: workflow-engine
            service: cordum-workflow-engine
          - name: context-engine
            service: cordum-context-engine
          - name: mcp
            service: cordum-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/cordum-io/cordum/${{ matrix.name }}
            cordum/${{ matrix.name }}
          # :latest only moves on final release tags. Pre-release suffixes
          # (v1.0.0-rc.1, -beta, -alpha) must NEVER overwrite :latest —
          # that's the single most common way to ship a production-unsafe
          # image by accident.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}

      - name: Build image (verify)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: cordum/${{ matrix.name }}:verify
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Verify image
        run: |
          IMAGE="cordum/${{ matrix.name }}:verify"
          echo "Verifying $IMAGE..."
          docker run --rm "$IMAGE" --version || docker run --rm "$IMAGE" version || echo "No --version flag"
          docker run --rm --entrypoint sh "$IMAGE" -c "ls -la /usr/local/bin/${{ matrix.service }} 2>/dev/null || ls -la /app/${{ matrix.service }} 2>/dev/null || echo 'binary ok'"

      - name: Scan image for vulnerabilities (Trivy)
        id: trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: cordum/${{ matrix.name }}:verify
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          # Fail the job only on CRITICAL OS-package vulnerabilities that
          # already have a fix available. HIGH severities and language-lib
          # findings still produce SARIF (uploaded below) so they surface in
          # the Security tab without blocking releases for churning advisories.
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os

      - name: Upload Trivy SARIF
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.name)) != ''
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Push image
        id: push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign images
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes ghcr.io/cordum-io/cordum/${{ matrix.name }}@${DIGEST}
          cosign sign --yes docker.io/cordum/${{ matrix.name }}@${DIGEST}

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/cordum-io/cordum/dashboard
            cordum/dashboard
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}

      - name: Build dashboard image (verify)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          load: true
          push: false
          tags: cordum/dashboard:verify

      - name: Verify dashboard image
        run: |
          IMAGE="cordum/dashboard:verify"
          echo "Verifying $IMAGE responds on port 8080..."
          docker run -d --name dash-verify -p 18080:8080 --add-host cordum-api-gateway:127.0.0.1 "$IMAGE"
          sleep 3
          if curl -sf http://localhost:18080/healthz > /dev/null 2>&1; then
            echo "Dashboard image verified"
          else
            echo "Dashboard image failed health check"
            docker logs dash-verify
            docker stop dash-verify && docker rm dash-verify
            exit 1
          fi
          docker stop dash-verify && docker rm dash-verify

      - name: Scan dashboard image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: cordum/dashboard:verify
          format: sarif
          output: trivy-dashboard.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os

      - name: Upload Trivy SARIF (dashboard)
        if: always() && hashFiles('trivy-dashboard.sarif') != ''
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: trivy-dashboard.sarif
          category: trivy-dashboard

      - name: Push dashboard image
        id: push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          # Multi-arch for parity with the control-plane images. The
          # upstream node:20-alpine and nginx:alpine bases are both
          # multi-arch so no Dockerfile changes are required. The preceding
          # verify step loads the amd64 image locally and runs it via
          # `docker run` on the amd64 runner — cross-arch docker run needs
          # QEMU *execution* support which we don't install, so verify
          # stays amd64-only by design.
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign images
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes ghcr.io/cordum-io/cordum/dashboard@${DIGEST}
          cosign sign --yes docker.io/cordum/dashboard@${DIGEST}

  # Greeter for the demo-quickstart pack. Built from a dedicated Dockerfile
  # under demo/quickstart/, hence its own job rather than a control-plane
  # matrix entry. Same publishing posture as core images: multi-arch,
  # cosign-signed, SBOM + provenance.
  demo-quickstart-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/cordum-io/cordum/demo-quickstart-worker
            cordum/demo-quickstart-worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}

      - name: Build image (verify)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: demo/quickstart/Dockerfile
          load: true
          push: false
          tags: cordum/demo-quickstart-worker:verify
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Verify image boots
        run: |
          set -euo pipefail
          # The greeter exits with no work to do when no NATS server is
          # reachable; log inspection is the right boot probe here.
          docker run --rm --entrypoint sh cordum/demo-quickstart-worker:verify -c \
            "test -x /usr/local/bin/demo-quickstart-worker && echo 'binary ok'"

      - name: Scan demo-quickstart-worker image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: cordum/demo-quickstart-worker:verify
          format: sarif
          output: trivy-demo-quickstart-worker.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os

      - name: Upload Trivy SARIF (demo-quickstart-worker)
        if: always() && hashFiles('trivy-demo-quickstart-worker.sarif') != ''
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: trivy-demo-quickstart-worker.sarif
          category: trivy-demo-quickstart-worker

      - name: Push image
        id: push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: demo/quickstart/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign images
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/cordum-io/cordum/demo-quickstart-worker@${DIGEST}"
          cosign sign --yes "docker.io/cordum/demo-quickstart-worker@${DIGEST}"

  smoke-published-images:
    needs: [control-plane, dashboard, demo-quickstart-worker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull and smoke each published image
        id: smoke
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Strip leading 'v' from semver tags so the image tag matches what
          # docker/metadata-action emitted (type=semver,pattern={{version}}).
          IMAGE_TAG="${TAG#v}"
          echo "Verifying images at ghcr.io/cordum-io/cordum/*:${IMAGE_TAG}"

          control_plane=(api-gateway scheduler safety-kernel workflow-engine context-engine mcp)
          failed=()
          for name in "${control_plane[@]}" dashboard demo-quickstart-worker; do
            image="ghcr.io/cordum-io/cordum/${name}:${IMAGE_TAG}"
            echo "::group::pull ${image}"
            if ! docker pull "${image}"; then
              echo "FAIL: docker pull ${image}"
              failed+=("${name}: pull failed")
              echo "::endgroup::"
              continue
            fi
            echo "::endgroup::"

            echo "::group::smoke ${image}"
            # demo-quickstart-worker is a long-running NATS subscriber and
            # has no --help; the binary's mere presence is sufficient as a
            # post-pull smoke (the integration test hits the real workflow).
            if [[ "${name}" == "demo-quickstart-worker" ]]; then
              if ! docker run --rm --entrypoint sh "${image}" -c "test -x /usr/local/bin/demo-quickstart-worker"; then
                failed+=("${name}: binary missing from image")
              fi
              echo "::endgroup::"
              continue
            fi
            # dashboard is an nginx container — boot probe rather than --help.
            if [[ "${name}" == "dashboard" ]]; then
              if ! docker run -d --name "smoke-${name}" -p 18080:8080 "${image}"; then
                failed+=("${name}: container failed to start")
              else
                sleep 3
                if ! curl -sf http://localhost:18080/healthz >/dev/null 2>&1; then
                  failed+=("${name}: /healthz did not respond")
                  docker logs "smoke-${name}" || true
                fi
                docker rm -f "smoke-${name}" >/dev/null 2>&1 || true
              fi
            else
              # Control-plane images are long-running services built from the
              # shared root Dockerfile, which installs the selected service as
              # /usr/local/bin/app. They are not CLI tools and may correctly
              # reject --help/version without their runtime config. A post-pull
              # smoke should verify that the image starts a shell and contains
              # the expected executable; service boot is covered by the earlier
              # per-image verify step before push.
              if ! docker run --rm --entrypoint sh "${image}" -c "test -x /usr/local/bin/app"; then
                failed+=("${name}: /usr/local/bin/app missing or not executable")
              fi
            fi
            echo "::endgroup::"
          done

          if (( ${#failed[@]} > 0 )); then
            printf 'SMOKE FAILED:\n' >&2
            printf '  - %s\n' "${failed[@]}" >&2
            {
              echo "tag=${TAG}"
              echo "failed<<EOF"
              printf '  - %s\n' "${failed[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All published images smoke-passed."

      - name: Open release-break issue on failure
        if: failure() && steps.smoke.outputs.failed != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          FAILED: ${{ steps.smoke.outputs.failed }}
        run: |
          set -euo pipefail
          body=$(printf 'Release smoke test failed for **%s**.\n\nFailures:\n%s\n\nWorkflow run: %s/%s/actions/runs/%s' \
            "${TAG}" "${FAILED}" "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}")
          gh label create release-break \
            --repo "${GITHUB_REPOSITORY}" \
            --color D73A4A \
            --description "Release smoke test failure" >/dev/null 2>&1 || true
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "release-break: ${TAG} smoke test failed" \
            --label "release-break" \
            --body "${body}" || \
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "release-break: ${TAG} smoke test failed" \
            --body "${body}"

  helm-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" cordum-helm/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" cordum-helm/Chart.yaml
          # Keep the packaged chart default image tag aligned with the images
          # published by docker/metadata-action (semver tag without the leading v).
          sed -i -E "/^global:/,/^secrets:/ s/^([[:space:]]+tag: ).*/\1\"${VERSION}\"/" cordum-helm/values.yaml
          echo "Chart version and default image tag set to ${VERSION}"
          grep -E '^(version|appVersion):' cordum-helm/Chart.yaml
          sed -n '/^global:/,/^secrets:/p' cordum-helm/values.yaml | grep -E '^[[:space:]]+tag:'

      - name: Update image tags in Artifact Hub annotations
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Update image tags in artifacthub.io/images annotations (format: image:TAG)
          sed -i -E "s|(ghcr\.io/cordum-io/cordum/[a-z-]+:)[0-9]+\.[0-9]+\.[0-9]+|\1${VERSION}|g" cordum-helm/Chart.yaml
          echo "Image tags updated to ${VERSION}"
          grep "image:" cordum-helm/Chart.yaml

      - name: Lint chart
        run: helm lint cordum-helm/

      - name: Package chart
        run: |
          helm package cordum-helm/ --destination /tmp/charts
          ls -la /tmp/charts/

      - name: Push chart to GHCR (OCI)
        run: |
          helm push /tmp/charts/cordum-*.tgz oci://ghcr.io/cordum-io/cordum/charts
          echo "Helm chart pushed to oci://ghcr.io/cordum-io/cordum/charts/cordum"
