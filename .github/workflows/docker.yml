# Build and push Docker images + Helm chart to GHCR and Docker Hub.
# Triggered automatically on git tag push: git tag v0.9.3 && git push --tags
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token (PAT)
#
# Published artifacts:
#   Docker Hub: cordum/api-gateway:0.9.3, cordum/scheduler:0.9.3, ...
#   GHCR:       ghcr.io/cordum-io/cordum/api-gateway:0.9.3, ...
#   Helm (OCI): ghcr.io/cordum-io/cordum/charts/cordum:0.9.3

name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write  # cosign keyless signing

jobs:
  control-plane:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            service: cordum-api-gateway
          - name: scheduler
            service: cordum-scheduler
          - name: safety-kernel
            service: cordum-safety-kernel
          - name: workflow-engine
            service: cordum-workflow-engine
          - name: context-engine
            service: cordum-context-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/cordum-io/cordum/${{ matrix.name }}
            cordum/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build image (verify)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: cordum/${{ matrix.name }}:verify
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Verify image
        run: |
          IMAGE="cordum/${{ matrix.name }}:verify"
          echo "Verifying $IMAGE..."
          docker run --rm "$IMAGE" --version || docker run --rm "$IMAGE" version || echo "No --version flag"
          docker run --rm --entrypoint sh "$IMAGE" -c "ls -la /usr/local/bin/${{ matrix.service }} 2>/dev/null || ls -la /app/${{ matrix.service }} 2>/dev/null || echo 'binary ok'"

      - name: Push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes ghcr.io/cordum-io/cordum/${{ matrix.name }}@${DIGEST}
          cosign sign --yes docker.io/cordum/${{ matrix.name }}@${DIGEST}

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/cordum-io/cordum/dashboard
            cordum/dashboard
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build dashboard image (verify)
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          load: true
          push: false
          tags: cordum/dashboard:verify

      - name: Verify dashboard image
        run: |
          IMAGE="cordum/dashboard:verify"
          echo "Verifying $IMAGE responds on port 8080..."
          docker run -d --name dash-verify -p 18080:8080 --add-host cordum-api-gateway:127.0.0.1 "$IMAGE"
          sleep 3
          if curl -sf http://localhost:18080/healthz > /dev/null 2>&1; then
            echo "Dashboard image verified"
          else
            echo "Dashboard image failed health check"
            docker logs dash-verify
            docker stop dash-verify && docker rm dash-verify
            exit 1
          fi
          docker stop dash-verify && docker rm dash-verify

      - name: Push dashboard image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          platforms: linux/amd64
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes ghcr.io/cordum-io/cordum/dashboard@${DIGEST}
          cosign sign --yes docker.io/cordum/dashboard@${DIGEST}

  helm-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" cordum-helm/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" cordum-helm/Chart.yaml
          echo "Chart version set to ${VERSION}"
          grep -E '^(version|appVersion):' cordum-helm/Chart.yaml

      - name: Update image tags in Artifact Hub annotations
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Update image tags in artifacthub.io/images annotations (format: image:TAG)
          sed -i -E "s|(ghcr\.io/cordum-io/cordum/[a-z-]+:)[0-9]+\.[0-9]+\.[0-9]+|\1${VERSION}|g" cordum-helm/Chart.yaml
          echo "Image tags updated to ${VERSION}"
          grep "image:" cordum-helm/Chart.yaml

      - name: Lint chart
        run: helm lint cordum-helm/

      - name: Package chart
        run: |
          helm package cordum-helm/ --destination /tmp/charts
          ls -la /tmp/charts/

      - name: Push chart to GHCR (OCI)
        run: |
          helm push /tmp/charts/cordum-*.tgz oci://ghcr.io/cordum-io/cordum/charts
          echo "Helm chart pushed to oci://ghcr.io/cordum-io/cordum/charts/cordum"
