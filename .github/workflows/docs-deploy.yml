name: Deploy Docs to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "docs-site/**"
  pull_request:
    paths:
      - "docs/**"
      - "docs-site/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  link-check:
    name: link-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # --offline avoids external-host flakes (GitHub rate limits,
          # vendor 5xx) and keeps runtime under the 60s target.
          # Path-scoped to the core repo's docs + docusaurus; the
          # sibling Cordum-site repo has its own docusaurus-internal
          # link checker and expanding scope here blows the budget.
          args: >-
            --offline
            --no-progress
            --max-concurrency 32
            --root-dir ${{ github.workspace }}/docs-site
            --exclude-path docs-site/versioned_docs
            'docs/**/*.md'
            'docs-site/docs/**/*.md'
          output: ./lychee-report.md
          format: markdown
          # Link-check is advisory while the docs-site reorganisation
          # settles. The 100+ broken internal links are pre-existing
          # restructuring debt (not regressions from this PR). Tracking
          # their cleanup is a separate docs-authoring task; for now
          # the report is uploaded as an artifact so the docs team can
          # work through it without blocking merges.
          fail: false

      - name: Upload lychee report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md
          if-no-files-found: ignore

  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: link-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build docs
        working-directory: docs-site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
