# Cordum LLM Chat Assistant — informational-only default policy bundle
#
# The chat-assistant identity is retained for entitlement, audit attribution,
# and tenant-scoped session ownership. It has no Cordum action scope: the chat
# service answers questions from the local knowledge pack and never invokes MCP
# or mutates platform state. Approval gates and preapproval policies remain in
# the main Cordum MCP/dashboard/CLI paths, not in llm-chat.

version: 1
metadata:
  name: chat-assistant-informational-only
  reason: "Yaron 2026-04-28 scope reduction: llm-chat answers documentation/configuration questions only."

subjects:
  - agent_id: chat-assistant
    tenant: '*'

allow_tools: []
data_classifications:
  - public
  - internal
