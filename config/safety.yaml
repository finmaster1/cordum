# Default decision when no rule matches. Fail-closed: unmatched jobs are denied.
default_decision: deny

rules:
  # Default topic — restricted to internal callers only.
  # Probes and integration tests must include the _internal label.
  # External callers without the label require human approval.
  - id: default-topic-internal-allow
    match:
      topics:
        - job.default
      labels:
        _internal: "true"
    decision: allow
    reason: "Internal probe/test on default topic."

  - id: default-topic-external-review
    match:
      topics:
        - job.default
    decision: require_approval
    reason: "External use of job.default requires human approval."

  # Fraud detection jobs require human approval before execution
  - id: fraud-review-required
    match:
      topics:
        - job.fraud-detection.process
    decision: require_approval
    reason: "Fraud detection results must be reviewed by a human before action."

  # Risk assessment agents require approval — high-impact decisions
  - id: risk-assessment-approval
    match:
      topics:
        - job.risk-agents.process
    decision: require_approval
    reason: "Risk assessment outcomes require human sign-off."

  # Compliance jobs require approval — regulatory oversight
  - id: compliance-approval
    match:
      topics:
        - job.compliance-agents.process
    decision: require_approval
    reason: "Compliance checks require human verification before proceeding."

  # Bank executors (wire transfers, account changes) — always require approval
  - id: bank-executor-approval
    match:
      topics:
        - job.bank-executors.process
    decision: require_approval
    reason: "Financial execution actions require explicit human authorization."

  # Underwriting requires approval — loan decisions are high-stakes
  - id: underwriting-approval
    match:
      topics:
        - job.underwriting-agents.process
    decision: require_approval
    reason: "Underwriting decisions require human review before commitment."

  # Low-risk topics — auto-allowed for workflow/pack sources only.
  # Direct API callers require approval to prevent abuse.
  - id: validators-internal-allow
    match:
      topics:
        - job.bank-validators.process
        - job.notification-service.process
        - job.valuation-agents.process
      labels:
        _source: "workflow"
    decision: allow
    reason: "Read-only validation and notification jobs are auto-approved for workflow sources."

  - id: validators-pack-allow
    match:
      topics:
        - job.bank-validators.process
        - job.notification-service.process
        - job.valuation-agents.process
      labels:
        _source: "pack"
    decision: allow
    reason: "Read-only validation and notification jobs are auto-approved for pack sources."

  - id: validators-api-review
    match:
      topics:
        - job.bank-validators.process
        - job.notification-service.process
        - job.valuation-agents.process
    decision: require_approval
    reason: "Direct API access to validator/notification topics requires human approval."

  # Mock-bank transfer rules are defined in the pack overlay
  # (demo/mock-bank/pack/overlays/policy.fragment.yaml) and should NOT
  # be duplicated here. The pack rules have finer granularity (blocked,
  # review, low risk levels).
  #
  # SECURITY: risk_tags for pack topics with a registered tag deriver are
  # server-derived from job content. Client-supplied risk_tags are overridden
  # when the safety kernel has a deriver for the topic. For mock-bank, the
  # deriver parses "amount" from _content.payload_json and derives:
  #   amount < 100  → "low"
  #   100 <= amount < 300 → "review"
  #   amount >= 300 → "blocked"
  # This prevents risk tag spoofing where a client submits high-value
  # transfers with low-risk tags to bypass policy rules.
  #
  # Content label convention:
  #   _content.prompt       — job prompt text (set by gateway, max 64KB)
  #   _content.payload_json — serialized job context/payload (max 64KB)

  # TX4: B2B Multi-Agent Onboarding — restricted to workflow/pack sources.
  # Direct API callers require approval to prevent path traversal and
  # payload injection attacks (red-team findings #17/#18).
  - id: b2b-internal-allow
    match:
      topics:
        - job.b2b.orchestrate
        - job.b2b.hr-setup
        - job.b2b.it-inventory
        - job.b2b.procurement-source
      labels:
        _source: "workflow"
    decision: allow
    reason: "B2B topics auto-approved for workflow-dispatched jobs."

  - id: b2b-pack-allow
    match:
      topics:
        - job.b2b.orchestrate
        - job.b2b.hr-setup
        - job.b2b.it-inventory
        - job.b2b.procurement-source
      labels:
        _source: "pack"
    decision: allow
    reason: "B2B topics auto-approved for pack workers."

  - id: b2b-api-review
    match:
      topics:
        - job.b2b.orchestrate
        - job.b2b.hr-setup
        - job.b2b.it-inventory
        - job.b2b.procurement-source
    decision: require_approval
    reason: "Direct API access to B2B topics requires human approval."

  - id: b2b-governance-evaluate-allow
    match:
      topics:
        - job.b2b.governance-evaluate
    decision: allow_with_constraints
    reason: "B2B governance evaluator checks spend thresholds."
    constraints:
      budgets:
        max_runtime_ms: 30000

  - id: b2b-procurement-pay-allow
    match:
      topics:
        - job.b2b.procurement-pay
    decision: allow_with_constraints
    reason: "Payment processor issues purchase order."
    constraints:
      budgets:
        max_runtime_ms: 30000

  - id: b2b-vendor-email-allow
    match:
      topics:
        - job.b2b.vendor-email
    decision: allow
    reason: "Vendor email sends confirmation."

  # Visa governance — allow synthetic topics used by the governance-evaluator
  # worker for direct Safety Kernel content scanning via gRPC.
  - id: visa-governance-content-scan
    match:
      topics:
        - job.visa-governance.scope-check
        - job.visa-governance.pii-check
    decision: allow
    reason: "Synthetic topics for governance worker kernel evaluation."

  # Workflow approval gate — dispatched by the workflow engine for steps of
  # type "approval". The scheduler auto-completes these once approved via
  # the unified /approvals/{job_id}/approve endpoint.
  - id: workflow-approval-gate
    match:
      topics:
        - job.cordum.approval-gate
    decision: require_approval
    reason: "Workflow approval gates require explicit human authorization."

  # =========================================================================
  # CordClaw — pre-dispatch governance for OpenClaw agents
  # =========================================================================
  - id: cordclaw-deny-destructive
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["destructive"]
    decision: deny
    reason: "Destructive commands (rm -rf, mkfs, dd) are blocked by policy."

  - id: cordclaw-deny-secrets-access
    match:
      topics: ["job.cordclaw.file-read", "job.cordclaw.file-write"]
      risk_tags: ["secrets"]
    decision: deny
    reason: "Access to credential and key files is blocked by policy."

  - id: cordclaw-deny-cloud-infra
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["cloud", "infrastructure"]
    decision: deny
    reason: "Cloud infrastructure commands require explicit policy override."

  - id: cordclaw-deny-remote-access
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["remote-access"]
    decision: deny
    reason: "Remote access commands (ssh/scp) are blocked by policy."

  - id: cordclaw-approve-outbound-messages
    match:
      topics: ["job.cordclaw.message-send"]
      risk_tags: ["external"]
    decision: require_approval
    reason: "Outbound messages to external channels require human approval."

  - id: cordclaw-approve-package-install
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["package-install"]
    decision: require_approval
    reason: "Package installation requires human approval."

  - id: cordclaw-approve-cron
    match:
      topics: ["job.cordclaw.cron-create"]
    decision: require_approval
    reason: "Creating autonomous scheduled tasks requires human approval."

  - id: cordclaw-approve-code-deploy
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["code-deploy"]
    decision: require_approval
    reason: "Code deployment operations (for example git push) require review."

  - id: cordclaw-constrain-exec
    match:
      topics: ["job.cordclaw.exec"]
      risk_tags: ["exec"]
    decision: allow_with_constraints
    constraints:
      sandbox:
        isolated: true
      budgets:
        max_runtime_ms: 30000
    reason: "Shell execution allowed in a sandboxed environment with 30s timeout."

  - id: cordclaw-constrain-browser
    match:
      topics: ["job.cordclaw.browser", "job.cordclaw.browser-action"]
    decision: allow_with_constraints
    constraints:
      budgets:
        max_runtime_ms: 60000
    reason: "Browser actions are allowed with a 60s timeout."

  - id: cordclaw-allow-read
    match:
      topics: ["job.cordclaw.file-read"]
    decision: allow
    reason: "File reads are allowed by default."

  - id: cordclaw-allow-write
    match:
      topics: ["job.cordclaw.file-write"]
    decision: allow
    reason: "Workspace file writes are allowed by default."

  - id: cordclaw-allow-search
    match:
      topics: ["job.cordclaw.web-search", "job.cordclaw.web-fetch"]
    decision: allow
    reason: "Web search and fetch actions are allowed by default."

  - id: cordclaw-allow-memory
    match:
      topics: ["job.cordclaw.memory-write"]
    decision: allow
    reason: "Memory writes are allowed by default."

input_policy:
  fail_mode: closed  # "closed" = requeue when kernel down, "open" = allow through

input_rules:
  # =========================================================================
  # Global prompt injection detection — applies to ALL job topics.
  # Catches LLM prompt injection attempts (system override, ignore rules,
  # jailbreak directives). Escalates to human review rather than outright
  # deny to reduce false-positive impact on legitimate prompts.
  # =========================================================================
  - id: global-prompt-injection-scan
    description: "Detect LLM prompt injection patterns in job input content."
    severity: high
    match:
      topics:
        - "job.*"
      scanners:
        - "prompt_injection"
    decision: require_approval
    reason: "Prompt injection pattern detected in job input — requires human review."

  # =========================================================================
  # Path traversal and dangerous payload detection (red-team #17/#18).
  # Catches ../../../ traversal in tenant/org fields and execute=true overrides.
  # =========================================================================
  - id: global-path-traversal-scan
    description: "Detect path traversal patterns in job input content."
    severity: high
    match:
      topics:
        - "job.*"
      content_patterns:
        - "\\.\\./\\.\\."
        - "\\.\\.\\\\"
    decision: require_approval
    reason: "Path traversal pattern detected in job input — requires human review."

  - id: global-dangerous-override-scan
    description: "Detect dangerous boolean overrides in job input."
    severity: high
    match:
      topics:
        - "job.*"
      keywords:
        - "execute=true"
        - "validate=false"
        - "bypass=true"
        - "override=true"
    decision: require_approval
    reason: "Dangerous override pattern detected in job input — requires human review."

  # =========================================================================
  # Native TX2 scope enforcement on the REAL workflow topic.
  # Evaluated by the scheduler before dispatching the governance worker.
  # Uses structured instruction-vs-cart comparison, not a keyword blocklist.
  # =========================================================================
  - id: visa-tx2-scope-native
    description: "Deny Visa payment workflows where cart items violate the original purchase instruction (TX2 scope enforcement)."
    severity: critical
    match:
      topics:
        - "job.visa-governance.evaluate"
      scope:
        instruction_path: "instruction"
        items_path: "items"
        category_path: "category"
        name_path: "name"
        allowed_categories:
          grocery:
            - "produce"
            - "dairy"
            - "meat"
            - "bakery"
            - "beverages"
            - "snacks"
            - "frozen"
            - "pantry"
            - "household"
            - "personal_care"
          electronics:
            - "phones"
            - "computers"
            - "accessories"
            - "audio"
            - "gaming"
            - "headphones"
          headphones:
            - "headphones"
            - "audio"
            - "accessories"
            - "electronics"
        aliases:
          gift-card: "gift_card"
          giftcard: "gift_card"
          gift card: "gift_card"
          crypto: "cryptocurrency"
          financial-instrument: "financial_instrument"
        on_missing_input: "deny"
        on_ambiguous: "deny"
    decision: deny
    reason: "Scope violation — cart items do not match the declared purchase intent. Possible prompt-injection attack."

  # Optional: prompt-injection phrase scanning when raw untrusted text is present.
  # Only fires when the payload includes an untrusted_prompt_text field.
  # Without this field, Cordum does not claim prompt-text detection.
  - id: visa-tx2-injection-scanner
    description: "Scan for prompt-injection phrases in raw untrusted merchant/page text when available."
    severity: high
    match:
      topics:
        - "job.visa-governance.evaluate"
      scanners:
        - "injection"
      keywords:
        - "ignore previous instructions"
        - "disregard all prior"
        - "override your instructions"
        - "you are now"
        - "forget your rules"
    decision: deny
    reason: "Prompt-injection phrases detected in untrusted input text."

  # =========================================================================
  # Legacy synthetic scope-check (temporary compatibility shim).
  # Still used by the governance worker until native mode is fully rolled out.
  # Will be removed once worker scope-check path is decommissioned.
  # =========================================================================
  - id: visa-scope-blocklist
    description: "[LEGACY SHIM] Block Visa payment payloads containing prohibited item categories via synthetic topic."
    severity: high
    match:
      topics:
        - "job.visa-governance.scope-check"
      keywords:
        - "gift_card"
        - "cryptocurrency"
        - "financial_instrument"
        - "gambling"
        - "adult"
        - "weapons"
    decision: deny
    reason: "Scope violation — prohibited item category detected in payment payload."

  # Visa governance — PII detection via Safety Kernel content scanning.
  # Called by the governance-evaluator worker via direct gRPC with synthetic topic.
  - id: visa-pii-quarantine
    description: "Scan Visa payment payloads for PII (Israeli phone, email, national ID, credit cards)."
    severity: high
    match:
      topics:
        - "job.visa-governance.pii-check"
      scanners:
        - "pii"
      content_patterns:
        - "05\\d-?\\d{3}-?\\d{4}"
        - "\\b\\d{9}\\b"
    decision: deny
    reason: "PII detected in payment payload."

  # Real pre-dispatch protection for payment processing step.
  # Evaluated by the scheduler before dispatching to payment-processor worker.
  - id: visa-payment-pii-guard
    description: "Block payment processing if PII leaks past governance step."
    severity: critical
    match:
      topics:
        - "job.visa-payment.process"
      scanners:
        - "pii"
      content_patterns:
        - "05\\d-?\\d{3}-?\\d{4}"
        - "\\b\\d{9}\\b"
    decision: deny
    reason: "PII detected — payment blocked before processing."

output_policy:
  enabled: true
  fail_mode: closed

output_rules:
  - id: output-secret-leak
    description: "Quarantine outputs that contain likely credential or key material."
    match:
      topics:
        - "job.*"
      scanners:
        - "secret"
    decision: quarantine
    severity: critical
    reason: "Potential secret material detected in output."

  - id: output-pii-leak
    description: "PII detection on outbound channels only — internal agents (HR, orchestrator) are exempt."
    enabled: true
    match:
      topics:
        - "job.mkt-authority.*"
        - "job.mkt-pipeline.*"
        - "job.demo-*"
        - "job.b2b.vendor-email"
        - "job.b2b.procurement-pay"
      scanners:
        - "pii"
    decision: quarantine
    severity: high
    reason: "Potential PII detected in output."

  - id: output-injection-detected
    description: "Quarantine outputs containing likely injection payload fragments."
    match:
      topics:
        - "job.*"
      scanners:
        - "injection"
    decision: quarantine
    severity: high
    reason: "Potential injection payload detected in output."

  - id: output-size-limit
    description: "Quarantine oversized outputs beyond the default 10 MiB threshold."
    match:
      topics:
        - "job.*"
      output_size_gt: 10485760
    decision: quarantine
    severity: medium
    reason: "Output exceeds configured size threshold."

  - id: output-error-secret-leak
    description: "Quarantine failed job outputs when secret indicators are present."
    match:
      topics:
        - "job.*"
      has_error: true
      scanners:
        - "secret"
    decision: quarantine
    severity: high
    reason: "Secrets detected in failed job output context."

default_tenant: default
tenants:
  default:
    allow_topics:
      - "job.*"
    deny_topics:
      - "sys.*"
    allowed_repo_hosts: []
    denied_repo_hosts: []
    mcp:
      # Used by safety kernel (core/controlplane/safetykernel) for MCP filtering.
      # Allow/deny MCP servers/tools/resources when a job declares MCP labels.
      # Leave lists empty to allow all MCP calls (when labels are set).
      allow_servers: []
      deny_servers: []
      allow_tools: []
      deny_tools: []
      allow_resources: []
      deny_resources: []
      allow_actions: []
      deny_actions: []

