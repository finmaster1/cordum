# NATS server config for dev Docker Compose with TLS.
# Uses auto-generated certificates from cordumctl generate-certs.
# Requires certificate assets mounted at /etc/cordum/tls:
# - /etc/cordum/tls/ca/ca.crt
# - /etc/cordum/tls/server/tls.crt
# - /etc/cordum/tls/server/tls.key

port: 4222
http_port: 8222

jetstream {
  store_dir: /data/jetstream
  sync_interval: "1s"
}

tls {
  cert_file: /etc/cordum/tls/server/tls.crt
  key_file: /etc/cordum/tls/server/tls.key
  ca_file: /etc/cordum/tls/ca/ca.crt
  verify: true
}
