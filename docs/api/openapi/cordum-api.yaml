          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: kind
        in: query
        description: Optional event kind filter; event kinds are open-ended non-empty strings such as `hook.pre_tool_use`.
        schema:
          type: string
      - name: decision
        in: query
        schema:
          type: string
          enum: [ALLOW, DENY, REQUIRE_APPROVAL, THROTTLE, CONSTRAIN, RECORDED]
      - name: since
        in: query
        description: Inclusive lower timestamp bound.
        schema:
          type: string
          format: date-time
      - name: until
        in: query
        description: Inclusive upper timestamp bound.
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Edge event page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeAgentActionEventPageResponse'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/sessions/{session_id}/export:
    post:
      operationId: exportEdgeSession
      summary: Assemble an Edge session evidence bundle
      description: |
        Returns a `SessionExportBundle` for the named session — session record,
        executions, ordered AgentActionEvents, approvals, and a metadata-only
        manifest of every artifact pointer attached to those events. Bundles
        contain artifact metadata (URI, sha256, size, content_type, retention,
        redaction level) but never raw artifact bodies. Cross-tenant probes
        receive 404 indistinguishable from missing-session.
      tags:
      - Edge
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                max_events:
                  type: integer
                  minimum: 1
                  maximum: 10000
                  default: 5000
                  description: |
                    Caps the number of events the bundle carries. When the
                    session has more, `truncation.events_truncated = true`
                    and `truncation.event_count` records the actual total.
                    Values above 10000 are rejected with HTTP 400 +
                    `code=max_events_too_large` (EDGE-065 request-validation
                    bound). Values <= 0 fall back to the assembler default
                    (5000).
      responses:
        '200':
          description: Edge session export bundle
          content:
            application/json:
              schema:
                type: object
                description: |
                  SessionExportBundle. See docs/edge-export.md for full schema
                  including artifact_type catalog and missing_artifacts reasons.
                additionalProperties: true
                required:
                - manifest_version
                - generated_at
                - tenant_id
                - session
                properties:
                  manifest_version:
                    type: string
                    example: edge.export.v1
                  generated_at:
                    type: string
                    format: date-time
                  tenant_id:
                    type: string
