  /api/v1/policy/shadows/{id}:
    parameters:
    - name: id
      in: path
      required: true
      description: |
        Tilde-encoded bundle id; `/` in logical IDs (e.g. `secops/safety`)
        becomes `~` on the wire (`secops~safety`). The server decodes the
        tilde back to `/` before looking up the shadow.
      schema:
        type: string
    put:
      operationId: activatePolicyShadow
      summary: Activate or replace the shadow policy for a bundle
      description: |
        PUT upserts the shadow policy for the given bundle. A bundle has at
        most one shadow at a time; re-activating replaces the current one
        in place. Validation matches `handlePutPolicyBundle` — malformed
        YAML returns 400 before any Redis write.
      tags:
      - Policy
      security:
      - apiKey: []
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyShadowUpsertRequest'
      responses:
        '200':
          description: Shadow policy activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyShadow'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    get:
      operationId: getPolicyShadow
      summary: Get the shadow policy for a bundle
      description: |
        Returns the active shadow policy for `{id}` or 404 if none is set.
        Requires `policy.read` (admin role bypasses). Dashboards translate
        the 404 into an empty-state render rather than an error.
      tags:
      - Policy
      security:
      - apiKey: []
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Shadow policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyShadow'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: deletePolicyShadow
      summary: Remove the shadow policy for a bundle
      description: |
        Deactivates the shadow. Emits a `safety.policy_change` audit event
        with `action=shadow_deactivate` and the outgoing shadow's
        `shadow_bundle_id` so the activate/deactivate pair correlates.
      tags:
      - Policy
      security:
      - apiKey: []
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantID'
      responses:
        '204':
          description: Shadow policy removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/policy/shadows/{id}/results/summary:
    parameters:
    - name: id
      in: path
      required: true
      description: Tilde-encoded bundle id (see `/api/v1/policy/shadows/{id}`).
      schema:
        type: string
    get:
      operationId: getPolicyShadowResultsSummary
      summary: Aggregate shadow-evaluation counts over a time window
      description: |
        Counts shadow-eval outcomes (escalated / relaxed / approval_differ /
        unchanged) across the audit stream between `from` and `to`.
        Memoised for 60 s per (tenant, bundle, window) so dashboard polling
        doesn't thrash Redis XRANGE. Requires `policy.read`.
      tags:
      - Policy
      security:
      - apiKey: []
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: from
        in: query
        required: true
        description: Inclusive lower bound, unix milliseconds.
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: to
        in: query
        required: true
        description: Exclusive upper bound, unix milliseconds. Must be strictly greater than `from`; the range cannot exceed 30 days.
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShadowResultsSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/policy/shadows/{id}/results/comparisons:
    parameters:
    - name: id
      in: path
      required: true
      description: Tilde-encoded bundle id (see `/api/v1/policy/shadows/{id}`).
      schema:
        type: string
    get:
      operationId: getPolicyShadowResultsComparisons
      summary: Paginated shadow-vs-active decision comparisons
      description: |
        Returns individual shadow-eval entries with both the active verdict
        and the shadow's would-be verdict. Paginates via Redis-stream
        cursors; clients pass `next_cursor` back as `?cursor=` to resume.
        `truncated_at_max=true` means the page ended because the scan hit
        its budget before reaching `to`.
      tags:
      - Policy
      security:
      - apiKey: []
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: from
        in: query
        required: true
        description: Inclusive lower bound, unix milliseconds.
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: to
        in: query
        required: true
        description: Exclusive upper bound, unix milliseconds (≤ 30 days after `from`).
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: diff
        in: query
        required: false
        description: Filter to one diff class (omit for all classes).
        schema:
          type: string
          enum: [escalated, relaxed, approval_differ, unchanged, all]
      - name: cursor
        in: query
        required: false
        description: Redis stream ID (`<ms>-<seq>`) returned as `next_cursor` from the previous page.
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Page size. Default 50, maximum 500.
        schema:
          type: integer
          minimum: 1
          maximum: 500
      responses:
        '200':
          description: Paginated comparisons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShadowComparisonsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/policy/shadows/{id}/results/timeseries:
    parameters:
    - name: id
      in: path
      required: true
      description: Tilde-encoded bundle id (see `/api/v1/policy/shadows/{id}`).
      schema:
        type: string
    get:
      operationId: getPolicyShadowResultsTimeseries
      summary: Zero-filled bucketed timeseries of shadow outcomes
      description: |
        Returns one row per bucket (including empty buckets) so the
        dashboard chart shows gaps rather than stretching the last
        observation. Bucket widths are a closed whitelist to prevent
        fine-grained requests blowing out the 2000-bucket ceiling.
      tags:
      - Policy
      security:
      - apiKey: []
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: from
        in: query
        required: true
        description: Inclusive lower bound, unix milliseconds.
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: to
        in: query
        required: true
        description: Exclusive upper bound, unix milliseconds (≤ 30 days after `from`).
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: bucket
        in: query
        required: true
        description: Bucket width (closed whitelist).
        schema:
          type: string
          enum: [1m, 5m, 15m, 1h, 1d]
      responses:
        '200':
          description: Timeseries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShadowTimeseriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
