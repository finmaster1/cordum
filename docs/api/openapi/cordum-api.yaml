  /api/v1/policy/analytics:
    post:
      operationId: policyAnalytics
      summary: Compute per-rule quality analytics (false positive rates, approval fatigue)
      description: >
        Analyzes policy rule quality over a time range. Returns per-rule metrics
        including hit counts, override rates, approval latency, and daily trends.
        Read-only — no side effects.
      tags:
      - Policy
      security:
      - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                  format: date-time
                  description: Start of analysis window (RFC3339)
                to:
                  type: string
                  format: date-time
                  description: End of analysis window (RFC3339, max 7 days from 'from')
                rule_filter:
                  type: string
                  description: Optional rule ID to restrict analysis to a single rule
              required:
              - from
              - to
      responses:
        '200':
          description: Per-rule analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  time_range:
                    type: object
                    properties:
                      from:
                        type: string
                        format: date-time
                      to:
                        type: string
                        format: date-time
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        rule_id:
                          type: string
                        hit_count:
                          type: integer
                        approval_count:
                          type: integer
                        override_count:
                          type: integer
                        override_rate:
                          type: number
                          description: override_count / approval_count (0 if no approvals)
                        avg_approval_latency_ms:
                          type: integer
                          format: int64
                        daily_hits:
                          type: array
                          items:
                            type: integer
                          description: Per-day hit counts (index 0 = oldest day)
                  summary:
                    type: object
                    properties:
                      total_rules:
                        type: integer
                      total_hits:
                        type: integer
                      total_overrides:
                        type: integer
                      highest_override_rule_id:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
