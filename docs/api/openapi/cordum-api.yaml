    # semantics so the openapi-audit tool doesn't flag the path as
    # under-specified.
    x-any-method: true
    get:
      operationId: streamEvents
      summary: WebSocket event bus stream
      description: 'Upgrades to a WebSocket connection. Authenticates via the

        `cordum-api-key.<base64>` subprotocol. Streams real-time bus events

        (job state changes, heartbeats, policy updates, etc.).



