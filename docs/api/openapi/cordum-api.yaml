  /api/v1/edge/events:
    post:
      operationId: createEdgeEvent
      summary: Append a single Edge agent action event
      description: >-
        Writes a redacted AgentActionEvent for an existing Edge session/execution.
        Raw tool inputs, raw tool results, and transcripts must not be sent inline;
        send bounded `input_redacted` details and reference large evidence with
        `artifact_ptrs`. Optional `Idempotency-Key` retries are scoped by tenant
        and endpoint: the same normalized request replays the first 201 response
        without appending a duplicate event, while the same key with a different
        normalized request returns 409 `idempotency_conflict`. The append and
        replay record commit in one Redis transaction. If the replay record has
        expired and the same logical `event_id` is already present, the API
        returns 409 `idempotency_window_expired` and does not append a duplicate
        event.
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeAgentActionEventWriteRequest'
      responses:
        '201':
          description: Edge event appended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeAgentActionEvent'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '409':
          $ref: '#/components/responses/EdgeConflict'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/events/batch:
    post:
      operationId: createEdgeEventsBatch
      summary: Append a batch of Edge agent action events
      description: >-
        Appends a fully prevalidated, ordered batch for existing Edge
        session/execution parents. Mixed-tenant or invalid items are rejected
        before append where possible. Large raw payloads must be stored separately
        and referenced by `artifact_ptrs`. Optional `Idempotency-Key` retries are
        scoped by tenant and endpoint: the same normalized batch replays the
        first 201 response without partial append or duplicate events, while the
        same key with a different normalized batch returns 409
        `idempotency_conflict`. The append and replay record commit in one Redis
        transaction. If the replay record has expired and any same logical
        `event_id` is already present, the API returns 409
        `idempotency_window_expired` and does not append duplicate events.
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeAgentActionEventBatchRequest'
      responses:
        '201':
          description: Edge events appended in input order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeAgentActionEventBatchResponse'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '409':
          $ref: '#/components/responses/EdgeConflict'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/runtime/events:
    post:
      operationId: ingestEdgeRuntimeEvents
      summary: Ingest bounded runtime telemetry from a trusted sidecar
      description: >-
        Disabled by default. When `CORDUM_EDGE_RUNTIME_INGEST_ENABLED` is unset
        (or set to a non-truthy value), the route returns 503 `service_unavailable`
        and persists nothing. When enabled, the endpoint accepts a bounded,
        redacted runtime event batch (process exec, file read/write, network
        connect, DNS query) from an authenticated runtime collector holding
        `edge.runtime.ingest`; generic job writers are forbidden. The request
        `source.source_id` must match the authenticated collector principal and
        the referenced session/execution must be bound to that collector before
        mapped `AgentActionEvent` records with `layer=runtime` and
        `decision=RECORDED` are persisted through the existing Edge store. Raw
        argv, file contents, packet
        payloads, DNS response bodies, request bodies, headers, secrets, and
        tokens are rejected at the strict-schema decode boundary. All-or-nothing
        batch acceptance — a single invalid envelope aborts the whole batch.
        See `docs/edge/runtime-ingestion.md` for the full contract.
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeRuntimeIngestRequest'
      responses:
        '201':
          description: Runtime events appended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeRuntimeIngestResponse'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '429':
          description: Per-execution event cap exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeError'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/sessions/{session_id}/events:
    get:
      operationId: listEdgeSessionEvents
      summary: List Edge events for a session
      description: Returns tenant-scoped events across executions in the session with cursor pagination and optional kind, decision, and RFC3339 time-window filters.
      tags:
      - Edge
      parameters:
      - name: session_id
