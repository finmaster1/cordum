  /api/v1/edge/binary-integrity/events:
    post:
      operationId: ingestBinaryVerify
      summary: Ingest install-time binary-verify outcomes
      description: |
        Persists structured binary-verify outcomes emitted by
        `tools/scripts/install.{sh,ps1}` (the pre-activation integrity
        gate documented in `docs/security/binary-signing.md` §8).
        Operators capture install-script stderr (one JSON line per
        binary verified), batch it into the `events` array, and POST
        here. Each event is validated against `model.BinaryVerifyEvent`
        and persisted through the existing audit chain as a SIEMEvent
        with `EventType = binary-verify-ok | binary-verify-fail`.

        Partial-success semantics: per-event validation failures are
        reported in the response `errors[]` and counted in `rejected`;
        accepted events are persisted. A request with zero accepted
        events returns 400.

        Auth: requires `audit.export` permission or `admin` role,
        plus tenant access enforced via `X-Tenant-ID`.
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestBinaryVerifyRequest'
      responses:
        '202':
          description: At least one event was accepted and persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestBinaryVerifyResponse'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
    get:
      operationId: listBinaryVerify
      summary: List binary-verify outcomes for a tenant
      description: |
        Returns a tenant-scoped reverse-chronological page of
        binary-verify outcomes recovered from the tenant audit
        stream. Filters narrow the page; values that fall outside
        the accepted enums return 400. The response envelope mirrors
        `/api/v1/audit/events` (items / next_cursor / returned) but
        each item carries the original BinaryVerifyEvent shape plus a
        server-side timestamp and endpoint label.

        Auth: requires `audit.read` permission or `admin` role,
        plus tenant access enforced via `X-Tenant-ID`.
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: tenant
        in: query
        required: false
        description: |
          Tenant id whose audit stream should be read. Must match
          caller scope; defaults to the authenticated/header tenant.
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: |
          Maximum number of events in the response page. Default 100;
          values above 200 are silently capped to 200 to bound the
          Redis fetch cost.
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 200
      - name: cursor
        in: query
        required: false
        description: |
          Opaque stream-id cursor returned as `next_cursor` from the
          previous page. Format `<ms>-<seq>`; empty `next_cursor`
          means end-of-stream.
        schema:
          type: string
      - name: event
        in: query
        required: false
        description: |
          Filter by outcome. Short forms `ok` / `fail` are accepted
          and normalized to the canonical `binary-verify-ok` /
          `binary-verify-fail` event types.
        schema:
          type: string
          enum: [ok, fail, binary-verify-ok, binary-verify-fail]
      - name: sig_scheme
        in: query
        required: false
