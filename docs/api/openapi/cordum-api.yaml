          type: string
        version:
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - UNINSTALLED
          - ERROR
        description:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        installed_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        verification:
          $ref: '#/components/schemas/InstalledPackVerification'
          description: |
            Server-verified pack signature state. Pre-existing installs
            from before signature verification shipped read as absent;
            clients SHOULD render an absent value as {signed: false}.
    InstalledPackVerification:
      type: object
      description: |
        Pack-signature verification outcome computed by the gateway at
        install time. Never client-supplied — the gateway discards any
        `verification` field on the install payload and computes its own.
        Pre-existing installs default to {signed: false} when this object
        is absent.
      required: [signed]
      properties:
        signed:
          type: boolean
          description: |
            True when the gateway successfully verified the pack against
            a trusted publisher key at install time.
        publisher_id:
          type: string
          description: Publisher identifier derived from the trusted key's metadata.
        kid:
          type: string
          description: Key id of the Ed25519 public key that verified the pack.
        verified_at:
          type: string
          format: date-time
          description: RFC3339 timestamp of the server-side verification.
        has_cordum_counter_sig:
          type: boolean
          description: |
            True when a valid Cordum counter-signature envelope
            (pack.yaml.sig.cordum) is present and verified against the
            embedded Cordum counter-signing key.
        signature_algorithm:
          type: string
          enum: [ed25519]
          description: Algorithm advertised by the verified envelope. Always ed25519 today.
        pack_signature_version:
          type: integer
          minimum: 1
          description: Canonical manifest version that was signed.
        warnings:
          type: array
          description: |
            Non-fatal warnings the gateway wants to surface alongside the
            verification outcome (for example, "pack accepted unsigned —
            gateway strict mode disabled").
          items:
            type: string
    PackVerification:
      type: object
      properties:
        pack_id:
          type: string
        valid:
          type: boolean
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              passed:
                type: boolean
              message:
                type: string
