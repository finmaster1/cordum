  /api/v1/governance/approvals/analytics:
    get:
      operationId: getApprovalAnalytics
      summary: Approval analytics (time-to-approve, auto vs manual, bottlenecks)
      description: |
        Aggregated approval KPIs for the requested window. Consumes the
        Policy Decision Log as the source of truth, pairs each
        require_approval verdict with its ApprovalRecord, and computes
        per-group breakdowns sorted with the slowest approvers first so
        bottlenecks surface at the top.

        Requires the `governance.read` permission.

        Responses are memoised per `(tenant, window, group_by, limit)`
        tuple for 30 seconds so dashboards can poll without thrashing
        the decision-log index.
      tags: [Governance]
      security:
      - apiKey: []
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: window
        in: query
        description: Shorthand for `since`/`until` (wins when supplied). One of `24h`, `7d`, `30d`.
        required: false
        schema:
          type: string
          enum: [24h, 7d, 30d]
      - name: since
        in: query
        description: Inclusive lower bound (RFC3339 or unix milliseconds). Defaults to 24h before `until`.
        required: false
        schema:
          type: string
      - name: until
        in: query
        description: Exclusive upper bound (RFC3339 or unix milliseconds). Defaults to now.
        required: false
        schema:
          type: string
      - name: group_by
        in: query
        description: Breakdown axis; `overall` returns only the window-wide summary.
        required: false
        schema:
          type: string
          enum: [overall, rule, agent, topic]
          default: overall
      - name: limit
        in: query
        description: Top-N rows per group (bounded at 50). Ignored when `group_by=overall`.
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
      responses:
        '200':
          description: Approval analytics response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalAnalyticsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Decision log store unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key issued by the Cordum admin.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/v1/auth/login.
  parameters:
    TenantID:
      name: X-Tenant-ID
      in: header
      required: true
      description: Tenant isolation header (required on all protected routes).
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional idempotency key for safe retries. Edge event create/batch scopes keys by tenant and endpoint, replays the first response for the same normalized request, and returns 409 `idempotency_conflict` if the same key is reused with a different normalized request. Callers SHOULD send a UUID (per the original Job submit contract); the Edge runtime additionally accepts any non-empty string up to 512 bytes for backward-compatible local-dev keys.
      schema:
        type: string
        format: uuid
        maxLength: 512
    JobID:
      name: id
      in: path
      required: true
      description: Job ID
      schema:
        type: string
    WorkflowID:
      name: id
      in: path
      required: true
      description: Workflow ID
      schema:
        type: string
    RunID:
      name: id
      in: path
      required: true
      description: Workflow run ID
      schema:
        type: string
    UserID:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        type: string
    RoleName:
      name: name
      in: path
      required: true
      schema:
        type: string
    WorkerID:
      name: id
      in: path
      required: true
      schema:
        type: string
    WorkerCredentialID:
      name: worker_id
      in: path
      required: true
      schema:
        type: string
    PoolName:
      name: name
      in: path
      required: true
      schema:
        type: string
    TopicName:
      name: name
      in: path
      required: true
      schema:
        type: string
    TopicPath:
      name: topic
      in: path
      required: true
      schema:
        type: string
    HoldID:
      name: id
      in: path
      required: true
      schema:
        type: string
    LimitQ:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ForceQ:
      name: force
      in: query
      required: false
      schema:
        type: boolean
        default: false
    TenantQ:
      name: tenant
      in: query
      required: false
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request — invalid or missing parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized — missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict — resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PayloadTooLarge:
      description: Payload too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests — rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGateway:
      description: Bad gateway — upstream service error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    EdgeBadRequest:
      description: Edge bad request — invalid or missing parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeUnauthorized:
      description: Edge unauthorized — missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeForbidden:
      description: Edge forbidden — insufficient permissions or tenant access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeNotFound:
      description: Edge resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeConflict:
      description: Edge conflict — resource state or idempotency conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgePayloadTooLarge:
      description: Edge payload too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeInternalServerError:
      description: Edge internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeBadGateway:
      description: Edge bad gateway — upstream service error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeServiceUnavailable:
      description: Edge service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeMaxExecutionsExceeded:
      description: |
        The target Edge session already holds the maximum number of
        AgentExecution rows allowed by the gateway. Configure the cap via
        CORDUM_EDGE_MAX_EXECUTIONS_PER_SESSION; default 100. End the session
        and start a new one to continue recording executions. Error envelope
        `code` is `max_executions_exceeded`; `details` carries
        `{limit, current}`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    EdgeEventCapExceeded:
      description: |
        The target Edge execution already holds the maximum number of
        AgentActionEvent rows allowed by the store (default 5000). End the
        execution or start a new session to continue recording evidence. Error
        envelope `code` is `event_cap_exceeded`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeError'
    TierLimit:
      description: Forbidden by current license entitlements
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericObject'
    GovernanceHealthResponse:
      description: Composite governance health score
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GovernanceHealth'
  schemas:
    MCPUpstreamServer:
      type: object
      required: [name, transport, tenant_id, risk, enabled]
      properties:
        name:
          type: string
          pattern: '^[A-Za-z0-9.-]+$'
        transport:
          type: string
          enum: [stdio, http, sse]
        endpoint:
          type: string
          format: uri
          description: HTTPS endpoint for http/sse transports; unsafe local endpoints are rejected in strict policy modes.
        command:
          type: array
          description: Shell-free argv vector for stdio transport. Shell metacharacters are rejected.
          items:
            type: string
        tenant_id:
          type: string
          description: Tenant scope for the upstream; `*` is reserved for system-wide entries.
        auth_secret_ref:
          type: string
          pattern: '^secret://'
          description: Reference to auth material. Raw secrets are rejected and never resolved in registry responses.
        labels:
          type: object
          additionalProperties:
            type: string
        risk:
          type: string
          enum: [low, medium, high, critical]
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    MCPUpstreamServerWriteRequest:
      type: object
      description: Write payload for an upstream MCP entry. `tenant_id` may be omitted and is resolved from X-Tenant-ID; `created_at` and `updated_at` are server-managed.
      properties:
        name:
          type: string
          pattern: '^[A-Za-z0-9.-]+$'
        transport:
          type: string
          enum: [stdio, http, sse]
        endpoint:
          type: string
          format: uri
        command:
          type: array
          items:
            type: string
        tenant_id:
          type: string
        auth_secret_ref:
          type: string
          pattern: '^secret://'
        labels:
          type: object
          additionalProperties:
            type: string
        risk:
          type: string
          enum: [low, medium, high, critical]
        enabled:
          type: boolean
    MCPUpstreamListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MCPUpstreamServer'
    MCPUpstreamValidationResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        reason:
          type: string
          description: Redacted validation failure reason, never a raw secret.
    EdgeSessionCreateRequest:
      type: object
      properties:
        tenant_id:
          type: string
          description: Optional body tenant; when present it must match X-Tenant-ID.
        principal_id:
          type: string
        principal_type:
          type: string
          enum: [human, service, unknown]
        agent_product:
          type: string
        agent_version:
          type: string
        mode:
          type: string
          enum: [local-dev, enterprise-managed, workflow, ci, prod-runner]
        repo:
          type: string
        git_remote:
          type: string
        git_branch:
          type: string
        git_sha:
          type: string
        cwd:
          type: string
        host_id:
          type: string
        device_id:
          type: string
        trace_id:
          type: string
        workflow_run_id:
          type: string
        job_id:
          type: string
        policy_snapshot:
          type: string
          description: Redacted policy snapshot identifier or summary; raw secrets are redacted before persistence/response.
        enforcement_layers:
          $ref: '#/components/schemas/EdgeEnforcementLayers'
        policy_mode:
          type: string
          enum: [observe, enforce, enterprise-strict]
        labels:
          $ref: '#/components/schemas/EdgeLabels'
    EdgeSessionCreateResponse:
      type: object
      required: [session_id, execution_id, trace_id, policy_snapshot, dashboard_url, session, execution]
      properties:
        session_id:
          type: string
        execution_id:
          type: string
        trace_id:
          type: string
        policy_snapshot:
          type: string
          description: Redacted policy snapshot identifier or summary; raw secrets are redacted before persistence/response.
        dashboard_url:
          type: string
          description: Relative dashboard URL for the Edge session.
        session:
          $ref: '#/components/schemas/EdgeSession'
        execution:
          $ref: '#/components/schemas/EdgeAgentExecution'
    EdgeSessionPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EdgeSession'
        next_cursor:
          type: string
          nullable: true
    EdgeExecutionPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EdgeAgentExecution'
        next_cursor:
          type: string
          nullable: true
    EdgeHeartbeatResponse:
      type: object
      required: [session_id, heartbeat_alive]
      properties:
        session_id:
          type: string
        heartbeat_alive:
          type: boolean
    EdgeEndSessionRequest:
      type: object
      properties:
        status:
          type: string
          enum: [ended, failed]
          default: ended
        ended_at:
          type: string
          format: date-time
    EdgeExecutionCreateRequest:
      type: object
      required: [session_id]
      properties:
        tenant_id:
          type: string
          description: Optional body tenant; when present it must match X-Tenant-ID.
        session_id:
          type: string
        adapter:
          type: string
          enum: [claude-code-hook, mcp-gateway, llm-proxy, runtime-sidecar, sdk-runner]
        mode:
          type: string
          enum: [local-dev, enterprise-managed, workflow, ci, prod-runner]
        workflow_run_id:
          type: string
        step_id:
          type: string
        job_id:
          type: string
        attempt:
          type: integer
          minimum: 0
        trace_id:
          type: string
        worker_id:
          type: string
        policy_snapshot:
          type: string
          description: Redacted policy snapshot identifier or summary; raw secrets are redacted before persistence/response.
        labels:
          $ref: '#/components/schemas/EdgeLabels'
    EdgeEndExecutionRequest:
      type: object
      properties:
        status:
          type: string
          enum: [succeeded, failed, cancelled, timeout]
          default: succeeded
        ended_at:
          type: string
          format: date-time
    EdgeApprovalDecisionRequest:
      type: object
      description: Human resolver note for approving or rejecting an Edge action approval.
      properties:
        reason:
          type: string
          maxLength: 4096
    EdgeApprovalPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EdgeApproval'
        next_cursor:
          type: string
          nullable: true
    EdgeApproval:
      type: object
      description: Tenant-scoped action approval bound to an Edge session/execution/event, action hash, and policy snapshot. Raw action/tool payloads are not stored here; use hashes and artifact pointers for evidence.
      required: [approval_ref, tenant_id, session_id, execution_id, event_id, principal_id, requester, status, reason, rule_id, policy_snapshot, action_hash, input_hash, created_at, expires_at]
      properties:
        approval_ref:
          type: string
          pattern: ^edge_appr_[A-Za-z0-9_-]+$
        tenant_id:
          type: string
        session_id:
          type: string
        execution_id:
          type: string
        event_id:
          type: string
        principal_id:
          type: string
          description: Principal that requested the governed action.
        requester:
          type: string
          description: Authenticated requester identity used for self-approval protection.
        resolver_id:
          type: string
          description: Principal that approved/rejected/expired the approval.
        resolved_by:
          type: string
          description: Display/audit identity for the resolver.
        status:
          type: string
          enum: [pending, approved, rejected, expired, invalidated]
        decision:
          type: string
          enum: ["", approve, reject, expire, invalidate]
          description: Empty while pending; terminal decisions match status.
        reason:
          type: string
          description: Trigger reason explaining why approval was required.
        resolution_reason:
          type: string
          description: Resolver-provided reason or system expiry reason for terminal records.
        rule_id:
          type: string
        policy_snapshot:
          type: string
          description: Redacted policy snapshot identifier; used to reject stale approvals.
        action_hash:
          type: string
          description: Stable action hash. The raw action payload is not stored.
        input_hash:
          type: string
          description: Stable hash of the redacted/bounded action input used for evidence correlation.
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        consumed_at:
          type: string
          format: date-time
          nullable: true
          description: Set once an approved approval is atomically claimed by the agent retry path.
        labels:
          $ref: '#/components/schemas/EdgeLabels'
        metadata:
          type: object
          additionalProperties:
            type: string
    EdgeSession:
