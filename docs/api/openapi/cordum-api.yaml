      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Unified Global policy snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyGlobalDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updatePolicyGlobal
      summary: Atomically update the unified Global policy authority
      description: |
        EDGE-052 — atomically writes one or more sections of the Global
        policy. Sections not present in the request body are left
        unchanged. A `snapshot_version` field on the request acts as
        optimistic concurrency: when non-empty and != the current
        snapshot the request is rejected with 409 Conflict.
      tags:
      - Policy
      parameters:
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyGlobalRequest'
      responses:
        '200':
          description: Unified Global policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyGlobalDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: snapshot_version mismatch (optimistic concurrency)
        '500':
          $ref: '#/components/responses/InternalServerError'
