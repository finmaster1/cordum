  /api/v1/audit/export:
    get:
      operationId: exportAuditCompliance
      summary: Stream compliance audit export
      description: |
        Streams a compliance-shaped audit export (ndjson or csv) for a bounded time window.
        Admin-only; gated by the `siem_export` or `audit_export` entitlement. The response is
        retention-aware: windows older than the configured retention + skew are rejected. The
        body carries SOC2 mapping columns when the operator has configured a mapping table.
      tags:
      - AuditExport
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: from
        in: query
        description: Inclusive lower bound (RFC3339 timestamp)
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        description: Exclusive upper bound (RFC3339 timestamp)
        schema:
          type: string
          format: date-time
      - name: format
        in: query
        description: Output format
        schema:
          type: string
          enum:
          - ndjson
          - csv
          default: ndjson
      - name: max_events
        in: query
        description: Cap on events emitted (clamped to entitlement ceiling)
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Streaming compliance export body (ndjson or csv)
          content:
            application/x-ndjson:
              schema:
                type: string
            text/csv:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TierLimit'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          description: Audit stream unavailable
          content:
            application/json:
