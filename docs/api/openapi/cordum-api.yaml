  /api/v1/governance/approvals/analytics:
    get:
      operationId: getApprovalAnalytics
      summary: Approval analytics (time-to-approve, auto vs manual, bottlenecks)
      description: |
        Aggregated approval KPIs for the requested window. Consumes the
        Policy Decision Log as the source of truth, pairs each
        require_approval verdict with its ApprovalRecord, and computes
        per-group breakdowns sorted with the slowest approvers first so
        bottlenecks surface at the top.

        Requires the `governance.read` permission.

        Responses are memoised per `(tenant, window, group_by, limit)`
        tuple for 30 seconds so dashboards can poll without thrashing
        the decision-log index.
      tags: [Governance]
      security:
      - apiKey: []
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: window
        in: query
        description: Shorthand for `since`/`until` (wins when supplied). One of `24h`, `7d`, `30d`.
        required: false
        schema:
          type: string
          enum: [24h, 7d, 30d]
      - name: since
        in: query
        description: Inclusive lower bound (RFC3339 or unix milliseconds). Defaults to 24h before `until`.
        required: false
        schema:
          type: string
      - name: until
        in: query
        description: Exclusive upper bound (RFC3339 or unix milliseconds). Defaults to now.
        required: false
        schema:
          type: string
      - name: group_by
        in: query
        description: Breakdown axis; `overall` returns only the window-wide summary.
        required: false
        schema:
          type: string
          enum: [overall, rule, agent, topic]
          default: overall
      - name: limit
        in: query
        description: Top-N rows per group (bounded at 50). Ignored when `group_by=overall`.
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
      responses:
        '200':
          description: Approval analytics response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalAnalyticsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Decision log store unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key issued by the Cordum admin.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/v1/auth/login.
  parameters:
    TenantID:
      name: X-Tenant-ID
      in: header
      required: true
      description: Tenant isolation header (required on all protected routes).
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional idempotency key for safe retries.
      schema:
        type: string
        format: uuid
    JobID:
      name: id
      in: path
      required: true
      description: Job ID
      schema:
        type: string
    WorkflowID:
      name: id
      in: path
      required: true
      description: Workflow ID
      schema:
        type: string
    RunID:
      name: id
      in: path
      required: true
      description: Workflow run ID
      schema:
        type: string
    UserID:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        type: string
    RoleName:
      name: name
      in: path
      required: true
      schema:
        type: string
    WorkerID:
      name: id
      in: path
      required: true
      schema:
        type: string
    WorkerCredentialID:
      name: worker_id
      in: path
      required: true
      schema:
        type: string
    PoolName:
      name: name
      in: path
      required: true
      schema:
        type: string
    TopicName:
      name: name
      in: path
      required: true
      schema:
        type: string
    TopicPath:
      name: topic
      in: path
      required: true
      schema:
        type: string
    HoldID:
      name: id
      in: path
      required: true
      schema:
        type: string
    LimitQ:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ForceQ:
      name: force
      in: query
      required: false
      schema:
        type: boolean
        default: false
    TenantQ:
      name: tenant
      in: query
      required: false
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request — invalid or missing parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized — missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict — resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PayloadTooLarge:
      description: Payload too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests — rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGateway:
      description: Bad gateway — upstream service error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TierLimit:
      description: Forbidden by current license entitlements
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericObject'
    GovernanceHealthResponse:
      description: Composite governance health score
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GovernanceHealth'
  schemas:
    ApprovalAnalyticsResponse:
      type: object
      required: [window, summary]
      properties:
        window:
          type: object
          required: [since, until]
          properties:
            since:
              type: string
              format: date-time
            until:
              type: string
              format: date-time
        summary:
          $ref: '#/components/schemas/ApprovalAnalyticsSummary'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalAnalyticsGroup'
    ApprovalAnalyticsSummary:
      type: object
      required: [total, approved, rejected, expired, auto_resolved, manual_resolved]
      properties:
        total:
          type: integer
          description: Total decisions with verdict=require_approval in the window (includes still-pending).
        approved:
          type: integer
        rejected:
          type: integer
        expired:
          type: integer
        auto_resolved:
          type: integer
          description: Resolutions driven by lifecycle events (expire/invalidate/repair), not human decision.
        manual_resolved:
          type: integer
          description: Resolutions where a human approver entered approve or reject.
        avg_time_to_approve_seconds:
          type: number
          nullable: true
          description: Null when no approvals resolved in the window — distinguishes "no data" from "all resolved in 0 s".
        p50:
          type: number
          nullable: true
        p90:
          type: number
          nullable: true
        p99:
          type: number
          nullable: true
    ApprovalAnalyticsGroup:
      type: object
      required: [key, label, total, approved, rejected, expired, auto_count, manual_count]
      properties:
        key:
          type: string
          description: Group identifier (rule id, agent id, or topic string).
        label:
          type: string
        total:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        expired:
          type: integer
        auto_count:
          type: integer
        manual_count:
          type: integer
        avg_ttar_seconds:
          type: number
          nullable: true
        p90_seconds:
          type: number
          nullable: true
    GovernanceHealth:
      type: object
      required: [score, grade, generated_at, factors]
      properties:
        score:
          type: integer
        grade:
          type: string
          enum: [A, B, C, D, F]
        generated_at:
          type: string
          format: date-time
        factors:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/GovernanceHealthFactor'
        truncated_at_max:
          type: boolean
    GovernanceHealthFactor:
      type: object
      required: [score, weight]
      properties:
        score:
          type: integer
        weight:
          type: number
        raw:
          description: Factor-specific raw measurement payload.
        notes:
          type: string
    DelegationChainLink:
      type: object
      required: [agent_id, issued_at, expires_at, jti, issued_by]
      properties:
        agent_id:
          type: string
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        jti:
          type: string
        parent_jti:
          type: string
          nullable: true
        issued_by:
          type: string
    DelegationView:
      type: object
      required: [jti, issuer, subject, audience, chain_depth, issued_at, expires_at, revoked]
      properties:
        jti:
          type: string
        issuer:
          type: string
          description: Root issuer for the delegation chain.
        subject:
          type: string
          description: Agent that issued the token.
        audience:
          type: string
          description: Target agent the token was minted for.
        allowed_actions:
          type: array
          items:
            type: string
        allowed_topics:
          type: array
          items:
            type: string
        chain:
          type: array
          items:
            $ref: '#/components/schemas/DelegationChainLink'
        chain_depth:
          type: integer
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        revoked:
          type: boolean
        revoked_at:
          type: string
          format: date-time
          nullable: true
        revoked_reason:
          type: string
          nullable: true
    DelegationListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DelegationView'
        next_cursor:
          type: string
          nullable: true
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
        status:
          type: integer
          description: HTTP status code
      required:
      - error
      - status
    PaginatedResponse:
      type: object
      properties:
        next_cursor:
          type: string
          nullable: true
          description: Cursor for the next page (null if no more pages)
    AuthConfig:
      type: object
      properties:
        password_enabled:
          type: boolean
        user_auth_enabled:
          type: boolean
        saml_enabled:
          type: boolean
        saml_enterprise:
          type: boolean
        saml_login_url:
          type: string
        saml_metadata_url:
          type: string
        oidc_enabled:
          type: boolean
        oidc_issuer:
          type: string
        oidc_login_url:
          type: string
        oidc_client_id:
          type: string
        oidc_redirect_uri:
          type: string
        oidc_scopes:
          type: array
          items:
            type: string
        oidc_groups_claim:
          type: string
          description: OIDC claim containing IdP group names, defaulting to groups.
        oidc_group_role_mapping:
          type: object
          additionalProperties:
            type: string
            enum: [admin, operator, viewer]
          description: Case-insensitive group name to Cordum role mapping.
        oidc_client_secret_masked:
          type: string
        session_ttl:
          type: string
        require_rbac:
          type: boolean
        require_principal:
          type: boolean
        default_tenant:
          type: string
    OIDCGroupRoleMappingUpdateRequest:
      type: object
      required: [oidc_group_role_mapping]
      properties:
        oidc_groups_claim:
          type: string
          default: groups
          description: OIDC claim containing IdP group names.
        oidc_group_role_mapping:
          type: object
          additionalProperties:
            type: string
            enum: [admin, operator, viewer]
          description: JSON object mapping Okta/OIDC group names to Cordum roles.
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        tenant:
          type: string
      required:
      - username
      - password
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/AuthUser'
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
      required:
      - current_password
      - new_password
    AuthUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        tenant:
          type: string
        roles:
          type: array
          items:
            type: string
        source:
          type: string
          description: Auth source (local, saml, oidc)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true
    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        tenant:
          type: string
        role:
          type: string
      required:
      - username
      - password
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
    APIKeyInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
