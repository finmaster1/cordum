  /api/v1/approvals/{job_id}/context:
    get:
      operationId: getApprovalContext
      summary: Get enriched approval context for a single job
      description: >
        Returns all enriched context for a single approval in one call:
        blast radius, prior approvals, rollback hints, policy snapshot summary,
        time remaining, and parsed constraints. Used by the approval detail page.
      tags:
      - Approvals
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Enriched approval context
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval:
                    type: object
                    description: Full approval record with decision summary and workflow metadata
                  blast_radius:
                    type: object
                    properties:
                      systems:
                        type: array
                        items:
                          type: string
                      namespaces:
                        type: array
                        items:
                          type: string
                      resources:
                        type: array
                        items:
                          type: string
                      scope_description:
                        type: string
                  prior_approvals:
                    type: array
                    items:
                      type: object
                      properties:
                        job_id:
                          type: string
                        topic:
                          type: string
                        tenant:
                          type: string
                        decision:
                          type: string
                        resolved_by:
                          type: string
                        resolved_at:
                          type: integer
                          format: int64
                        was_approved:
                          type: boolean
                  rollback_hint:
                    type: string
                    description: Pack-provided rollback instructions
                  policy_snapshot_summary:
                    type: object
                    properties:
                      rule_count:
                        type: integer
                      matched_rule:
                        type: object
                        properties:
                          id:
                            type: string
                          description:
                            type: string
                          decision:
                            type: string
                          constraints_summary:
                            type: string
                      policy_version:
                        type: string
                  time_remaining_ms:
                    type: integer
                    format: int64
                    nullable: true
                    description: Milliseconds until approval deadline, null if no deadline
                  constraints:
                    type: object
                    nullable: true
                    description: Parsed policy constraints from safety decision
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
