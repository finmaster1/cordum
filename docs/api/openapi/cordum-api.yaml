        bucket:
          type: string
          description: Bucket width as the caller requested (e.g. `1m`, `5m`).
          enum: [1m, 5m, 15m, 1h, 1d]
        from_ms:
          type: integer
          format: int64
        to_ms:
          type: integer
          format: int64
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/ShadowTimeseriesBucket'
        truncated_at_max:
          type: boolean
      required:
      - bucket
      - from_ms
      - to_ms
      - buckets
      - truncated_at_max
    RollbackPolicyRequest:
      type: object
      properties:
        snapshot_id:
          type: string
        author:
          type: string
        message:
          type: string
        note:
          type: string
      required:
      - snapshot_id
      - author
    AuditEvent:
      type: object
      description: |
        One SIEM audit event returned by `GET /api/v1/audit/events`. Mirrors
        the gateway handler's `auditEventResponseItem` (which itself mirrors
        `audit.SIEMEvent` in `core/audit/exporter.go`). The `extra` map's
        secret-shaped keys (token / password / api_key / private_key / secret)
        are stripped server-side as defense-in-depth before the response is
        serialized; their absence does NOT imply the source event lacked them.
      properties:
        id:
          type: string
          description: |
            Opaque per-event handle (Redis Stream message ID under the hood).
            Stable across pagination — safe to use as a row key.
        seq:
          type: integer
          format: int64
          description: |
            Per-tenant monotonic chain sequence. First event for a tenant has
            seq=1. Pairs with `/api/v1/audit/verify` for forensic re-check.
        timestamp:
          type: string
          format: date-time
        event_type:
          type: string
        severity:
          type: string
          description: One of CRITICAL / HIGH / MEDIUM / LOW / INFO.
        tenant_id:
          type: string
        agent_id:
          type: string
        agent_name:
          type: string
        agent_risk_tier:
          type: string
        job_id:
          type: string
        action:
          type: string
        decision:
          type: string
        matched_rule:
          type: string
        reason:
          type: string
        risk_tags:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
        policy_version:
          type: string
        identity:
          type: string
          description: Identity of the actor who produced the event.
        extra:
          type: object
          additionalProperties:
            type: string
          description: |
            Free-form per-event metadata. Secret-shaped keys are stripped
            before serialization (see schema-level description).
        event_hash:
          type: string
          description: SHA-256 of the canonical event payload, hex-encoded.
        prev_hash:
          type: string
          description: |
            EventHash of the tenant's predecessor event, or empty for genesis.
      required:
      - id
      - seq
      - timestamp
      - event_type
      - severity
      - tenant_id
      - action
    AuditEventsEnvelope:
      type: object
      description: |
        Paginated envelope returned by `GET /api/v1/audit/events`. `next_cursor`
        is opaque; pass it back as `?cursor=` on the next request. Empty
        `next_cursor` means end-of-stream — clients should stop polling.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        next_cursor:
          type: string
          description: Opaque cursor for the next page; empty when no more events.
        returned:
          type: integer
          description: Number of items in this page (== `items.length`).
      required:
      - items
      - next_cursor
      - returned
    PolicyAuditEntry:
      type: object
      description: |
        One entry in the policy audit log. Mirrors `policybundles.PolicyAuditEntry`
        in `core/controlplane/gateway/policybundles/types.go`. The legacy
        `author` / `timestamp` / `bundle_id` (singular) / `snapshot_id`
        fields are preserved for backwards-compat with consumers of the
        v1 spec but are not populated by the current backend handler;
        prefer `actor_id` / `created_at` / `bundle_ids` (plural) /
        `snapshot_before` + `snapshot_after`.
      properties:
        id:
          type: string
        action:
          type: string
        author:
          type: string
          deprecated: true
          description: |
            Deprecated. The current backend handler does not populate this
            field; it remains in the schema only to avoid breaking
            consumers that read the v1 type.
        timestamp:
          type: string
          format: date-time
          deprecated: true
          description: |
            Deprecated. Use `created_at`. The current backend handler
            does not populate this field.
        bundle_id:
          type: string
          nullable: true
          deprecated: true
          description: |
            Deprecated. Use `bundle_ids` (plural). The current backend
            handler does not populate this field.
        snapshot_id:
          type: string
          nullable: true
          deprecated: true
          description: |
            Deprecated. Use `snapshot_before` and `snapshot_after`. The
            current backend handler does not populate this field.
        message:
          type: string
          nullable: true
        resource_type:
          type: string
          nullable: true
          description: Audited resource kind, e.g. `rule`, `bundle`, `input`, `output`.
        resource_id:
          type: string
          nullable: true
        resource_name:
          type: string
          nullable: true
        actor_id:
          type: string
          nullable: true
          description: Identifier of the principal who performed the action.
        role:
          type: string
          nullable: true
        auth_source:
          $ref: '#/components/schemas/AuthSource'
        agent_id:
          type: string
          nullable: true
        agent_name:
          type: string
          nullable: true
        agent_risk_tier:
          type: string
          nullable: true
        bundle_ids:
          type: array
          nullable: true
          items:
            type: string
          description: |
            Bundles affected by this audit event. Replaces the legacy
            singular `bundle_id` field.
        reason:
          type: string
          nullable: true
        decision:
          type: string
          nullable: true
        matched_rule:
          type: string
          nullable: true
        policy_version:
          type: string
          nullable: true
        extra:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: |
            Free-form per-event metadata. Keys and values are emitted
            verbatim from the gateway handler's audit-construction site.
        snapshot_before:
          type: string
          nullable: true
          description: Audit-chain hash of the resource state before the action.
        snapshot_after:
          type: string
          nullable: true
          description: Audit-chain hash of the resource state after the action.
        created_at:
          type: string
          description: |
            RFC3339 timestamp when the audit entry was created. Plain
            string (not `format: date-time`) because the backend stores
            the raw value and lex-compares it against `after` / `before`
            query params.
      required:
      - id
      - action
      - created_at
    PolicyAuditEnvelope:
      type: object
      description: |
        Paginated envelope returned by `GET /api/v1/policy/audit`. The
        `type=output` special path on the same endpoint returns only the
        `items` field; consumers should treat `total` / `has_more` /
        `offset` as optional when filtering by that type.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PolicyAuditEntry'
        total:
          type: integer
          format: int64
          description: Total entries matching the filter (pre-pagination).
        has_more:
          type: boolean
          description: True when more entries are available past the current window.
        offset:
          type: integer
          format: int64
          description: Echo of the requested offset (default 0).
      required:
      - items
    AuthSource:
      type: string
      nullable: true
      description: |
        Authentication mechanism that validated the request. Mirrors the
        `auth.AuthSource` typed enum at
        `core/controlplane/gateway/auth/types.go`.
      enum:
      - api_key
      - jwt
      - oidc
      - session
