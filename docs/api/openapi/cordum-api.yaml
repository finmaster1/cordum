openapi: 3.0.3
info:
  title: Cordum HTTP API
  version: '2026-05-09.2'
  description: Canonical OpenAPI 3.0.3 spec for the Cordum gateway HTTP surface.
  contact:
    name: Cordum Team
  license:
    name: Proprietary
servers:
- url: http://localhost:8081
  description: Gateway HTTP (local default)
- url: /
  description: Relative gateway base
tags:
- name: Auth
  description: Authentication and session management
- name: Users
  description: User CRUD (admin only)
- name: APIKeys
  description: API key lifecycle (admin only)
- name: Jobs
  description: Job submission, listing, and lifecycle
- name: Copilot
  description: Copilot session transcripts and linked operational context
- name: Edge
  description: Edge session and agent execution evidence APIs
- name: DLQ
  description: Dead-letter queue management (admin only)
- name: Workflows
  description: Workflow definition CRUD and execution
- name: WorkflowRuns
  description: Workflow run inspection and control
- name: Approvals
  description: Human-in-the-loop approval queue (admin only)
- name: Policy
  description: Safety policy evaluation, bundles, and snapshots
- name: Config
  description: Hierarchical configuration management
- name: Schemas
  description: JSON schema registry
- name: Locks
  description: Distributed lock management
- name: Packs
  description: Pack installation and management (admin only)
- name: Marketplace
  description: Pack marketplace catalog (admin only)
- name: Health
  description: Health checks and system status
- name: Memory
  description: Memory pointers and artifact storage
- name: MCP
  description: Model Context Protocol (SSE + JSON-RPC)
- name: Streaming
  description: WebSocket event streaming
- name: Workers
  description: Worker agent registration, status, and active job queries
- name: WorkerCredentials
  description: Manage per-worker authentication credentials (admin only)
- name: Pools
  description: Worker pool configuration, topic assignments, and drain operations
- name: Topics
  description: Topic registry for job routing and worker discovery
- name: License
  description: Platform license status, usage metrics, and reload (admin only)
- name: Telemetry
  description: Observability export configuration, consent, and usage stats
- name: AuditExport
  description: Cryptographic audit log export configuration and health checks (admin only)
- name: LegalHold
  description: Legal hold management for audit retention compliance (admin only)
- name: Governance
  description: Governance-native observability — policy decisions, approval analytics
- name: Agents
  description: Agent identities, delegation, and runtime statistics
- name: Delegation
  description: Delegation token issuance, verification, listing, and revocation
- name: Evals
  description: Evaluation dataset curation, incident extraction, and policy replay runs
security:
- apiKey: []
- bearerAuth: []
paths:
  /api/v1/auth/config:
    get:
      operationId: getAuthConfig
      summary: Get authentication configuration
      description: Returns the authentication methods enabled for the deployment.
      tags:
      - Auth
      security: []
      responses:
        '200':
          description: Auth configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfig'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/auth/oidc/group-role-mapping:
    put:
      operationId: updateOIDCGroupRoleMapping
      summary: Update OIDC groups-to-roles mapping
      description: Admin-only endpoint for updating the active Okta/OIDC groups claim and Cordum role mapping. Values are validated, applied to the live provider, and persisted into system/default config.
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OIDCGroupRoleMappingUpdateRequest'
      responses:
        '200':
          description: Sanitized authentication configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate with username and password
      tags:
      - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/auth/session:
    get:
      operationId: getSession
      summary: Get current session
      description: Returns the authenticated user and token metadata.
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Logout and invalidate session
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/TenantID'
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/password:
    post:
      operationId: changeOwnPassword
      summary: Change own password
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/users:
    post:
      operationId: createUser
      summary: Create a user
      tags:
      - Users
      parameters:
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: listUsers
      summary: List all users
      tags:
      - Users
      parameters:
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuthUser'
                required:
                - items
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/users/{id}:
    parameters:
    - $ref: '#/components/parameters/UserID'
    - $ref: '#/components/parameters/TenantID'
    put:
      operationId: updateUser
      summary: Update a user
      tags:
      - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteUser
      summary: Delete a user
      tags:
      - Users
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/users/{id}/password:
    post:
      operationId: resetUserPassword
      summary: Reset a user's password (admin)
      tags:
      - Users
      parameters:
      - $ref: '#/components/parameters/UserID'
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
              required:
              - password
      responses:
        '204':
          description: Password reset
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/auth/keys:
    get:
      operationId: listAPIKeys
      summary: List API keys
      tags:
      - APIKeys
      parameters:
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/APIKeyInfo'
                required:
                - items
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createAPIKey
      summary: Create an API key
      description: 'The raw secret is returned **only once** in the response. Store it

        securely; it cannot be retrieved again.

        '
      tags:
      - APIKeys
      parameters:
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          description: Key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/auth/keys/{id}:
    delete:
      operationId: deleteAPIKey
      summary: Revoke an API key
      tags:
      - APIKeys
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/TenantID'
      responses:
        '204':
          description: Key revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/copilot/sessions/{sessionId}:
    get:
      operationId: getCopilotSession
      summary: Get Copilot session detail
      description: Returns a Copilot chat transcript plus linked jobs and governance decisions.
      tags:
      - Copilot
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          pattern: ^[A-Za-z0-9_-]{1,128}$
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Copilot session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotSessionDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '501':
          description: Copilot session store is not wired yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/edge/sessions:
    post:
      operationId: createEdgeSession
      summary: Create an Edge session and initial execution
      description: |
        EDGE-060 — supports `Idempotency-Key`. A retry with the same key
        and identical body returns the SAME `session_id` /
        `execution_id` / `trace_id` (cached replay, 201). A retry with
        the same key but different body returns 409
        `idempotency_conflict`. Missing key falls back to non-idempotent
        behavior (every call generates fresh UUIDs).
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeSessionCreateRequest'
      responses:
        '201':
          description: Edge session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeSessionCreateResponse'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '409':
          $ref: '#/components/responses/EdgeConflict'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '429':
          $ref: '#/components/responses/EdgeEventCapExceeded'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
    get:
      operationId: listEdgeSessions
      summary: List Edge sessions for a tenant
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: principal_id
        in: query
        schema:
          type: string
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
      responses:
        '200':
          description: Edge session page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeSessionPageResponse'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/sessions/{session_id}:
    get:
      operationId: getEdgeSession
      summary: Get an Edge session
      tags:
      - Edge
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Edge session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeSession'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/sessions/{session_id}/heartbeat:
    post:
      operationId: heartbeatEdgeSession
      summary: Refresh an Edge session heartbeat
      tags:
      - Edge
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Heartbeat refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeHeartbeatResponse'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/sessions/{session_id}/end:
    post:
      operationId: endEdgeSession
      summary: End an Edge session
      tags:
      - Edge
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeEndSessionRequest'
      responses:
        '200':
          description: Ended Edge session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeSession'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/executions:
    get:
      operationId: listEdgeExecutions
      summary: List Edge agent executions for a tenant
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: session_id
        in: query
        schema:
          type: string
      - name: job_id
        in: query
        schema:
          type: string
      - name: trace_id
        in: query
        schema:
          type: string
      - name: workflow_run_id
        in: query
        schema:
          type: string
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
      responses:
        '200':
          description: Edge execution page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeExecutionPageResponse'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
    post:
      operationId: createEdgeExecution
      summary: Create an Edge agent execution
      description: |
        EDGE-060 — supports `Idempotency-Key`. A retry with the same
        key and identical body returns the SAME `execution_id` (cached
        replay, 201) without burning against the per-session execution
        cap. A retry with the same key but different body returns 409
        `idempotency_conflict`. Missing key falls back to non-idempotent
        behavior (every call generates a fresh `execution_id`).
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeExecutionCreateRequest'
      responses:
        '201':
          description: Edge execution created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeAgentExecution'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '429':
          $ref: '#/components/responses/EdgeMaxExecutionsExceeded'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/executions/{execution_id}:
    get:
      operationId: getEdgeExecution
      summary: Get an Edge agent execution
      tags:
      - Edge
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Edge execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeAgentExecution'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/executions/{execution_id}/end:
    post:
      operationId: endEdgeExecution
      summary: End an Edge agent execution
      tags:
      - Edge
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeEndExecutionRequest'
      responses:
        '200':
          description: Ended Edge execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeAgentExecution'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/approvals:
    get:
      operationId: listEdgeApprovals
      summary: List Edge action approvals
      description: >-
        Lists tenant-scoped Edge approval records for action-level governance.
        Non-admin/non-operator callers receive only approvals whose
        `principal_id` matches the authenticated `auth.PrincipalID`; admin and
        operator callers may list all approvals in the tenant for operations and
        forensics. Status, tuple, cursor, and limit filters are applied within
        that visibility scope so list pagination remains principal-stable. Raw
        action payloads are never returned; actions are represented by
        `event_id`, `action_hash`, `input_hash`, and `policy_snapshot`.
      tags:
      - Edge
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: status
        in: query
        schema:
          type: string
          enum: [pending, approved, rejected, expired, invalidated]
      - name: session_id
        in: query
        description: Optional tuple filter; must be supplied with `execution_id` and `action_hash`.
        schema:
          type: string
      - name: execution_id
        in: query
        description: Optional tuple filter; must be supplied with `session_id` and `action_hash`.
        schema:
          type: string
      - name: action_hash
        in: query
        description: Optional tuple filter; must be supplied with `session_id` and `execution_id`.
        schema:
          type: string
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      responses:
        '200':
          description: Edge approval page scoped to the caller's principal unless the caller has admin/operator visibility.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeApprovalPageResponse'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/approvals/{approval_ref}:
    get:
      operationId: getEdgeApproval
      summary: Get an Edge action approval
      description: >-
        Returns one tenant-scoped Edge approval record. Detail reads are
        principal-bound: the caller must be the original requester principal
        (`auth.PrincipalID` matches the approval `principal_id`) or hold an
        admin/operator role. Cross-tenant requests and same-tenant callers that
        fail this binding are reported as not found and no raw tool/action
        payload is exposed.
      tags:
      - Edge
      parameters:
      - name: approval_ref
        in: path
        required: true
        schema:
          type: string
          pattern: ^edge_appr_[A-Za-z0-9_-]+$
      - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Edge approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeApproval'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          description: Edge approval not found, cross-tenant, or caller is not the original requester principal and lacks admin/operator role. The same not_found envelope is used to prevent tenant-insider enumeration of approval timing or decisions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeError'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/approvals/{approval_ref}/approve:
    post:
      operationId: approveEdgeApproval
      summary: Approve an Edge action approval
      description: |
        Resolves a pending Edge approval as approved for one retry/consume. Requires approval/admin permission, enforces tenant scope and self-approval protection, and fails with 409 if the session/execution/event/action hash or policy snapshot is stale.

        EDGE-060 — supports `Idempotency-Key` for safe retry against
        the resolution state transition. Same key + same body returns
        the SAME cached 200 response (replay), NOT 409 "already
        approved" — this is the EDGE-060 DoD #7 invariant. A different
        key against an already-terminal approval still surfaces the
        existing 409 path.
      tags:
      - Edge
      parameters:
      - name: approval_ref
        in: path
        required: true
        schema:
          type: string
          pattern: ^edge_appr_[A-Za-z0-9_-]+$
      - $ref: '#/components/parameters/TenantID'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeApprovalDecisionRequest'
      responses:
        '200':
          description: Approved Edge approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeApproval'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          description: Approval permission denied or self-approval rejected (`code=self_approval_denied`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeError'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '409':
          $ref: '#/components/responses/EdgeConflict'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '429':
          $ref: '#/components/responses/EdgeEventCapExceeded'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/approvals/{approval_ref}/wait:
    post:
      operationId: waitEdgeApproval
      summary: Bounded blocking wait for an Edge approval to leave Pending
      description: >-
        Agentd/local-dev affordance that polls the Edge approval store until the
        approval is non-pending or the bounded timeout elapses, then returns the
        current EdgeApproval. The wait is principal-bound: the caller must be the
        original requester principal (`auth.PrincipalID` matches the approval
        `principal_id`) or hold an admin/operator role. The server clamps
        `timeout_ms` to a 5 minute maximum and uses a 30 second default when
        omitted or non-positive. Tenant isolation is enforced; cross-tenant
        references and same-tenant callers that fail the principal binding return
        404 with no metadata leakage. This endpoint is not required by the
        dashboard approve/reject UX — callers there should use the standard
        list/detail/approve/reject flow.
      tags:
      - Edge
      parameters:
      - name: approval_ref
        in: path
        required: true
        schema:
          type: string
          pattern: ^edge_appr_[A-Za-z0-9_-]+$
      - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timeout_ms:
                  type: integer
                  minimum: 0
                  description: Caller-requested wait budget. Server clamps to a 5-minute max and uses a 30s default when omitted or non-positive.
      responses:
        '200':
          description: Current Edge approval after the wait (resolved if approved/rejected/expired/invalidated; otherwise still pending).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeApproval'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          $ref: '#/components/responses/EdgeForbidden'
        '404':
          description: Edge approval not found, cross-tenant, or caller is not the original requester principal and lacks admin/operator role. The same not_found envelope is used to prevent tenant-insider enumeration of approval timing or decisions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeError'
        '409':
          $ref: '#/components/responses/EdgeConflict'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/approvals/{approval_ref}/reject:
    post:
      operationId: rejectEdgeApproval
      summary: Reject an Edge action approval
      description: |
        Resolves a pending Edge approval as rejected. Requires approval/admin permission, enforces tenant scope and self-approval protection, and fails with 409 if the referenced Edge session/execution/event is stale.

        EDGE-060 — supports `Idempotency-Key` for safe retry against
        the resolution state transition. Same key + same body returns
        the SAME cached 200 response (replay), NOT 409 "already
        rejected".
      tags:
      - Edge
      parameters:
      - name: approval_ref
        in: path
        required: true
        schema:
          type: string
          pattern: ^edge_appr_[A-Za-z0-9_-]+$
      - $ref: '#/components/parameters/TenantID'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeApprovalDecisionRequest'
      responses:
        '200':
          description: Rejected Edge approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeApproval'
        '400':
          $ref: '#/components/responses/EdgeBadRequest'
        '401':
          $ref: '#/components/responses/EdgeUnauthorized'
        '403':
          description: Approval permission denied or self-approval rejected (`code=self_approval_denied`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeError'
        '404':
          $ref: '#/components/responses/EdgeNotFound'
        '409':
          $ref: '#/components/responses/EdgeConflict'
        '413':
          $ref: '#/components/responses/EdgePayloadTooLarge'
        '503':
          $ref: '#/components/responses/EdgeServiceUnavailable'
        '500':
          $ref: '#/components/responses/EdgeInternalServerError'
  /api/v1/edge/evaluate:
    post:
      operationId: evaluateEdgeAction
      summary: Evaluate an Edge action with Safety Kernel policy
      description: Classifies a bounded, redacted agent action for an existing Edge session/execution, calls the Safety Kernel using the Edge policy topic, persists a redacted policy decision or degraded event, and returns hook-friendly allow/deny fields. Raw `tool_input`, raw transcripts, and unredacted payloads are rejected; large evidence must use artifact pointers.
      tags:
