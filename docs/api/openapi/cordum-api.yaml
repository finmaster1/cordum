        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/policy/audit:
    get:
      operationId: getPolicyAudit
      summary: Get policy audit log
      description: |
        Returns a filtered, paginated list of policy audit events. Filters
        match the gateway handler `handleListPolicyAudit` semantics: `action`
        / `agent_id` / `rule_id` / `type` are case-insensitive exact matches;
        `after` / `before` are lexicographic compares against `created_at`;
        `search` is a substring match across `action + actor_id +
        resource_type + resource_id + message` lowercased.
      tags:
      - Policy
      parameters:
      - $ref: '#/components/parameters/TenantID'
      - name: limit
        in: query
        required: false
        description: Maximum number of entries to return (default 100).
        schema:
          type: integer
          format: int64
          default: 100
          minimum: 1
        example: 50
      - name: offset
        in: query
        required: false
        description: Number of entries to skip (default 0).
        schema:
          type: integer
          format: int64
          default: 0
          minimum: 0
        example: 0
      - name: action
        in: query
        required: false
        description: Case-insensitive exact match against the entry action verb.
        schema:
          type: string
        example: rule.created
      - name: agent_id
        in: query
        required: false
        description: Case-insensitive exact match against the entry's agent_id.
        schema:
          type: string
        example: agent-claims-triage
      - name: after
        in: query
        required: false
        description: |
          Inclusive lower-bound on `created_at`. Lexicographic compare on
          the raw string the backend stores (typically RFC3339).
        schema:
          type: string
          format: date-time
        example: '2026-05-01T00:00:00Z'
      - name: before
        in: query
        required: false
        description: |
          Exclusive upper-bound on `created_at`. Lexicographic compare on
          the raw string the backend stores (typically RFC3339).
        schema:
          type: string
          format: date-time
        example: '2026-05-09T00:00:00Z'
      - name: search
        in: query
        required: false
        description: |
          Case-insensitive substring search across the lowercased
          concatenation of `action + actor_id + resource_type + resource_id
          + message`.
        schema:
          type: string
        example: rule.created
      - name: rule_id
        in: query
        required: false
        description: |
          Case-insensitive exact match against the entry's `resource_id`.
          Named `rule_id` for the common case where the audited resource is
          a policy rule.
        schema:
          type: string
        example: rule-input-secrets
      - name: type
        in: query
        required: false
        description: |
          Case-insensitive exact match against the entry's `resource_type`.
          The special value `output` returns only the legacy output-rule
          audit log via a separate code path that omits `total` / `has_more`
          / `offset` from the response envelope.
        schema:
          type: string
        example: input
      responses:
        '200':
          description: Audit items envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyAuditEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
