            type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ShadowRemediationStep'
        generator_version:
          type: string
        generated_at:
          type: string
          format: date-time
        advisory_only:
          type: boolean
          description: Always true in this generator. Reserved field — a future enforcement mode (out of scope) may flip it without changing the type signature.
    ShadowRemediationStep:
      type: object
