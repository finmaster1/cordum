openapi: 3.0.3
info:
  title: Cordum REST API
  version: 1.0.0
  description: |
    Safety-first agent orchestration platform. Cordum provides a control plane
    for submitting, scheduling, and governing AI agent jobs with built-in safety
    policies, approval workflows, dead-letter queues, and audit logging.

    ## Authentication
    All protected endpoints require either an API key (`X-API-Key` header) or a
    Bearer JWT token obtained from the login endpoint. Public endpoints are
    explicitly marked and require no credentials.

    ## Multi-Tenancy
    Protected routes require the `X-Tenant-ID` header to scope requests to the
    correct tenant partition.
  contact:
    name: Cordum Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8081
    description: Development

tags:
  - name: Auth
    description: Authentication and session management
  - name: Users
    description: User CRUD (admin only)
  - name: APIKeys
    description: API key lifecycle (admin only)
  - name: Jobs
    description: Job submission, listing, and lifecycle
  - name: DLQ
    description: Dead-letter queue management (admin only)
  - name: Workflows
    description: Workflow definition CRUD and execution
  - name: WorkflowRuns
    description: Workflow run inspection and control
  - name: Approvals
    description: Human-in-the-loop approval queue (admin only)
  - name: Policy
    description: Safety policy evaluation, bundles, and snapshots
  - name: Config
    description: Hierarchical configuration management
  - name: Schemas
    description: JSON schema registry
  - name: Locks
    description: Distributed lock management
  - name: Packs
    description: Pack installation and management (admin only)
  - name: Marketplace
    description: Pack marketplace catalog (admin only)
  - name: Health
    description: Health checks and system status
  - name: Memory
    description: Memory pointers and artifact storage
  - name: MCP
    description: Model Context Protocol (SSE + JSON-RPC)
  - name: Streaming
    description: WebSocket event streaming

security:
  - apiKey: []
  - bearerAuth: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # =========================================================================
  # Auth
  # =========================================================================
  /api/v1/auth/config:
    get:
      operationId: getAuthConfig
      summary: Get authentication configuration
      description: Returns the authentication methods enabled for the deployment.
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Auth configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfig"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate with username and password
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/session:
    get:
      operationId: getSession
      summary: Get current session
      description: Returns the authenticated user and token metadata.
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Logout and invalidate session
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/password:
    post:
      operationId: changeOwnPassword
      summary: Change own password
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # Users
  # =========================================================================
  /api/v1/users:
    post:
      operationId: createUser
      summary: Create a user
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      operationId: listUsers
      summary: List all users
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthUser"
                required: [items]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/users/{id}:
    parameters:
      - $ref: "#/components/parameters/UserID"
      - $ref: "#/components/parameters/TenantID"
    put:
      operationId: updateUser
      summary: Update a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteUser
      summary: Delete a user
      tags: [Users]
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/users/{id}/password:
    post:
      operationId: resetUserPassword
      summary: Reset a user's password (admin)
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/UserID"
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
              required: [password]
      responses:
        "204":
          description: Password reset
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # API Keys
  # =========================================================================
  /api/v1/auth/keys:
    get:
      operationId: listAPIKeys
      summary: List API keys
      tags: [APIKeys]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIKeyInfo"
                required: [items]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: createAPIKey
      summary: Create an API key
      description: |
        The raw secret is returned **only once** in the response. Store it
        securely; it cannot be retrieved again.
      tags: [APIKeys]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: Key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/keys/{id}:
    delete:
      operationId: deleteAPIKey
      summary: Revoke an API key
      tags: [APIKeys]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantID"
      responses:
        "204":
          description: Key revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # Jobs
  # =========================================================================
  /api/v1/jobs:
    post:
      operationId: submitJob
      summary: Submit a new job
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitJobRequest"
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      operationId: listJobs
      summary: List jobs
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: topic
          in: query
          schema:
            type: string
        - name: tenant
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/JobSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}:
    get:
      operationId: getJob
      summary: Get job details
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobID"
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}/decisions:
    get:
      operationId: getJobDecisions
      summary: Get safety decisions for a job
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobID"
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Safety decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SafetyDecision"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}/cancel:
    post:
      operationId: cancelJob
      summary: Cancel a running job
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobID"
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  state:
                    type: string
                    example: CANCELLED
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}/remediate:
    post:
      operationId: remediateJob
      summary: Remediate a quarantined job
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobID"
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                remediation_id:
                  type: string
              required: [remediation_id]
      responses:
        "200":
          description: Remediation submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}/stream:
    get:
      operationId: streamJob
      summary: Stream job events (WebSocket)
      description: |
        Upgrades to a WebSocket connection and streams real-time events for the
        specified job until it reaches a terminal state.
      tags: [Jobs, Streaming]
      parameters:
        - $ref: "#/components/parameters/JobID"
        - $ref: "#/components/parameters/TenantID"
      responses:
        "101":
          description: WebSocket upgrade
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/traces/{id}:
    get:
      operationId: getTrace
      summary: Get trace records for a job
      tags: [Jobs]
      parameters:
        - name: id
          in: path
          required: true
          description: Trace ID
          schema:
            type: string
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Trace records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # DLQ
  # =========================================================================
  /api/v1/dlq:
    get:
      operationId: listDLQ
      summary: List dead-letter queue entries
      tags: [DLQ]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: DLQ entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DLQEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/dlq/page:
    get:
      operationId: listDLQPaginated
      summary: List DLQ entries (paginated)
      tags: [DLQ]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated DLQ entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/DLQEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/dlq/{job_id}:
    delete:
      operationId: deleteDLQEntry
      summary: Remove a DLQ entry
      tags: [DLQ]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantID"
      responses:
        "204":
          description: Entry removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/dlq/{job_id}/retry:
    post:
      operationId: retryDLQEntry
      summary: Retry a dead-lettered job
      tags: [DLQ]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Retry enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # Workflows
  # =========================================================================
  /api/v1/workflows:
    get:
      operationId: listWorkflows
      summary: List workflow definitions
      tags: [Workflows]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Workflow list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowDefinition"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: createWorkflow
      summary: Create or update a workflow definition
      tags: [Workflows]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowDefinition"
      responses:
        "201":
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/workflows/{id}:
    parameters:
      - $ref: "#/components/parameters/WorkflowID"
      - $ref: "#/components/parameters/TenantID"
    get:
      operationId: getWorkflow
      summary: Get a workflow definition
      tags: [Workflows]
      responses:
        "200":
          description: Workflow definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDefinition"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteWorkflow
      summary: Delete a workflow definition
      tags: [Workflows]
      responses:
        "204":
          description: Workflow deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/workflows/{id}/runs:
    parameters:
      - $ref: "#/components/parameters/WorkflowID"
      - $ref: "#/components/parameters/TenantID"
    post:
      operationId: startWorkflowRun
      summary: Start a new workflow run
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Workflow input payload (schema depends on the workflow)
              additionalProperties: true
      responses:
        "200":
          description: Run started
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      operationId: listWorkflowRuns
      summary: List runs for a workflow
      tags: [Workflows]
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/workflows/{id}/dry-run:
    post:
      operationId: dryRunWorkflow
      summary: Dry-run a workflow without side effects
      tags: [Workflows]
      parameters:
        - $ref: "#/components/parameters/WorkflowID"
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  additionalProperties: true
                environment:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Dry-run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DryRunResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # Workflow Runs
  # =========================================================================
  /api/v1/workflow-runs:
    get:
      operationId: listAllWorkflowRuns
      summary: List workflow runs across all workflows
      tags: [WorkflowRuns]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
