      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: resource
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lock information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lock"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/locks/acquire:
    post:
      operationId: acquireLock
      summary: Acquire a distributed lock
      tags: [Locks]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockRequest"
      responses:
        "200":
          description: Lock acquired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lock"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/locks/release:
    post:
      operationId: releaseLock
      summary: Release a distributed lock
      tags: [Locks]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockRequest"
      responses:
        "200":
          description: Lock released
          content:
            application/json:
              schema:
                type: object
                properties:
                  lock:
                    $ref: "#/components/schemas/Lock"
                  released:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/locks/renew:
    post:
      operationId: renewLock
      summary: Renew a distributed lock TTL
      tags: [Locks]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockRequest"
      responses:
        "200":
          description: Lock renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lock"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # Packs
  # =========================================================================
  /api/v1/packs:
    get:
      operationId: listPacks
      summary: List installed packs
      tags: [Packs]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Pack list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PackRecord"
                required: [items]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/packs/{id}:
    get:
      operationId: getPack
      summary: Get a pack by ID
      tags: [Packs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Pack detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/packs/install:
    post:
      operationId: installPack
      summary: Install a pack from a bundle file
      tags: [Packs]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                bundle:
                  type: string
                  format: binary
                  description: Pack bundle archive
              required: [bundle]
      responses:
        "200":
          description: Pack installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/packs/{id}/uninstall:
    post:
      operationId: uninstallPack
      summary: Uninstall a pack
      tags: [Packs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                purge:
                  type: boolean
                  description: Whether to purge all pack data
                  default: false
      responses:
        "200":
          description: Pack uninstalled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/packs/{id}/verify:
    post:
      operationId: verifyPack
      summary: Verify a pack's integrity
      tags: [Packs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Verification results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackVerification"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # Marketplace
  # =========================================================================
  /api/v1/marketplace/packs:
    get:
      operationId: listMarketplacePacks
      summary: List packs available in the marketplace
      tags: [Marketplace]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Marketplace catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceCatalog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/BadGateway"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/marketplace/install:
    post:
      operationId: installMarketplacePack
      summary: Install a pack from the marketplace
      tags: [Marketplace]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceInstallRequest"
      responses:
        "200":
          description: Pack installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/BadGateway"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # Health
  # =========================================================================
  /health:
    get:
      operationId: healthCheck
      summary: Basic health check
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /api/v1/status:
    get:
      operationId: getStatus
      summary: Get system status
      tags: [Health]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/workers:
    get:
      operationId: listWorkers
      summary: List registered workers and heartbeats
      tags: [Health]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Worker heartbeats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkerHeartbeat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # Memory and Artifacts
  # =========================================================================
  /api/v1/memory:
    get:
      operationId: getMemory
      summary: Get memory data by pointer or key
      tags: [Memory]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: ptr
          in: query
          description: Memory pointer
          schema:
            type: string
        - name: key
          in: query
          description: Memory key
          schema:
            type: string
      responses:
        "200":
          description: Memory data
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/artifacts:
    post:
      operationId: createArtifact
      summary: Upload an artifact
      tags: [Memory]
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtifactRequest"
      responses:
        "200":
          description: Artifact stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateArtifactResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/artifacts/{ptr}:
    get:
      operationId: getArtifact
      summary: Get an artifact by pointer
      tags: [Memory]
      parameters:
        - name: ptr
          in: path
          required: true
          description: Artifact pointer
          schema:
            type: string
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Artifact data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================================================================
  # MCP
  # =========================================================================
  /mcp/sse:
    get:
      operationId: mcpSSE
      summary: MCP Server-Sent Events stream
      description: |
        Opens an SSE connection to the MCP server. The server sends JSON-RPC
        notifications and responses over this channel.
      tags: [MCP]
      security: []
      responses:
        "200":
          description: SSE stream opened
          content:
            text/event-stream:
              schema:
                type: string
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /mcp/message:
    post:
      operationId: mcpMessage
      summary: Send a JSON-RPC 2.0 message to MCP server
      tags: [MCP]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /mcp/status:
    get:
      operationId: mcpStatus
      summary: Get MCP server status
      tags: [MCP]
      security: []
      responses:
        "200":
          description: MCP status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpStatus"

  # =========================================================================
  # WebSocket Streaming
  # =========================================================================
  /api/v1/stream:
    get:
      operationId: streamEvents
      summary: WebSocket event bus stream
      description: |
        Upgrades to a WebSocket connection. Authenticates via the
        `cordum-api-key.<base64>` subprotocol. Streams real-time bus events
        (job state changes, heartbeats, policy updates, etc.).
      tags: [Streaming]
      responses:
        "101":
          description: WebSocket upgrade
        "401":
          $ref: "#/components/responses/Unauthorized"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  # =========================================================================
  # Security Schemes
  # =========================================================================
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key issued by the Cordum admin.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/v1/auth/login.

  # =========================================================================
  # Parameters
  # =========================================================================
  parameters:
    TenantID:
      name: X-Tenant-ID
      in: header
      required: true
      description: Tenant isolation header (required on all protected routes).
      schema:
        type: string

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional idempotency key for safe retries.
      schema:
        type: string
        format: uuid

    JobID:
      name: id
      in: path
      required: true
      description: Job ID
      schema:
        type: string

    WorkflowID:
      name: id
      in: path
      required: true
      description: Workflow ID
      schema:
        type: string

    RunID:
      name: id
      in: path
      required: true
      description: Workflow run ID
      schema:
        type: string

    UserID:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        type: string

  # =========================================================================
  # Responses
  # =========================================================================
  responses:
    BadRequest:
      description: Bad request — invalid or missing parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Unauthorized:
      description: Unauthorized — missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Conflict:
      description: Conflict — resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    PayloadTooLarge:
      description: Payload too large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    RateLimited:
      description: Too many requests — rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    BadGateway:
      description: Bad gateway — upstream service error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # =========================================================================
  # Schemas
  # =========================================================================
  schemas:
    # --- Common -----------------------------------------------------------
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
        status:
          type: integer
          description: HTTP status code
      required: [error, status]

    PaginatedResponse:
      type: object
      properties:
        next_cursor:
          type: string
          nullable: true
          description: Cursor for the next page (null if no more pages)

    # --- Auth -------------------------------------------------------------
    AuthConfig:
      type: object
      properties:
        password_enabled:
          type: boolean
        user_auth_enabled:
          type: boolean
        saml_enabled:
          type: boolean
        oidc_enabled:
          type: boolean
        require_2fa:
          type: boolean
        session_ttl_seconds:
          type: integer

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        tenant:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/AuthUser"

    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
      required: [current_password, new_password]

    # --- Users ------------------------------------------------------------
    AuthUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        tenant:
          type: string
        roles:
          type: array
          items:
            type: string
        source:
          type: string
          description: Auth source (local, saml, oidc)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        tenant:
          type: string
        role:
          type: string
      required: [username, password]

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string

    # --- API Keys ---------------------------------------------------------
    APIKeyInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
          description: First characters of the key for identification
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        lastUsed:
          type: string
          format: date-time
          nullable: true
        usageCount:
          type: integer
        expiresAt:
          type: string
          format: date-time
          nullable: true

    CreateAPIKeyRequest:
      type: object
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required: [name]

    CreateAPIKeyResponse:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/APIKeyInfo"
        secret:
          type: string
          description: Raw API key secret (shown only once)

    # --- Jobs -------------------------------------------------------------
    SubmitJobRequest:
      type: object
      properties:
        prompt:
          type: string
        topic:
          type: string
          default: job.default
        adapter_id:
          type: string
        priority:
          type: integer
          minimum: 0
          maximum: 10
        context:
          type: object
          additionalProperties: true
        capability:
          type: string
        risk_tags:
          type: array
          items:
            type: string
        labels:
          type: object
          additionalProperties:
            type: string
      required: [prompt]

    SubmitJobResponse:
      type: object
      properties:
        job_id:
          type: string
        trace_id:
          type: string

    JobSummary:
      type: object
      properties:
        id:
          type: string
        state:
          type: string
        topic:
          type: string
        tenant:
          type: string
        updated_at:
          type: string
          format: date-time

    JobDetail:
      allOf:
        - $ref: "#/components/schemas/JobSummary"
        - type: object
          properties:
            trace_id:
              type: string
            prompt:
              type: string
            context_ptr:
              type: string
              nullable: true
            result_ptr:
              type: string
              nullable: true
            result:
              type: object
              additionalProperties: true
              nullable: true
            capability:
              type: string
            risk_tags:
              type: array
              items:
                type: string
            labels:
              type: object
              additionalProperties:
                type: string
            adapter_id:
              type: string
            priority:
              type: integer
            created_at:
              type: string
              format: date-time
            started_at:
              type: string
              format: date-time
              nullable: true
            completed_at:
              type: string
              format: date-time
              nullable: true
            error:
              type: string
              nullable: true
            retry_count:
              type: integer
            decisions:
              type: array
              items:
                $ref: "#/components/schemas/SafetyDecision"
              nullable: true

    SafetyDecision:
      type: object
      properties:
        rule_id:
          type: string
        action:
          type: string
          enum: [ALLOW, DENY, QUARANTINE, REQUIRE_APPROVAL]
        reason:
          type: string
        constraints:
          type: object
          additionalProperties: true
          nullable: true
        evaluated_at:
          type: string
          format: date-time

    DLQEntry:
      type: object
      properties:
        job_id:
          type: string
        topic:
          type: string
        tenant:
          type: string
        error:
          type: string
        failed_at:
          type: string
          format: date-time
        retry_count:
          type: integer
        original_state:
          type: string

    # --- Workflows --------------------------------------------------------
    WorkflowDefinition:
      type: object
      properties:
        id:
          type: string
        org_id:
          type: string
        team_id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        timeout_sec:
          type: integer
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStep"
        config:
          type: object
          additionalProperties: true
      required: [id, name, steps]

    WorkflowStep:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          description: Step type (job, switch, parallel, loop, transform, storage, subworkflow, approval)
        name:
          type: string
        depends_on:
          type: array
          items:
            type: string
        config:
          type: object
          additionalProperties: true
        timeout_sec:
          type: integer
        retry:
          type: object
          properties:
            max_attempts:
              type: integer
            backoff_sec:
              type: integer
      required: [id, type]

    RunSummary:
      type: object
      properties:
        id:
          type: string
        workflow_id:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, PAUSED, COMPLETED, FAILED, CANCELLED]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true

    RunDetail:
      allOf:
        - $ref: "#/components/schemas/RunSummary"
        - type: object
          properties:
            input:
              type: object
              additionalProperties: true
            output:
              type: object
              additionalProperties: true
              nullable: true
            steps:
              type: array
              items:
                $ref: "#/components/schemas/RunStepStatus"
            created_by:
              type: string
            dry_run:
              type: boolean

    RunStepStatus:
      type: object
      properties:
        step_id:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        job_id:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        output:
          type: object
          additionalProperties: true
          nullable: true

    TimelineEvent:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        type:
          type: string
        step_id:
          type: string
          nullable: true
        message:
          type: string
        data:
          type: object
          additionalProperties: true
          nullable: true

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        run_id:
          type: string
        content:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        step_id:
          type: string
          nullable: true
        job_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    PostChatRequest:
      type: object
      properties:
        content:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        step_id:
          type: string
        job_id:
          type: string
      required: [content, role]

    DryRunResult:
      type: object
      properties:
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RunStepStatus"
        warnings:
          type: array
          items:
            type: string
        estimated_duration_sec:
          type: number

    # --- Approvals --------------------------------------------------------
    ApprovalItem:
      type: object
      properties:
        job:
          $ref: "#/components/schemas/JobSummary"
        decision:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        policy_snapshot:
          type: string
          nullable: true
        policy_rule_id:
          type: string
          nullable: true
        policy_reason:
          type: string
          nullable: true
        constraints:
          type: object
          additionalProperties: true
          nullable: true
        approval_required:
          type: boolean
        requested_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
          nullable: true
        decided_by:
          type: string
          nullable: true

    ApprovalDecisionRequest:
      type: object
      properties:
        reason:
          type: string
        note:
          type: string
      required: [reason]

    # --- Policy -----------------------------------------------------------
    PolicyCheckRequest:
      type: object
      properties:
        job_id:
          type: string
        topic:
          type: string
        tenant:
          type: string
        org_id:
          type: string
        team_id:
          type: string
        capability:
          type: string
        risk_tags:
          type: array
          items:
            type: string
        context:
          type: object
          additionalProperties: true
        labels:
          type: object
          additionalProperties:
            type: string

    PolicyCheckResponse:
      type: object
      properties:
        decision:
          type: string
          enum: [ALLOW, DENY, QUARANTINE, REQUIRE_APPROVAL]
        reason:
          type: string
        rule_id:
          type: string
          nullable: true
        constraints:
          type: object
          additionalProperties: true
          nullable: true
        evaluations:
          type: array
          items:
            $ref: "#/components/schemas/SafetyDecision"
          nullable: true

    PolicySnapshot:
      type: object
      properties:
        id:
          type: string
        note:
          type: string
        author:
          type: string
        created_at:
          type: string
          format: date-time
        bundle_ids:
          type: array
          items:
            type: string
          nullable: true

    PolicyRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        action:
          type: string
          enum: [ALLOW, DENY, QUARANTINE, REQUIRE_APPROVAL]
        conditions:
          type: object
          additionalProperties: true
        priority:
          type: integer
        source:
          type: string
          description: Bundle or file that defines this rule

    OutputRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        scanner_type:
          type: string
        pattern:
          type: string
          nullable: true
        action:
          type: string
          enum: [BLOCK, REDACT, WARN, LOG]
        config:
          type: object
          additionalProperties: true
          nullable: true

    PolicyBundleSummary:
      type: object
      properties:
        id:
          type: string
        enabled:
          type: boolean
        source:
          type: string
        author:
          type: string
        message:
          type: string
        rule_count:
          type: integer
        updated_at:
          type: string
          format: date-time

    PolicyBundleDetail:
      allOf:
        - $ref: "#/components/schemas/PolicyBundleSummary"
        - type: object
          properties:
            content:
              type: string
              description: Raw YAML content of the bundle
            rules:
              type: array
              items:
                $ref: "#/components/schemas/PolicyRule"

    UpdatePolicyBundleRequest:
      type: object
      properties:
        content:
          type: string
        enabled:
          type: boolean
        author:
          type: string
        message:
          type: string

    PublishPolicyRequest:
      type: object
      properties:
        bundle_ids:
          type: array
          items:
            type: string
        author:
          type: string
        message:
          type: string
        note:
          type: string
      required: [bundle_ids, author]

    RollbackPolicyRequest:
      type: object
      properties:
        snapshot_id:
          type: string
        author:
          type: string
        message:
          type: string
        note:
          type: string
      required: [snapshot_id, author]

    PolicyAuditEntry:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        author:
          type: string
        timestamp:
          type: string
          format: date-time
        bundle_id:
          type: string
          nullable: true
        snapshot_id:
          type: string
          nullable: true
        message:
          type: string
          nullable: true

    # --- Config -----------------------------------------------------------
    ConfigDocument:
      type: object
      properties:
        scope:
          type: string
          enum: [global, org, team, workflow, step]
        scope_id:
          type: string
        data:
          type: object
          additionalProperties: true
          description: Configuration key-value pairs

    # --- Schemas ----------------------------------------------------------
    SchemaRecord:
      type: object
      properties:
        id:
          type: string
        schema:
          type: object
          additionalProperties: true
          description: JSON Schema document
      required: [id, schema]

    # --- Locks ------------------------------------------------------------
    Lock:
      type: object
      properties:
        resource:
          type: string
        mode:
          type: string
          enum: [EXCLUSIVE, SHARED]
        owners:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    LockRequest:
      type: object
      properties:
        resource:
          type: string
        owner:
          type: string
        mode:
          type: string
          enum: [EXCLUSIVE, SHARED]
        ttl_ms:
          type: integer
          description: Lock time-to-live in milliseconds
      required: [resource, owner]

    # --- Packs ------------------------------------------------------------
    PackRecord:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, UNINSTALLED, ERROR]
        description:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        installed_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PackVerification:
      type: object
      properties:
        pack_id:
          type: string
        valid:
          type: boolean
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              passed:
                type: boolean
              message:
                type: string

    # --- Marketplace ------------------------------------------------------
    MarketplaceCatalog:
      type: object
      properties:
        catalogs:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              url:
                type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/MarketplacePack"
        fetched_at:
          type: string
          format: date-time
        cached:
          type: boolean

    MarketplacePack:
      type: object
      properties:
        catalog_id:
          type: string
        pack_id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        author:
          type: string
        sha256:
          type: string
        url:
          type: string

    MarketplaceInstallRequest:
      type: object
      properties:
        catalog_id:
          type: string
        pack_id:
          type: string
        version:
          type: string
        url:
          type: string
        sha256:
          type: string
        force:
          type: boolean
          default: false
        upgrade:
          type: boolean
          default: false
        inactive:
          type: boolean
          default: false
      required: [catalog_id, pack_id, version]

    # --- Health -----------------------------------------------------------
    StatusResponse:
      type: object
      properties:
        time:
          type: string
          format: date-time
        uptime_seconds:
          type: number
        build:
          type: object
          properties:
            version:
              type: string
            commit:
              type: string
            date:
              type: string
        nats:
          type: object
          properties:
            connected:
              type: boolean
            url:
              type: string
        redis:
          type: object
          properties:
            connected:
              type: boolean
            url:
              type: string
        workers:
          type: integer
          description: Number of connected workers
        license:
          type: object
          properties:
            valid:
              type: boolean
            tier:
              type: string
          nullable: true

    WorkerHeartbeat:
      type: object
      properties:
        worker_id:
          type: string
        pool:
          type: string
        status:
          type: string
        last_seen:
          type: string
          format: date-time
        capabilities:
          type: array
          items:
            type: string
          nullable: true
        jobs_active:
          type: integer
        jobs_completed:
          type: integer

    # --- Memory / Artifacts -----------------------------------------------
    CreateArtifactRequest:
      type: object
      properties:
        content_base64:
          type: string
          format: byte
        content_type:
          type: string
        retention:
          type: string
          description: Retention policy (e.g., "30d", "permanent")
        labels:
          type: object
          additionalProperties:
            type: string
      required: [content_base64, content_type]

    CreateArtifactResponse:
      type: object
      properties:
        artifact_ptr:
          type: string
        size_bytes:
          type: integer

    ArtifactDetail:
      type: object
      properties:
        artifact_ptr:
          type: string
        content_base64:
          type: string
          format: byte
        metadata:
          type: object
          properties:
            content_type:
              type: string
            size_bytes:
              type: integer
            created_at:
              type: string
              format: date-time
            retention:
              type: string
            labels:
              type: object
              additionalProperties:
                type: string

    # --- MCP --------------------------------------------------------------
    JsonRpcRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: integer
        method:
          type: string
        params:
          type: object
          additionalProperties: true
      required: [jsonrpc, method]

    JsonRpcResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        result:
          type: object
          additionalProperties: true
          nullable: true
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            data:
              type: object
              additionalProperties: true
              nullable: true
          nullable: true

    McpStatus:
      type: object
      properties:
        running:
          type: boolean
        connected_clients:
          type: integer
        uptime_seconds:
          type: number
        transport:
          type: string
          enum: [sse, stdio]
