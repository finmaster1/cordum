audit:
  transport: buffer # AUDIT_TRANSPORT
  export:
    type: none # CORDUM_AUDIT_EXPORT_TYPE
    maxRetries: 3 # CORDUM_AUDIT_EXPORT_MAX_RETRIES
    webhook:
      url: "" # CORDUM_AUDIT_EXPORT_WEBHOOK_URL
      secret: "" # CORDUM_AUDIT_EXPORT_WEBHOOK_SECRET
    syslog:
      addr: "" # CORDUM_AUDIT_EXPORT_SYSLOG_ADDR
    datadog:
      apiKey: "" # CORDUM_AUDIT_EXPORT_DD_API_KEY
      site: "" # CORDUM_AUDIT_EXPORT_DD_SITE
      tags: "" # CORDUM_AUDIT_EXPORT_DD_TAGS
    cloudwatch:
      logGroup: "" # CORDUM_AUDIT_EXPORT_CW_LOG_GROUP
      logStream: "" # CORDUM_AUDIT_EXPORT_CW_LOG_STREAM
      awsRegion: "" # AWS_REGION
  bufferSize: 1000 # CORDUM_AUDIT_BUFFER_SIZE
  readSampleRate: 0.0 # CORDUM_AUDIT_READ_SAMPLE_RATE

outputPolicy:
  enabled: false # OUTPUT_POLICY_ENABLED
  failMode: closed # OUTPUT_POLICY_FAIL_MODE
  scannersPath: config/output_scanners.yaml # OUTPUT_SCANNERS_PATH

configBootstrap:
  # Run a post-install/post-upgrade Job that ensures the system/default config
  # document exists. Belt-and-suspenders with the in-code EnsureDefault().
  enabled: true
  image: curlimages/curl:8.5.0
  retries: 30

networkPolicy:
  enabled: false
  # Label selector for ingress controller pods (used for gateway/dashboard ingress rules)
  ingressControllerSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx

# =============================================================================
# LLM Chat Assistant (cordum-llm-chat) — Gmail-style chat copilot that
# drives Cordum's REST + MCP surface. Default-enabled at the chart level;
# the dashboard chat button hides whenever the inference backend is
# unreachable. Operators with no GPU node can either (a) point at an
# external vLLM via llmChat.externalBaseUrl + qwenInference.enabled=false,
# or (b) disable both with --set llmChat.enabled=false.
# =============================================================================
llmChat:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/cordum-io/cordum/llm-chat
    tag: ""           # empty → falls back to global.image.tag
    pullPolicy: ""    # empty → falls back to global.image.pullPolicy
  resources:
    limits:
      memory: 512Mi
      cpu: "1"
    requests:
      memory: 256Mi
      cpu: "500m"
  service:
    port: 8090
  # When set + qwenInference.enabled=false, llm-chat talks to this
  # external OpenAI-compatible endpoint instead of the in-cluster vLLM.
  externalBaseUrl: ""
  sampling:
    # Two-pass sampling: deterministic args on the tool-call phase,
    # warmer prose on the natural-language summarization phase. See
    # docs/llmchat/helm.md for the rationale.
    toolTemperature: 0.3
    toolTopP: 0.9
    summaryTemperature: 0.7
    summaryTopP: 0.8
  budgets:
    maxToolCallsPerTurn: 12
    maxWallClockPerTurn: 60s
    maxAssistantBytes: 32768
  knowledgePack:
    enabled: true
    budget: 24576
  systemPrompt: |-
    You are the Cordum chat assistant. Use the Cordum MCP tools and REST
    read APIs to answer questions about jobs, workflows, workers, agents,
    approvals, policies, and audit records. Never invent job IDs, workflow
    IDs, approval IDs, or tool names. When explaining denials or failures,
    read the audit trail before summarizing. Never echo secrets from tool
    results; the service redacts results before they enter model context.
    {{api_summary}}
    {{cordum_io_summary}}

# =============================================================================
# vLLM serving Qwen3-Coder-30B-A3B-Instruct-FP8. Tier 1 (H100 80GB) is
# the recommended target. See docs/llmchat/helm.md for Tier 2 (RTX 5090
# / PRO 6000 with the AWQ swap) and Tier 3 (A100 — no native FP8) paths.
# =============================================================================
qwenInference:
  enabled: true
  replicas: 1
  # Pinned to vLLM v0.16.0@sha256:48011517 per task-991597a4.
  # Bump only via tools/scripts/vllm_pin_digest.sh + supply-chain CI.
  # Upgrade procedure: docs/llmchat/supply-chain.md.
  image:
    repository: "vllm/vllm-openai"
    digest: "sha256:4801151759655c57606c844662e5213403c032a62d149c7ce61d615759a821ef"
    pullPolicy: IfNotPresent
  # Tier 1 default. For Tier 2 hardware (Ada/Blackwell consumer cards
  # without native FP8), override via --set qwenInference.model=…AWQ.
  model: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
  # Reference value for the Tier 2 swap. Operators set
  # qwenInference.model to this for RTX 5090 / PRO 6000 deployments.
  tier2AwqModel: "QuantTrio/Qwen3-Coder-30B-A3B-Instruct-AWQ"
  servedModelName: "qwen3-coder"
  # MUST be qwen3_xml; the task rail forbids alternate parser families.
  toolCallParser: "qwen3_xml"
  maxModelLen: 131072
  kvCacheDtype: "fp8"
  enablePrefixCaching: true
  gpuMemoryUtilization: 0.9
  gpu:
    count: 1
    nodeSelector:
      accelerator: nvidia
    tolerations: []
  resources:
    limits:
      memory: 40Gi
    requests:
      memory: 32Gi
  cpuMode:
    # Interim QA/air-gapped mode only. Production deployments should keep
    # this false and run the GPU-backed FP8 profile above.
    enabled: false
    # CPU mode reuses qwenInference.image so the digest pin cannot drift.
    model: "Qwen/Qwen3-Coder-30B-A3B-Instruct-AWQ"
    maxModelLen: 32768
    kvCacheSpaceGB: 4
    resources:
      limits:
        cpu: "8"
        memory: 24Gi
      requests:
        cpu: "4"
        memory: 16Gi
  hfCache:
    # PVC for HuggingFace weight cache. Re-pulling 30GB FP8 weights on
    # every pod restart is unacceptable, so this defaults on. Set to
    # false for ephemeral test deployments where the cold-load delay
    # is acceptable.
    enabled: true
    size: 50Gi
    storageClass: ""  # empty → cluster default

# =============================================================================
# Ollama inference (community-tier, CPU-friendly). Mirrors the docker-compose
# `llmchat-ollama` profile for clusters without a GPU. Production deployments
# should keep this DISABLED and run the qwenInference (vLLM/GPU) profile above.
#
# When enabled with `ollamaInference.enabled=true` AND
# `qwenInference.enabled=false`, the chart renders an Ollama Deployment +
# Service + PVC and points llm-chat at it via LLMCHAT_BASE_URL. See
# docs/llmchat/ollama-runtime.md for sizing guidance + model-swap procedure.
# =============================================================================
ollamaInference:
  enabled: false
  replicas: 1
  # Pin floor: 0.5.7 — first stable tag that emits OpenAI streaming
  # `delta.tool_calls[]` arrays. Earlier tags embed tool calls as JSON in
  # the content field and silently break the chat-loop tool dispatch.
  # Bump only via tools/scripts/ollama_pin_digest.sh.
  image:
    repository: "ollama/ollama"
    tag: "0.5.7"
    pullPolicy: IfNotPresent
  # Default model: ~4.5 GB resident, Apache 2.0, native OpenAI tool_calls.
  # For sub-8 GB Docker memory hosts, override via --set
  # ollamaInference.model=qwen2.5-coder:3b-instruct-q4_K_M (~2 GB).
  model: "qwen2.5-coder:7b-instruct-q4_K_M"
  service:
    port: 11434
  resources:
    limits:
      memory: 6Gi
      cpu: "2"
    requests:
      memory: 5Gi
      cpu: "1"
  modelsCache:
    # PVC for the Ollama model cache (`/root/.ollama`). Re-pulling the
    # 4.5 GB model on every pod restart is unacceptable, so this defaults
    # on whenever ollamaInference.enabled=true.
    enabled: true
    size: 20Gi
    storageClass: ""  # empty → cluster default
