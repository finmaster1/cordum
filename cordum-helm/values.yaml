nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

# Base image settings for control plane components.
global:
  image:
    repository: ghcr.io/cordum-io/cordum/control-plane
    tag: "v0.1.4"
    pullPolicy: IfNotPresent
  # Set to true for production deployments (enables TLS enforcement, strict guards)
  production: false
  tls:
    # Enable server-side TLS for gRPC/HTTP endpoints
    enabled: false
    # K8s Secret name (type kubernetes.io/tls) containing server cert + key
    serverCertSecret: ""
    # K8s Secret name for client TLS (NATS/Redis connections)
    clientCertSecret: ""

secrets:
  apiKey: ""
  # Admin password for user authentication (leave empty to disable admin user creation)
  adminPassword: ""

config:
  safety: |-
    # Fail-closed: unmatched jobs are denied.
    default_decision: deny
    output_policy:
      enabled: true
      fail_mode: closed
    default_tenant: default
    tenants:
      default:
        allow_topics:
          - "job.*"
        deny_topics:
          - "sys.*"
        allowed_repo_hosts: []
        denied_repo_hosts: []
        mcp:
          allow_servers: []
          deny_servers: []
          allow_tools: []
          deny_tools: []
          allow_resources: []
          deny_resources: []
          allow_actions: []
          deny_actions: []
  pools: |-
    topics:
      job.default: default
    pools:
      default:
        requires: []
  timeouts: |-
    workflows: {}
    topics: {}
    reconciler:
      dispatch_timeout_seconds: 300
      # Per-topic overrides available via topics.<topic>.running_timeout_seconds
      running_timeout_seconds: 900
      scan_interval_seconds: 30

external:
  natsUrl: ""
  redisUrl: ""
  safetyKernelAddr: ""

nats:
  enabled: true
  image: nats:2.10-alpine
  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  service:
    type: ClusterIP
    port: 4222
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
  jetstream:
    storeDir: /data/jetstream
    syncInterval: "1s"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  enabled: true
  image: redis:7-alpine
  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  auth:
    enabled: true
    # Required when auth.enabled=true. Provide via --set or values override.
    # Generate with: openssl rand -hex 32
    password: ""
    # Alternatively reference an existing K8s secret:
    existingSecret: ""
    existingSecretKey: "REDIS_PASSWORD"
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  api:
    host: api.cordum.local
    paths:
      - path: /
        pathType: Prefix
  dashboard:
    host: cordum.local
    paths:
      - path: /
        pathType: Prefix

gateway:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: api-gateway
  service:
    type: ClusterIP
    httpPort: 8081
    grpcPort: 8080
    metricsPort: 9092
  env:
    tenantId: default
    apiRateLimitRps: 50
    apiRateLimitBurst: 100
    redisDataTTL: 24h
    jobMetaTTL: 168h
    # User authentication settings
    userAuthEnabled: false
    adminUsername: admin
    adminEmail: ""
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

scheduler:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: scheduler
  service:
    type: ClusterIP
    metricsPort: 9090
  env:
    jobMetaTTL: 168h
    workerSnapshotInterval: 5s
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

safetyKernel:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: safety-kernel
  service:
    type: ClusterIP
    port: 50051
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

workflowEngine:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: workflow-engine
  service:
    type: ClusterIP
    port: 9093
  env:
    scanInterval: 5s
    runScanLimit: 200
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

contextEngine:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: context-engine
  service:
    type: ClusterIP
    port: 50070
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

dashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/cordum-io/cordum/dashboard
    tag: "v0.1.4"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  env:
    apiBaseUrl: ""
    embedApiKey: false
    tenantId: default
    principalId: ""
    principalRole: ""
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

networkPolicy:
  enabled: false
  # Label selector for ingress controller pods (used for gateway/dashboard ingress rules)
  ingressControllerSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
