# =============================================================================
# SECURITY CHECKLIST for production deployments:
#   1. Set global.production: true
#   2. Set global.tls.enabled: true (and provide cert secrets)
#   3. Set networkPolicy.enabled: true
#   4. Set secrets.apiKey to a strong random value (openssl rand -hex 32)
#   5. Set redis.auth.password to a strong random value (openssl rand -hex 32)
#   6. Set secrets.adminPassword to a strong password (12+ chars)
#   7. Verify nats.persistence.enabled: true
#   8. Verify redis.persistence.enabled: true (or use external Redis)
#
# The chart will FAIL if global.production=true and global.tls.enabled=false.
# See templates/NOTES.txt for additional warnings printed at install time.
# =============================================================================

nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

# Base image settings for control plane components.
global:
  image:
    repository: ghcr.io/cordum-io/cordum/control-plane
    tag: "v0.1.4"
    pullPolicy: IfNotPresent
  # Set to true for production deployments (enables TLS enforcement, strict guards)
  production: false
  tls:
    # Enable server-side TLS for gRPC/HTTP endpoints
    enabled: false
    # K8s Secret name (type kubernetes.io/tls) containing server cert + key
    serverCertSecret: ""
    # K8s Secret name for client TLS (NATS/Redis connections)
    clientCertSecret: ""

secrets:
  apiKey: ""
  # Admin password for user authentication (leave empty to disable admin user creation)
  adminPassword: ""

config:
  safety: |-
    # Fail-closed: unmatched jobs are denied.
    default_decision: deny
    rules:
      - id: fraud-review-required
        match:
          topics:
            - job.fraud-detection.process
        decision: require_approval
        reason: "Fraud detection results must be reviewed by a human before action."
      - id: risk-assessment-approval
        match:
          topics:
            - job.risk-agents.process
        decision: require_approval
        reason: "Risk assessment outcomes require human sign-off."
      - id: compliance-approval
        match:
          topics:
            - job.compliance-agents.process
        decision: require_approval
        reason: "Compliance checks require human verification before proceeding."
      - id: bank-executor-approval
        match:
          topics:
            - job.bank-executors.process
        decision: require_approval
        reason: "Financial execution actions require explicit human authorization."
      - id: underwriting-approval
        match:
          topics:
            - job.underwriting-agents.process
        decision: require_approval
        reason: "Underwriting decisions require human review before commitment."
      - id: validators-auto-allow
        match:
          topics:
            - job.bank-validators.process
            - job.notification-service.process
            - job.valuation-agents.process
        decision: allow
        reason: "Read-only validation and notification jobs are auto-approved."
    output_policy:
      enabled: true
      fail_mode: closed
    output_rules:
      - id: output-secret-leak
        description: "Quarantine outputs that contain likely credential or key material."
        match:
          topics:
            - "job.*"
          scanners:
            - "secret"
        decision: quarantine
        severity: critical
        reason: "Potential secret material detected in output."
      - id: output-pii-leak
        description: "PII detection rule (disabled by default to avoid false positives)."
        enabled: true
        match:
          topics:
            - "job.*"
          scanners:
            - "pii"
        decision: quarantine
        severity: high
        reason: "Potential PII detected in output."
      - id: output-injection-detected
        description: "Quarantine outputs containing likely injection payload fragments."
        match:
          topics:
            - "job.*"
          scanners:
            - "injection"
        decision: quarantine
        severity: high
        reason: "Potential injection payload detected in output."
      - id: output-size-limit
        description: "Quarantine oversized outputs beyond the default 10 MiB threshold."
        match:
          topics:
            - "job.*"
          output_size_gt: 10485760
        decision: quarantine
        severity: medium
        reason: "Output exceeds configured size threshold."
      - id: output-error-secret-leak
        description: "Quarantine failed job outputs when secret indicators are present."
        match:
          topics:
            - "job.*"
          has_error: true
          scanners:
            - "secret"
        decision: quarantine
        severity: high
        reason: "Secrets detected in failed job output context."
    default_tenant: default
    tenants:
      default:
        allow_topics:
          - "job.*"
        deny_topics:
          - "sys.*"
        allowed_repo_hosts: []
        denied_repo_hosts: []
        mcp:
          allow_servers: []
          deny_servers: []
          allow_tools: []
          deny_tools: []
          allow_resources: []
          deny_resources: []
          allow_actions: []
          deny_actions: []
  pools: |-
    topics:
      job.default: default
    pools:
      default:
        requires: []
  timeouts: |-
    workflows: {}
    topics: {}
    reconciler:
      dispatch_timeout_seconds: 300
      # Per-topic overrides available via topics.<topic>.running_timeout_seconds
      running_timeout_seconds: 900
      scan_interval_seconds: 30

external:
  natsUrl: ""
  redisUrl: ""
  safetyKernelAddr: ""

nats:
  enabled: true
  image: nats:2.10-alpine
  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  service:
    type: ClusterIP
    port: 4222
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  jetstream:
    storeDir: /data/jetstream
    syncInterval: "1s"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  enabled: true
  image: redis:7-alpine
  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  auth:
    enabled: true
    # Required when auth.enabled=true. Provide via --set or values override.
    # Generate with: openssl rand -hex 32
    password: ""
    # Alternatively reference an existing K8s secret:
    existingSecret: ""
    existingSecretKey: "REDIS_PASSWORD"
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  api:
    host: api.cordum.local
    paths:
      - path: /
        pathType: Prefix
  dashboard:
    host: cordum.local
    paths:
      - path: /
        pathType: Prefix

gateway:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: api-gateway
  service:
    type: ClusterIP
    httpPort: 8081
    grpcPort: 8080
    metricsPort: 9092
  env:
    tenantId: default
    apiRateLimitRps: 50
    apiRateLimitBurst: 100
    redisDataTTL: 24h
    jobMetaTTL: 168h
    # User authentication settings
    userAuthEnabled: false
    adminUsername: admin
    adminEmail: ""
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

scheduler:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: scheduler
  service:
    type: ClusterIP
    metricsPort: 9090
  env:
    jobMetaTTL: 168h
    workerSnapshotInterval: 5s
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

safetyKernel:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: safety-kernel
  service:
    type: ClusterIP
    port: 50051
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

workflowEngine:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: workflow-engine
  service:
    type: ClusterIP
    port: 9093
  env:
    scanInterval: 5s
    runScanLimit: 200
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

contextEngine:
  enabled: true
  replicaCount: 1
  image:
    tagSuffix: context-engine
  service:
    type: ClusterIP
    port: 50070
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

dashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/cordum-io/cordum/dashboard
    tag: "v0.1.4"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  env:
    apiBaseUrl: ""
    embedApiKey: false
    tenantId: default
    principalId: ""
    principalRole: ""
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

configBootstrap:
  # Run a post-install/post-upgrade Job that ensures the system/default config
  # document exists. Belt-and-suspenders with the in-code EnsureDefault().
  enabled: true
  image: curlimages/curl:8.5.0
  retries: 30

networkPolicy:
  enabled: false
  # Label selector for ingress controller pods (used for gateway/dashboard ingress rules)
  ingressControllerSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
