# =============================================================================
# SECURITY CHECKLIST for production deployments:
#   1. Set global.production: true
#   2. Set global.tls.enabled: true (and provide cert secrets)
#   3. Set networkPolicy.enabled: true
#   4. Set secrets.apiKey to a strong random value (openssl rand -hex 32)
#   5. Set redis.auth.password to a strong random value (openssl rand -hex 32)
#   6. Set secrets.adminPassword to a strong password (12+ chars)
#   7. Verify nats.persistence.enabled: true
#   8. Verify redis.persistence.enabled: true (or use external Redis)
#
# The chart will FAIL if global.production=true and global.tls.enabled=false.
# See templates/NOTES.txt for additional warnings printed at install time.
# =============================================================================

nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

# Base image settings for control plane components.
global:
  image:
    # Container registry prefix. Each service appends its own repo name.
    # GHCR: ghcr.io/cordum-io/cordum  →  ghcr.io/cordum-io/cordum/api-gateway:0.9.4
    # Docker Hub: docker.io/cordum    →  docker.io/cordum/api-gateway:0.9.4
    registry: ghcr.io/cordum-io/cordum
    tag: "0.9.4"
    pullPolicy: IfNotPresent
  # Set to true for production deployments (enables TLS enforcement, strict guards)
  production: false
  tls:
    # Enable server-side TLS for gRPC/HTTP endpoints
    enabled: false
    # K8s Secret name (type kubernetes.io/tls) containing server cert + key
    serverCertSecret: ""
    # K8s Secret name for client TLS (NATS/Redis connections)
    clientCertSecret: ""
    minVersion: "" # CORDUM_TLS_MIN_VERSION

secrets:
  apiKey: ""
  # Admin password for user authentication (leave empty to disable admin user creation)
  adminPassword: ""

config:
  safety: |-
    # Fail-closed: unmatched jobs are denied.
    default_decision: deny
    rules:
      - id: fraud-review-required
        match:
          topics:
            - job.fraud-detection.process
        decision: require_approval
        reason: "Fraud detection results must be reviewed by a human before action."
      - id: risk-assessment-approval
        match:
          topics:
            - job.risk-agents.process
        decision: require_approval
        reason: "Risk assessment outcomes require human sign-off."
      - id: compliance-approval
        match:
          topics:
            - job.compliance-agents.process
        decision: require_approval
        reason: "Compliance checks require human verification before proceeding."
      - id: bank-executor-approval
        match:
          topics:
            - job.bank-executors.process
        decision: require_approval
        reason: "Financial execution actions require explicit human authorization."
      - id: underwriting-approval
        match:
          topics:
            - job.underwriting-agents.process
        decision: require_approval
        reason: "Underwriting decisions require human review before commitment."
      - id: validators-auto-allow
        match:
          topics:
            - job.bank-validators.process
            - job.notification-service.process
            - job.valuation-agents.process
        decision: allow
        reason: "Read-only validation and notification jobs are auto-approved."
    output_policy:
      enabled: true
      fail_mode: closed
    output_rules:
      - id: output-secret-leak
        description: "Quarantine outputs that contain likely credential or key material."
        match:
          topics:
            - "job.*"
          scanners:
            - "secret"
        decision: quarantine
        severity: critical
        reason: "Potential secret material detected in output."
      - id: output-pii-leak
        description: "PII detection rule (disabled by default to avoid false positives)."
        enabled: true
        match:
          topics:
            - "job.*"
          scanners:
            - "pii"
        decision: quarantine
        severity: high
        reason: "Potential PII detected in output."
      - id: output-injection-detected
        description: "Quarantine outputs containing likely injection payload fragments."
        match:
          topics:
            - "job.*"
          scanners:
            - "injection"
        decision: quarantine
        severity: high
        reason: "Potential injection payload detected in output."
      - id: output-size-limit
        description: "Quarantine oversized outputs beyond the default 10 MiB threshold."
        match:
          topics:
            - "job.*"
          output_size_gt: 10485760
        decision: quarantine
        severity: medium
        reason: "Output exceeds configured size threshold."
      - id: output-error-secret-leak
        description: "Quarantine failed job outputs when secret indicators are present."
        match:
          topics:
            - "job.*"
          has_error: true
          scanners:
            - "secret"
        decision: quarantine
        severity: high
        reason: "Secrets detected in failed job output context."
    default_tenant: default
    tenants:
      default:
        allow_topics:
          - "job.*"
        deny_topics:
          - "sys.*"
        allowed_repo_hosts: []
        denied_repo_hosts: []
        mcp:
          allow_servers: []
          deny_servers: []
          allow_tools: []
          deny_tools: []
          allow_resources: []
          deny_resources: []
          allow_actions: []
          deny_actions: []
  pools: |-
    topics:
      job.default: default
    pools:
      default:
        requires: []
  timeouts: |-
    workflows: {}
    topics: {}
    reconciler:
      dispatch_timeout_seconds: 300
      # Per-topic overrides available via topics.<topic>.running_timeout_seconds
      running_timeout_seconds: 900
      scan_interval_seconds: 30

external:
  natsUrl: ""
  redisUrl: ""
  safetyKernelAddr: ""

nats:
  enabled: true
  image: nats:2.10-alpine
  auth:
    token: "" # NATS_TOKEN
    existingTokenSecret: "" # NATS_TOKEN
    existingTokenSecretKey: "NATS_TOKEN" # NATS_TOKEN
    username: "" # NATS_USERNAME
    password: "" # NATS_PASSWORD
    nkey: "" # NATS_NKEY
  tls:
    serverName: "" # NATS_TLS_SERVER_NAME
    insecure: false # NATS_TLS_INSECURE
  allowPlaintext: false # CORDUM_NATS_ALLOW_PLAINTEXT
  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  service:
    type: ClusterIP
    port: 4222
  # External access for workers outside the cluster.
  # Creates a separate LoadBalancer service for NATS.
  externalAccess:
    enabled: false
    service:
      type: LoadBalancer
      port: 4222
      # Annotations for cloud provider (e.g. AWS NLB, Azure LB)
      annotations: {}
        # service.beta.kubernetes.io/aws-load-balancer-type: nlb
        # service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
        # service.beta.kubernetes.io/azure-load-balancer-internal: "false"
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  jetstream:
    storeDir: /data/jetstream
    syncInterval: "1s"
    ackWait: "" # NATS_JS_ACK_WAIT
    maxAge: "" # NATS_JS_MAX_AGE
    replicas: 0 # NATS_JS_REPLICAS
    maxAckPending: 0 # NATS_MAX_ACK_PENDING
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  enabled: true
  image: redis:7-alpine
  tls:
    serverName: "" # REDIS_TLS_SERVER_NAME
    insecure: false # REDIS_TLS_INSECURE
  cluster:
    enabled: false # REDIS_CLUSTER_ADDRESSES
    addresses: [] # REDIS_CLUSTER_ADDRESSES
  pool:
    size: 0 # REDIS_POOL_SIZE
    minIdleConns: 0 # REDIS_MIN_IDLE_CONNS
  dataTTL: "" # REDIS_DATA_TTL
  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  auth:
    enabled: true
    # Required when auth.enabled=true. Provide via --set or values override.
    # Generate with: openssl rand -hex 32
    password: ""
    # Alternatively reference an existing K8s secret:
    existingSecret: ""
    existingSecretKey: "REDIS_PASSWORD"
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  api:
    host: api.cordum.local
    paths:
      - path: /
        pathType: Prefix
    # Enable a separate gRPC Ingress for workers using the CAP gRPC protocol.
    grpcEnabled: false
    grpcHost: ""  # defaults to api host if empty
  dashboard:
    host: cordum.local
    paths:
      - path: /
        pathType: Prefix

gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: api-gateway
  service:
    type: ClusterIP
    httpPort: 8081
    grpcPort: 8080
    metricsPort: 9092
  env:
    tenantId: default
    apiRateLimitRps: 50
    apiRateLimitBurst: 100
    redisDataTTL: 24h
    jobMetaTTL: 168h
    metricsAddr: "" # GATEWAY_METRICS_ADDR
    metricsPublic: false # GATEWAY_METRICS_PUBLIC
    maxJsonBodyBytes: 0 # GATEWAY_MAX_JSON_BODY_BYTES
    wsClientBufferSize: 0 # CORDUM_WS_CLIENT_BUFFER_SIZE
    hstsMaxAge: 0 # CORDUM_HSTS_MAX_AGE
    httpReadTimeout: "" # GATEWAY_HTTP_READ_TIMEOUT
    httpWriteTimeout: "" # GATEWAY_HTTP_WRITE_TIMEOUT
    contextEngineAddr: "" # CONTEXT_ENGINE_ADDR
    idempotencyTTL: "" # CORDUM_IDEMPOTENCY_TTL
    sessionTTL: "" # CORDUM_SESSION_TTL
    artifactMaxBytes: 0 # ARTIFACT_MAX_BYTES
    # User authentication settings
    userAuthEnabled: false
    adminUsername: admin
    adminEmail: ""
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

scheduler:
  enabled: true
  replicaCount: 1
  image:
    repository: scheduler
  service:
    type: ClusterIP
    metricsPort: 9090
  env:
    jobMetaTTL: 168h
    workerSnapshotInterval: 5s
    configReloadInterval: "" # SCHEDULER_CONFIG_RELOAD_INTERVAL
    workerAttestation: off # WORKER_ATTESTATION
    workerReadinessRequired: false # WORKER_READINESS_REQUIRED
    workerReadinessTTL: "" # WORKER_READINESS_TTL
    schemaEnforcement: warn # SCHEMA_ENFORCEMENT
  metrics:
    addr: "" # SCHEDULER_METRICS_ADDR
    public: false # SCHEDULER_METRICS_PUBLIC
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

safetyKernel:
  enabled: true
  replicaCount: 1
  image:
    repository: safety-kernel
  service:
    type: ClusterIP
    port: 50051
  policy:
    reloadInterval: "" # SAFETY_POLICY_RELOAD_INTERVAL
    publicKey: "" # SAFETY_POLICY_PUBLIC_KEY
    signature: "" # SAFETY_POLICY_SIGNATURE
    signaturePath: "" # SAFETY_POLICY_SIGNATURE_PATH
    signatureRequired: false # SAFETY_POLICY_SIGNATURE_REQUIRED
    url: "" # SAFETY_POLICY_URL
    urlAllowlist: [] # SAFETY_POLICY_URL_ALLOWLIST
    configScope: system # SAFETY_POLICY_CONFIG_SCOPE
    configId: policy # SAFETY_POLICY_CONFIG_ID
    configKey: bundles # SAFETY_POLICY_CONFIG_KEY
    configDisable: false # SAFETY_POLICY_CONFIG_DISABLE
    maxBytes: 0 # SAFETY_POLICY_MAX_BYTES
  cache:
    ttl: "" # SAFETY_DECISION_CACHE_TTL
    maxSize: 0 # SAFETY_DECISION_CACHE_MAX_SIZE
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

workflowEngine:
  enabled: true
  replicaCount: 1
  image:
    repository: workflow-engine
  service:
    type: ClusterIP
    port: 9093
  env:
    scanInterval: 5s
    runScanLimit: 200
    foreachMaxItems: 0 # WORKFLOW_FOREACH_MAX_ITEMS
    exprMaxLength: 0 # WORKFLOW_EXPR_MAX_LENGTH
    exprTimeoutMs: 0 # WORKFLOW_EXPR_TIMEOUT_MS
    exprMaxResultItems: 0 # WORKFLOW_EXPR_MAX_RESULT_ITEMS
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

contextEngine:
  enabled: true
  replicaCount: 1
  image:
    repository: context-engine
  service:
    type: ClusterIP
    port: 50070
  env:
    maxEntryBytes: 0 # CONTEXT_ENGINE_MAX_ENTRY_BYTES
    maxChunkScan: 0 # CONTEXT_ENGINE_MAX_CHUNK_SCAN
  metricsPublic: false # CONTEXT_ENGINE_METRICS_PUBLIC
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

dashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: dashboard
    tag: ""  # defaults to global.image.tag
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  env:
    apiBaseUrl: ""
    embedApiKey: false
    tenantId: default
    principalId: ""
    principalRole: ""
    traceUrlTemplate: "" # CORDUM_TRACE_URL_TEMPLATE
    apiUpstreamScheme: "" # CORDUM_API_UPSTREAM_SCHEME
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi


licensing:
  mode: community # selects CORDUM_LICENSE_FILE / CORDUM_LICENSE_TOKEN
  file: "" # CORDUM_LICENSE_FILE
  token: "" # CORDUM_LICENSE_TOKEN
  existingSecret: "" # CORDUM_LICENSE_TOKEN
  publicKey: "" # CORDUM_LICENSE_PUBLIC_KEY
  publicKeyPath: "" # CORDUM_LICENSE_PUBLIC_KEY_PATH

telemetry:
  mode: local_only # CORDUM_TELEMETRY_MODE
  endpoint: https://telemetry.cordum.io/v1/report # CORDUM_TELEMETRY_ENDPOINT

logging:
  level: info # CORDUM_LOG_LEVEL
  format: text # CORDUM_LOG_FORMAT

marketplace:
  provider: none # chart-only selector (no direct runtime env var)
  allowHttp: false # CORDUM_MARKETPLACE_ALLOW_HTTP
  httpTimeout: "" # CORDUM_MARKETPLACE_HTTP_TIMEOUT


auth:
  jwt:
    hmacSecret: "" # CORDUM_JWT_HMAC_SECRET
    publicKey: "" # CORDUM_JWT_PUBLIC_KEY
    publicKeyPath: "" # CORDUM_JWT_PUBLIC_KEY_PATH
    issuer: "" # CORDUM_JWT_ISSUER
    audience: "" # CORDUM_JWT_AUDIENCE
    defaultRole: "" # CORDUM_JWT_DEFAULT_ROLE
    clockSkew: "" # CORDUM_JWT_CLOCK_SKEW
    required: false # CORDUM_JWT_REQUIRED
  oidc:
    enabled: false # CORDUM_OIDC_ENABLED
    issuer: "" # CORDUM_OIDC_ISSUER
    audience: "" # CORDUM_OIDC_AUDIENCE
    claimTenant: "" # CORDUM_OIDC_CLAIM_TENANT
    claimRole: "" # CORDUM_OIDC_CLAIM_ROLE
    allowedAlgs: [] # CORDUM_OIDC_ALLOWED_ALGS
    jwksRefreshInterval: "" # CORDUM_OIDC_JWKS_REFRESH_INTERVAL
    jwksRefreshCooldown: "" # OIDC_JWKS_REFRESH_COOLDOWN
    issuerAllowlist: [] # CORDUM_OIDC_ISSUER_ALLOWLIST
    allowPrivate: false # CORDUM_OIDC_ALLOW_PRIVATE
    allowHttp: false # CORDUM_OIDC_ALLOW_HTTP
  apiKeys: "" # CORDUM_API_KEYS
  apiKeysPath: "" # CORDUM_API_KEYS_PATH
  skipSecretValidation: false # CORDUM_SKIP_SECRET_VALIDATION

audit:
  transport: buffer # AUDIT_TRANSPORT
  export:
    type: none # CORDUM_AUDIT_EXPORT_TYPE
    maxRetries: 3 # CORDUM_AUDIT_EXPORT_MAX_RETRIES
    webhook:
      url: "" # CORDUM_AUDIT_EXPORT_WEBHOOK_URL
      secret: "" # CORDUM_AUDIT_EXPORT_WEBHOOK_SECRET
    syslog:
      addr: "" # CORDUM_AUDIT_EXPORT_SYSLOG_ADDR
    datadog:
      apiKey: "" # CORDUM_AUDIT_EXPORT_DD_API_KEY
      site: "" # CORDUM_AUDIT_EXPORT_DD_SITE
      tags: "" # CORDUM_AUDIT_EXPORT_DD_TAGS
    cloudwatch:
      logGroup: "" # CORDUM_AUDIT_EXPORT_CW_LOG_GROUP
      logStream: "" # CORDUM_AUDIT_EXPORT_CW_LOG_STREAM
      awsRegion: "" # AWS_REGION
  bufferSize: 1000 # CORDUM_AUDIT_BUFFER_SIZE
  readSampleRate: 0.0 # CORDUM_AUDIT_READ_SAMPLE_RATE

outputPolicy:
  enabled: false # OUTPUT_POLICY_ENABLED
  failMode: closed # OUTPUT_POLICY_FAIL_MODE
  scannersPath: config/output_scanners.yaml # OUTPUT_SCANNERS_PATH

configBootstrap:
  # Run a post-install/post-upgrade Job that ensures the system/default config
  # document exists. Belt-and-suspenders with the in-code EnsureDefault().
  enabled: true
  image: curlimages/curl:8.5.0
  retries: 30

networkPolicy:
  enabled: false
  # Label selector for ingress controller pods (used for gateway/dashboard ingress rules)
  ingressControllerSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
