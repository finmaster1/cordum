      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-gateway
          image: {{ printf "%s/%s:%s" .Values.global.image.registry .Values.gateway.image.repository .Values.global.image.tag | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            {{- if .Values.global.production }}
            - name: CORDUM_ENV
              value: production
            {{- end }}
            - name: NATS_URL
              value: {{ include "cordum.natsUrl" . | quote }}
            - name: NATS_USE_JETSTREAM
              value: "1"
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.redisSecretName" . }}
                  key: {{ include "cordum.redisSecretKey" . }}
            {{- end }}
            - name: REDIS_URL
              value: {{ include "cordum.redisUrl" . | quote }}
            - name: SAFETY_KERNEL_ADDR
              value: {{ include "cordum.safetyKernelAddr" . | quote }}
            - name: CORDUM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.fullname" . }}-secrets
                  key: apiKey
            - name: TENANT_ID
              value: {{ .Values.gateway.env.tenantId | quote }}
            - name: API_RATE_LIMIT_RPS
              value: {{ .Values.gateway.env.apiRateLimitRps | quote }}
            - name: API_RATE_LIMIT_BURST
              value: {{ .Values.gateway.env.apiRateLimitBurst | quote }}
            - name: REDIS_DATA_TTL
              value: {{ .Values.gateway.env.redisDataTTL | quote }}
            - name: JOB_META_TTL
              value: {{ .Values.gateway.env.jobMetaTTL | quote }}
            {{- if .Values.gateway.env.userAuthEnabled }}
            - name: CORDUM_USER_AUTH_ENABLED
              value: "true"
            - name: CORDUM_ADMIN_USERNAME
              value: {{ .Values.gateway.env.adminUsername | quote }}
            {{- if .Values.gateway.env.adminEmail }}
            - name: CORDUM_ADMIN_EMAIL
              value: {{ .Values.gateway.env.adminEmail | quote }}
            {{- end }}
            {{- if .Values.secrets.adminPassword }}
            - name: CORDUM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.fullname" . }}-secrets
                  key: adminPassword
            {{- end }}
            {{- end }}
            {{- if .Values.global.tls.enabled }}
            - name: GRPC_TLS_CERT
              value: /etc/cordum/tls/server/tls.crt
            - name: GRPC_TLS_KEY
              value: /etc/cordum/tls/server/tls.key
            - name: GATEWAY_HTTP_TLS_CERT
              value: /etc/cordum/tls/server/tls.crt
            - name: GATEWAY_HTTP_TLS_KEY
              value: /etc/cordum/tls/server/tls.key
            - name: NATS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: NATS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: NATS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            - name: REDIS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: REDIS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: REDIS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            - name: SAFETY_KERNEL_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: CONTEXT_ENGINE_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            {{- end }}
            {{- include "cordum.sharedEnv" . | nindent 12 }}
            {{- if .Values.telemetry.endpoint }}
            - name: CORDUM_TELEMETRY_ENDPOINT
              value: {{ .Values.telemetry.endpoint | quote }}
            {{- end }}
            {{- if .Values.auth.jwt.hmacSecret }}
            - name: CORDUM_JWT_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-jwt" (include "cordum.fullname" .) }}
                  key: hmacSecret
            {{- end }}
            {{- if .Values.auth.jwt.publicKey }}
            - name: CORDUM_JWT_PUBLIC_KEY
              value: {{ .Values.auth.jwt.publicKey | quote }}
            {{- end }}
            {{- if .Values.auth.jwt.publicKeyPath }}
            - name: CORDUM_JWT_PUBLIC_KEY_PATH
              value: {{ .Values.auth.jwt.publicKeyPath | quote }}
            {{- end }}
            {{- if .Values.auth.jwt.issuer }}
            - name: CORDUM_JWT_ISSUER
              value: {{ .Values.auth.jwt.issuer | quote }}
            {{- end }}
            {{- if .Values.auth.jwt.audience }}
            - name: CORDUM_JWT_AUDIENCE
              value: {{ .Values.auth.jwt.audience | quote }}
            {{- end }}
            {{- if .Values.auth.jwt.defaultRole }}
            - name: CORDUM_JWT_DEFAULT_ROLE
              value: {{ .Values.auth.jwt.defaultRole | quote }}
            {{- end }}
            {{- if .Values.auth.jwt.clockSkew }}
            - name: CORDUM_JWT_CLOCK_SKEW
              value: {{ .Values.auth.jwt.clockSkew | quote }}
            {{- end }}
            {{- if .Values.auth.jwt.required }}
            - name: CORDUM_JWT_REQUIRED
              value: "true"
            {{- end }}
            {{- if .Values.auth.oidc.enabled }}
            - name: CORDUM_OIDC_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.auth.oidc.issuer }}
            - name: CORDUM_OIDC_ISSUER
              value: {{ .Values.auth.oidc.issuer | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.audience }}
            - name: CORDUM_OIDC_AUDIENCE
              value: {{ .Values.auth.oidc.audience | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.claimTenant }}
            - name: CORDUM_OIDC_CLAIM_TENANT
              value: {{ .Values.auth.oidc.claimTenant | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.claimRole }}
            - name: CORDUM_OIDC_CLAIM_ROLE
              value: {{ .Values.auth.oidc.claimRole | quote }}
            {{- end }}
            {{- if gt (len .Values.auth.oidc.allowedAlgs) 0 }}
            - name: CORDUM_OIDC_ALLOWED_ALGS
              value: {{ join "," .Values.auth.oidc.allowedAlgs | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.jwksRefreshInterval }}
            - name: CORDUM_OIDC_JWKS_REFRESH_INTERVAL
              value: {{ .Values.auth.oidc.jwksRefreshInterval | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.jwksRefreshCooldown }}
            - name: OIDC_JWKS_REFRESH_COOLDOWN
              value: {{ .Values.auth.oidc.jwksRefreshCooldown | quote }}
            {{- end }}
            {{- if gt (len .Values.auth.oidc.issuerAllowlist) 0 }}
            - name: CORDUM_OIDC_ISSUER_ALLOWLIST
              value: {{ join "," .Values.auth.oidc.issuerAllowlist | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.allowPrivate }}
            - name: CORDUM_OIDC_ALLOW_PRIVATE
              value: "true"
            {{- end }}
            {{- if .Values.auth.oidc.allowHttp }}
            - name: CORDUM_OIDC_ALLOW_HTTP
              value: "true"
            {{- end }}
            {{- if .Values.auth.apiKeys }}
            - name: CORDUM_API_KEYS
              value: {{ .Values.auth.apiKeys | quote }}
            {{- end }}
            {{- if .Values.auth.apiKeysPath }}
            - name: CORDUM_API_KEYS_PATH
              value: {{ .Values.auth.apiKeysPath | quote }}
            {{- end }}
            {{- if .Values.auth.skipSecretValidation }}
            - name: CORDUM_SKIP_SECRET_VALIDATION
              value: "true"
            {{- end }}
            {{- if .Values.audit.export.type }}
            - name: CORDUM_AUDIT_EXPORT_TYPE
              value: {{ .Values.audit.export.type | quote }}
            {{- end }}
            {{- if .Values.audit.export.webhook.url }}
            - name: CORDUM_AUDIT_EXPORT_WEBHOOK_URL
              value: {{ .Values.audit.export.webhook.url | quote }}
            {{- end }}
            {{- if .Values.audit.export.webhook.secret }}
            - name: CORDUM_AUDIT_EXPORT_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-audit-webhook" (include "cordum.fullname" .) }}
                  key: secret
            {{- end }}
            {{- if .Values.audit.export.syslog.addr }}
            - name: CORDUM_AUDIT_EXPORT_SYSLOG_ADDR
              value: {{ .Values.audit.export.syslog.addr | quote }}
            {{- end }}
            {{- if .Values.audit.export.datadog.apiKey }}
            - name: CORDUM_AUDIT_EXPORT_DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-audit-datadog" (include "cordum.fullname" .) }}
                  key: apiKey
            {{- end }}
            {{- if .Values.audit.export.datadog.site }}
            - name: CORDUM_AUDIT_EXPORT_DD_SITE
              value: {{ .Values.audit.export.datadog.site | quote }}
            {{- end }}
            {{- if .Values.audit.export.datadog.tags }}
            - name: CORDUM_AUDIT_EXPORT_DD_TAGS
              value: {{ .Values.audit.export.datadog.tags | quote }}
            {{- end }}
            {{- if .Values.audit.export.cloudwatch.logGroup }}
            - name: CORDUM_AUDIT_EXPORT_CW_LOG_GROUP
              value: {{ .Values.audit.export.cloudwatch.logGroup | quote }}
            {{- end }}
            {{- if .Values.audit.export.cloudwatch.logStream }}
            - name: CORDUM_AUDIT_EXPORT_CW_LOG_STREAM
              value: {{ .Values.audit.export.cloudwatch.logStream | quote }}
            {{- end }}
            {{- if and (eq .Values.audit.export.type "cloudwatch") .Values.audit.export.cloudwatch.awsRegion }}
            - name: AWS_REGION
              value: {{ .Values.audit.export.cloudwatch.awsRegion | quote }}
            {{- end }}
            {{- if gt (int .Values.audit.bufferSize) 0 }}
            - name: CORDUM_AUDIT_BUFFER_SIZE
              value: {{ .Values.audit.bufferSize | quote }}
            {{- end }}
            {{- if gt (int .Values.audit.export.maxRetries) 0 }}
            - name: CORDUM_AUDIT_EXPORT_MAX_RETRIES
              value: {{ .Values.audit.export.maxRetries | quote }}
            {{- end }}
            {{- if .Values.audit.readSampleRate }}
            - name: CORDUM_AUDIT_READ_SAMPLE_RATE
              value: {{ .Values.audit.readSampleRate | quote }}
            {{- end }}
            {{- if .Values.audit.transport }}
            - name: AUDIT_TRANSPORT
              value: {{ .Values.audit.transport | quote }}
            {{- end }}
            {{- if .Values.gateway.env.metricsAddr }}
            - name: GATEWAY_METRICS_ADDR
              value: {{ .Values.gateway.env.metricsAddr | quote }}
            {{- end }}
            {{- if .Values.gateway.env.metricsPublic }}
            - name: GATEWAY_METRICS_PUBLIC
              value: "true"
            {{- end }}
            {{- if gt (int .Values.gateway.env.maxJsonBodyBytes) 0 }}
            - name: GATEWAY_MAX_JSON_BODY_BYTES
              value: {{ .Values.gateway.env.maxJsonBodyBytes | quote }}
            {{- end }}
            {{- if gt (int .Values.gateway.env.wsClientBufferSize) 0 }}
            - name: CORDUM_WS_CLIENT_BUFFER_SIZE
              value: {{ .Values.gateway.env.wsClientBufferSize | quote }}
            {{- end }}
            {{- if gt (int .Values.gateway.env.hstsMaxAge) 0 }}
            - name: CORDUM_HSTS_MAX_AGE
              value: {{ .Values.gateway.env.hstsMaxAge | quote }}
            {{- end }}
            {{- if .Values.gateway.env.httpReadTimeout }}
            - name: GATEWAY_HTTP_READ_TIMEOUT
              value: {{ .Values.gateway.env.httpReadTimeout | quote }}
            {{- end }}
            {{- if .Values.gateway.env.httpWriteTimeout }}
            - name: GATEWAY_HTTP_WRITE_TIMEOUT
              value: {{ .Values.gateway.env.httpWriteTimeout | quote }}
            {{- end }}
            {{- if or .Values.gateway.env.contextEngineAddr .Values.contextEngine.enabled }}
            - name: CONTEXT_ENGINE_ADDR
              value: {{ default (printf "%s-context-engine:%d" (include "cordum.fullname" .) (int .Values.contextEngine.service.port)) .Values.gateway.env.contextEngineAddr | quote }}
            {{- end }}
            {{- if .Values.gateway.env.idempotencyTTL }}
            - name: CORDUM_IDEMPOTENCY_TTL
              value: {{ .Values.gateway.env.idempotencyTTL | quote }}
            {{- end }}
            {{- if .Values.gateway.env.sessionTTL }}
            - name: CORDUM_SESSION_TTL
              value: {{ .Values.gateway.env.sessionTTL | quote }}
            {{- end }}
            {{- if gt (int .Values.gateway.env.artifactMaxBytes) 0 }}
            - name: ARTIFACT_MAX_BYTES
              value: {{ .Values.gateway.env.artifactMaxBytes | quote }}
            {{- end }}
            {{- if .Values.outputPolicy.enabled }}
            - name: OUTPUT_POLICY_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.outputPolicy.failMode }}
            - name: POLICY_CHECK_FAIL_MODE
              value: {{ .Values.outputPolicy.failMode | quote }}
            {{- end }}
            {{- if .Values.marketplace.allowHttp }}
            - name: CORDUM_MARKETPLACE_ALLOW_HTTP
              value: "true"
            {{- end }}
            {{- if .Values.marketplace.httpTimeout }}
            - name: CORDUM_MARKETPLACE_HTTP_TIMEOUT
              value: {{ .Values.marketplace.httpTimeout | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.gateway.service.grpcPort }}
            - name: http
              containerPort: {{ .Values.gateway.service.httpPort }}
            - name: metrics
              containerPort: {{ .Values.gateway.service.metricsPort }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.global.tls.enabled }}
            - name: server-tls
              mountPath: /etc/cordum/tls/server
              readOnly: true
            - name: client-tls
              mountPath: /etc/cordum/tls/client
              readOnly: true
            {{- end }}
            {{- if ne .Values.licensing.mode "community" }}
            - name: license
              mountPath: /etc/cordum/license.json
              subPath: license.json
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.global.tls.serverCertSecret }}
        - name: server-tls
          secret:
            secretName: {{ .Values.global.tls.serverCertSecret }}
        {{- end }}
        {{- if .Values.global.tls.clientCertSecret }}
        - name: client-tls
          secret:
            secretName: {{ .Values.global.tls.clientCertSecret }}
        {{- end }}
        {{- if ne .Values.licensing.mode "community" }}
        - name: license
          secret:
            secretName: {{ include "cordum.licenseSecretName" . }}
        {{- end }}
---
{{- end }}
{{- if .Values.workflowEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cordum.fullname" . }}-workflow-engine
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: workflow-engine
spec:
  replicas: {{ .Values.workflowEngine.replicaCount }}
  selector:
    matchLabels:
      {{- include "cordum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: workflow-engine
  template:
    metadata:
      labels:
        {{- include "cordum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: workflow-engine
    spec:
      serviceAccountName: {{ include "cordum.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: workflow-engine
          image: {{ printf "%s/%s:%s" .Values.global.image.registry .Values.workflowEngine.image.repository .Values.global.image.tag | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            {{- if .Values.global.production }}
            - name: CORDUM_ENV
              value: production
            {{- end }}
            - name: NATS_URL
              value: {{ include "cordum.natsUrl" . | quote }}
            - name: NATS_USE_JETSTREAM
              value: "1"
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.redisSecretName" . }}
                  key: {{ include "cordum.redisSecretKey" . }}
            {{- end }}
            - name: REDIS_URL
              value: {{ include "cordum.redisUrl" . | quote }}
            - name: WORKFLOW_ENGINE_HTTP_ADDR
              value: {{ printf ":%d" (int .Values.workflowEngine.service.port) | quote }}
            - name: WORKFLOW_ENGINE_SCAN_INTERVAL
              value: {{ .Values.workflowEngine.env.scanInterval | quote }}
            - name: WORKFLOW_ENGINE_RUN_SCAN_LIMIT
              value: {{ .Values.workflowEngine.env.runScanLimit | quote }}
            {{- if .Values.global.tls.enabled }}
            - name: NATS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: NATS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: NATS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            - name: REDIS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: REDIS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: REDIS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            {{- end }}
            {{- include "cordum.sharedEnv" . | nindent 12 }}
            {{- if gt (int .Values.workflowEngine.env.foreachMaxItems) 0 }}
            - name: WORKFLOW_FOREACH_MAX_ITEMS
              value: {{ .Values.workflowEngine.env.foreachMaxItems | quote }}
            {{- end }}
            {{- if gt (int .Values.workflowEngine.env.exprMaxLength) 0 }}
            - name: WORKFLOW_EXPR_MAX_LENGTH
              value: {{ .Values.workflowEngine.env.exprMaxLength | quote }}
            {{- end }}
            {{- if gt (int .Values.workflowEngine.env.exprTimeoutMs) 0 }}
            - name: WORKFLOW_EXPR_TIMEOUT_MS
              value: {{ .Values.workflowEngine.env.exprTimeoutMs | quote }}
            {{- end }}
            {{- if gt (int .Values.workflowEngine.env.exprMaxResultItems) 0 }}
            - name: WORKFLOW_EXPR_MAX_RESULT_ITEMS
              value: {{ .Values.workflowEngine.env.exprMaxResultItems | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.workflowEngine.service.port }}
          volumeMounts:
            {{- if .Values.global.tls.enabled }}
            - name: client-tls
              mountPath: /etc/cordum/tls/client
              readOnly: true
            {{- end }}
            {{- if ne .Values.licensing.mode "community" }}
            - name: license
              mountPath: /etc/cordum/license.json
              subPath: license.json
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.workflowEngine.resources | nindent 12 }}
      {{- if or .Values.global.tls.enabled (ne .Values.licensing.mode "community") }}
      volumes:
        {{- if and .Values.global.tls.enabled .Values.global.tls.clientCertSecret }}
        - name: client-tls
          secret:
            secretName: {{ .Values.global.tls.clientCertSecret }}
        {{- end }}
        {{- if ne .Values.licensing.mode "community" }}
        - name: license
          secret:
            secretName: {{ include "cordum.licenseSecretName" . }}
        {{- end }}
      {{- end }}
---
{{- end }}
{{- if .Values.contextEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cordum.fullname" . }}-context-engine
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: context-engine
spec:
  replicas: {{ .Values.contextEngine.replicaCount }}
  selector:
    matchLabels:
      {{- include "cordum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: context-engine
  template:
    metadata:
      labels:
        {{- include "cordum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: context-engine
    spec:
      serviceAccountName: {{ include "cordum.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: context-engine
          image: {{ printf "%s/%s:%s" .Values.global.image.registry .Values.contextEngine.image.repository .Values.global.image.tag | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            {{- if .Values.global.production }}
            - name: CORDUM_ENV
              value: production
            {{- end }}
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.redisSecretName" . }}
                  key: {{ include "cordum.redisSecretKey" . }}
            {{- end }}
            - name: REDIS_URL
              value: {{ include "cordum.redisUrl" . | quote }}
            - name: CONTEXT_ENGINE_ADDR
              value: {{ printf ":%d" (int .Values.contextEngine.service.port) | quote }}
            - name: CONTEXT_ENGINE_METRICS_ADDR
              value: {{ printf ":%d" (int (.Values.contextEngine.metricsPort | default 9094)) | quote }}
            {{- if .Values.global.tls.enabled }}
            - name: CONTEXT_ENGINE_TLS_CERT
              value: /etc/cordum/tls/server/tls.crt
            - name: CONTEXT_ENGINE_TLS_KEY
              value: /etc/cordum/tls/server/tls.key
            - name: REDIS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: REDIS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: REDIS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            {{- end }}
            {{- include "cordum.sharedEnv" . | nindent 12 }}
            {{- if gt (int .Values.contextEngine.env.maxEntryBytes) 0 }}
            - name: CONTEXT_ENGINE_MAX_ENTRY_BYTES
              value: {{ .Values.contextEngine.env.maxEntryBytes | quote }}
            {{- end }}
            {{- if gt (int .Values.contextEngine.env.maxChunkScan) 0 }}
            - name: CONTEXT_ENGINE_MAX_CHUNK_SCAN
              value: {{ .Values.contextEngine.env.maxChunkScan | quote }}
            {{- end }}
            {{- if .Values.contextEngine.metricsPublic }}
            - name: CONTEXT_ENGINE_METRICS_PUBLIC
              value: "true"
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.contextEngine.service.port }}
            - name: metrics
              containerPort: {{ .Values.contextEngine.metricsPort | default 9094 }}
          volumeMounts:
            {{- if .Values.global.tls.enabled }}
            - name: server-tls
              mountPath: /etc/cordum/tls/server
              readOnly: true
            - name: client-tls
              mountPath: /etc/cordum/tls/client
              readOnly: true
            {{- end }}
            {{- if ne .Values.licensing.mode "community" }}
            - name: license
              mountPath: /etc/cordum/license.json
              subPath: license.json
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.contextEngine.resources | nindent 12 }}
      {{- if or .Values.global.tls.enabled (ne .Values.licensing.mode "community") }}
      volumes:
        {{- if .Values.global.tls.serverCertSecret }}
        - name: server-tls
          secret:
            secretName: {{ .Values.global.tls.serverCertSecret }}
        {{- end }}
        {{- if .Values.global.tls.clientCertSecret }}
        - name: client-tls
          secret:
            secretName: {{ .Values.global.tls.clientCertSecret }}
        {{- end }}
        {{- if ne .Values.licensing.mode "community" }}
        - name: license
          secret:
            secretName: {{ include "cordum.licenseSecretName" . }}
        {{- end }}
      {{- end }}
{{- end }}
