{{- if .Values.nats.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cordum.fullname" . }}-nats
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.nats.persistence.size | quote }}
  {{- if .Values.nats.persistence.storageClassName }}
  storageClassName: {{ .Values.nats.persistence.storageClassName | quote }}
  {{- end }}
---
{{- end }}
{{- if .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cordum.fullname" . }}-redis
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size | quote }}
  {{- if .Values.redis.persistence.storageClassName }}
  storageClassName: {{ .Values.redis.persistence.storageClassName | quote }}
  {{- end }}
---
{{- end }}
{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cordum.fullname" . }}-nats
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cordum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "cordum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      serviceAccountName: {{ include "cordum.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nats
          image: {{ .Values.nats.image | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - -c
            - /etc/nats/nats.conf
          ports:
            - name: client
              containerPort: {{ .Values.nats.service.port }}
            - name: monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: nats-config
              mountPath: /etc/nats/nats.conf
              subPath: nats.conf
              readOnly: true
            - name: nats-data
              mountPath: /data
          {{- with .Values.nats.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
      volumes:
        - name: nats-config
          configMap:
            name: {{ include "cordum.fullname" . }}-nats-config
        - name: nats-data
          {{- if .Values.nats.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cordum.fullname" . }}-nats
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- end }}
{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cordum.fullname" . }}-redis
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cordum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "cordum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: {{ include "cordum.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- if .Values.redis.auth.enabled }}
          command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.redisSecretName" . }}
                  key: {{ include "cordum.redisSecretKey" . }}
          {{- end }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- with .Values.redis.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
      volumes:
        - name: redis-data
          {{- if .Values.redis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cordum.fullname" . }}-redis
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- end }}
{{- if .Values.safetyKernel.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cordum.fullname" . }}-safety-kernel
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: safety-kernel
spec:
  replicas: {{ .Values.safetyKernel.replicaCount }}
  selector:
    matchLabels:
      {{- include "cordum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: safety-kernel
  template:
    metadata:
      labels:
        {{- include "cordum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: safety-kernel
    spec:
      serviceAccountName: {{ include "cordum.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: safety-kernel
          image: {{ printf "%s/%s:%s" .Values.global.image.registry .Values.safetyKernel.image.repository .Values.global.image.tag | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            {{- if .Values.global.production }}
            - name: CORDUM_ENV
              value: production
            {{- end }}
            - name: SAFETY_KERNEL_ADDR
              value: {{ printf ":%d" (int .Values.safetyKernel.service.port) | quote }}
            - name: SAFETY_POLICY_PATH
              value: /etc/cordum/safety.yaml
            - name: NATS_URL
              value: {{ include "cordum.natsUrl" . | quote }}
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.redisSecretName" . }}
                  key: {{ include "cordum.redisSecretKey" . }}
            {{- end }}
            - name: REDIS_URL
              value: {{ include "cordum.redisUrl" . | quote }}
            {{- if .Values.global.tls.enabled }}
            - name: SAFETY_KERNEL_TLS_CERT
              value: /etc/cordum/tls/server/tls.crt
            - name: SAFETY_KERNEL_TLS_KEY
              value: /etc/cordum/tls/server/tls.key
            - name: NATS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: NATS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: NATS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            - name: REDIS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: REDIS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: REDIS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            {{- end }}
            {{- include "cordum.sharedEnv" . | nindent 12 }}
            {{- if .Values.safetyKernel.policy.reloadInterval }}
            - name: SAFETY_POLICY_RELOAD_INTERVAL
              value: {{ .Values.safetyKernel.policy.reloadInterval | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.policy.publicKey }}
            - name: SAFETY_POLICY_PUBLIC_KEY
              value: {{ .Values.safetyKernel.policy.publicKey | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.policy.signature }}
            - name: SAFETY_POLICY_SIGNATURE
              value: {{ .Values.safetyKernel.policy.signature | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.policy.signaturePath }}
            - name: SAFETY_POLICY_SIGNATURE_PATH
              value: {{ .Values.safetyKernel.policy.signaturePath | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.policy.signatureRequired }}
            - name: SAFETY_POLICY_SIGNATURE_REQUIRED
              value: "true"
            {{- end }}
            {{- if .Values.safetyKernel.policy.url }}
            - name: SAFETY_POLICY_URL
              value: {{ .Values.safetyKernel.policy.url | quote }}
            {{- end }}
            {{- if gt (len .Values.safetyKernel.policy.urlAllowlist) 0 }}
            - name: SAFETY_POLICY_URL_ALLOWLIST
              value: {{ join "," .Values.safetyKernel.policy.urlAllowlist | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.policy.configScope }}
            - name: SAFETY_POLICY_CONFIG_SCOPE
              value: {{ .Values.safetyKernel.policy.configScope | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.policy.configId }}
            - name: SAFETY_POLICY_CONFIG_ID
              value: {{ .Values.safetyKernel.policy.configId | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.policy.configKey }}
            - name: SAFETY_POLICY_CONFIG_KEY
              value: {{ .Values.safetyKernel.policy.configKey | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.policy.configDisable }}
            - name: SAFETY_POLICY_CONFIG_DISABLE
              value: "true"
            {{- end }}
            {{- if gt (int .Values.safetyKernel.policy.maxBytes) 0 }}
            - name: SAFETY_POLICY_MAX_BYTES
              value: {{ .Values.safetyKernel.policy.maxBytes | quote }}
            {{- end }}
            {{- if .Values.safetyKernel.cache.ttl }}
            - name: SAFETY_DECISION_CACHE_TTL
              value: {{ .Values.safetyKernel.cache.ttl | quote }}
            {{- end }}
            {{- if gt (int .Values.safetyKernel.cache.maxSize) 0 }}
            - name: SAFETY_DECISION_CACHE_MAX_SIZE
              value: {{ .Values.safetyKernel.cache.maxSize | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.safetyKernel.service.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/cordum/safety.yaml
              subPath: safety.yaml
            {{- if .Values.global.tls.enabled }}
            - name: server-tls
              mountPath: /etc/cordum/tls/server
              readOnly: true
            - name: client-tls
              mountPath: /etc/cordum/tls/client
              readOnly: true
            {{- end }}
            {{- if ne .Values.licensing.mode "community" }}
            - name: license
              mountPath: /etc/cordum/license.json
              subPath: license.json
              readOnly: true
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.safetyKernel.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "cordum.fullname" . }}-config
        {{- if .Values.global.tls.enabled }}
        {{- if .Values.global.tls.serverCertSecret }}
        - name: server-tls
          secret:
            secretName: {{ .Values.global.tls.serverCertSecret }}
        {{- end }}
        {{- if .Values.global.tls.clientCertSecret }}
        - name: client-tls
          secret:
            secretName: {{ .Values.global.tls.clientCertSecret }}
        {{- end }}
        {{- end }}
        {{- if ne .Values.licensing.mode "community" }}
        - name: license
          secret:
            secretName: {{ include "cordum.licenseSecretName" . }}
        {{- end }}
---
{{- end }}
{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cordum.fullname" . }}-scheduler
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
      {{- include "cordum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        {{- include "cordum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: {{ include "cordum.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scheduler
          image: {{ printf "%s/%s:%s" .Values.global.image.registry .Values.scheduler.image.repository .Values.global.image.tag | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            {{- if .Values.global.production }}
            - name: CORDUM_ENV
              value: production
            {{- end }}
            - name: NATS_URL
              value: {{ include "cordum.natsUrl" . | quote }}
            - name: NATS_USE_JETSTREAM
              value: "1"
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.redisSecretName" . }}
                  key: {{ include "cordum.redisSecretKey" . }}
            {{- end }}
            - name: REDIS_URL
              value: {{ include "cordum.redisUrl" . | quote }}
            - name: SAFETY_KERNEL_ADDR
              value: {{ include "cordum.safetyKernelAddr" . | quote }}
            - name: POOL_CONFIG_PATH
              value: /etc/cordum/pools.yaml
            - name: TIMEOUT_CONFIG_PATH
              value: /etc/cordum/timeouts.yaml
            - name: JOB_META_TTL
              value: {{ .Values.scheduler.env.jobMetaTTL | quote }}
            - name: WORKER_SNAPSHOT_INTERVAL
              value: {{ .Values.scheduler.env.workerSnapshotInterval | quote }}
            {{- if .Values.global.tls.enabled }}
            - name: NATS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: NATS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: NATS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            - name: REDIS_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: REDIS_TLS_CERT
              value: /etc/cordum/tls/client/tls.crt
            - name: REDIS_TLS_KEY
              value: /etc/cordum/tls/client/tls.key
            - name: SAFETY_KERNEL_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            - name: CONTEXT_ENGINE_TLS_CA
              value: /etc/cordum/tls/client/ca.crt
            {{- end }}
            {{- include "cordum.sharedEnv" . | nindent 12 }}
            {{- if .Values.scheduler.metrics.addr }}
            - name: SCHEDULER_METRICS_ADDR
              value: {{ .Values.scheduler.metrics.addr | quote }}
            {{- end }}
            {{- if .Values.scheduler.metrics.public }}
            - name: SCHEDULER_METRICS_PUBLIC
              value: "true"
            {{- end }}
            {{- if .Values.scheduler.env.configReloadInterval }}
            - name: SCHEDULER_CONFIG_RELOAD_INTERVAL
              value: {{ .Values.scheduler.env.configReloadInterval | quote }}
            {{- end }}
            {{- if .Values.scheduler.env.workerAttestation }}
            - name: WORKER_ATTESTATION
              value: {{ .Values.scheduler.env.workerAttestation | quote }}
            {{- end }}
            {{- if .Values.scheduler.env.workerReadinessRequired }}
            - name: WORKER_READINESS_REQUIRED
              value: "true"
            {{- end }}
            {{- if .Values.scheduler.env.workerReadinessTTL }}
            - name: WORKER_READINESS_TTL
              value: {{ .Values.scheduler.env.workerReadinessTTL | quote }}
            {{- end }}
            {{- if .Values.scheduler.env.schemaEnforcement }}
            - name: SCHEMA_ENFORCEMENT
              value: {{ .Values.scheduler.env.schemaEnforcement | quote }}
            {{- end }}
            {{- if gt (int .Values.scheduler.env.dlqMaxSize) 0 }}
            - name: SCHEDULER_DLQ_MAX_SIZE
              value: {{ .Values.scheduler.env.dlqMaxSize | quote }}
            {{- end }}
            {{- if .Values.outputPolicy.enabled }}
            - name: OUTPUT_POLICY_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.outputPolicy.failMode }}
            - name: OUTPUT_POLICY_FAIL_MODE
              value: {{ .Values.outputPolicy.failMode | quote }}
            - name: POLICY_CHECK_FAIL_MODE
              value: {{ .Values.outputPolicy.failMode | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.scheduler.service.metricsPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/cordum/pools.yaml
              subPath: pools.yaml
            - name: config
              mountPath: /etc/cordum/timeouts.yaml
              subPath: timeouts.yaml
            {{- if .Values.global.tls.enabled }}
            - name: client-tls
              mountPath: /etc/cordum/tls/client
              readOnly: true
            {{- end }}
            {{- if ne .Values.licensing.mode "community" }}
            - name: license
              mountPath: /etc/cordum/license.json
              subPath: license.json
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "cordum.fullname" . }}-config
        {{- if and .Values.global.tls.enabled .Values.global.tls.clientCertSecret }}
        - name: client-tls
          secret:
            secretName: {{ .Values.global.tls.clientCertSecret }}
        {{- end }}
        {{- if ne .Values.licensing.mode "community" }}
        - name: license
          secret:
            secretName: {{ include "cordum.licenseSecretName" . }}
        {{- end }}
---
{{- end }}
{{- if .Values.gateway.enabled }}
