{{- $backend := include "cordum.inferenceBackend" . }}
{{- if .Values.llmChat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cordum.fullname" . }}-llm-chat
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-chat
spec:
  replicas: {{ .Values.llmChat.replicas }}
  selector:
    matchLabels:
      {{- include "cordum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: llm-chat
  template:
    metadata:
      labels:
        {{- include "cordum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: llm-chat
    spec:
      serviceAccountName: {{ include "cordum.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: llm-chat
          image: "{{ .Values.llmChat.image.repository }}:{{ .Values.llmChat.image.tag | default .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.llmChat.image.pullPolicy | default .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.llmChat.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "cordum.fullname" . }}-llm-chat-config
          env:
            - name: CORDUM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.fullname" . }}-secrets
                  key: apiKey
            - name: CORDUM_GATEWAY_URL
              {{- $gatewayScheme := ternary "https" "http" .Values.global.tls.enabled }}
              value: {{ printf "%s://%s-api-gateway:%d" $gatewayScheme (include "cordum.fullname" .) (int .Values.gateway.service.httpPort) | quote }}
            - name: REDIS_URL
              value: {{ include "cordum.redisUrl" . | quote }}
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cordum.redisSecretName" . }}
                  key: {{ include "cordum.redisSecretKey" . }}
            {{- end }}
            - name: NATS_URL
              value: {{ include "cordum.natsUrl" . | quote }}
            - name: LLMCHAT_BASE_URL
              {{- if eq $backend "vllm-gpu" }}
              {{- if .Values.qwenInference.enabled }}
              value: "http://{{ include "cordum.fullname" . }}-qwen-inference:8000/v1"
              {{- else }}
              value: {{ required "llmChat.externalBaseUrl is required when inference.backend=vllm-gpu and qwenInference.enabled=false" .Values.llmChat.externalBaseUrl | quote }}
              {{- end }}
              {{- else if eq $backend "ollama-cpu" }}
              {{- if .Values.ollamaInference.enabled }}
              value: "http://{{ include "cordum.fullname" . }}-ollama-inference:{{ .Values.ollamaInference.service.port }}/v1"
              {{- else }}
              value: {{ required "llmChat.externalBaseUrl is required when inference.backend=ollama-cpu and ollamaInference.enabled=false" .Values.llmChat.externalBaseUrl | quote }}
              {{- end }}
              {{- else }}
              value: {{ required "llmChat.externalBaseUrl is required for external inference backends" .Values.llmChat.externalBaseUrl | quote }}
              {{- end }}
            - name: LLMCHAT_OPS_BACKEND
              value: {{ $backend | quote }}
            - name: LLMCHAT_MODEL
              {{- if eq $backend "vllm-gpu" }}
              value: {{ .Values.qwenInference.servedModelName | quote }}
              {{- else if eq $backend "ollama-cpu" }}
              value: {{ .Values.ollamaInference.servedModelName | quote }}
              {{- else }}
              value: {{ .Values.qwenInference.servedModelName | quote }}
              {{- end }}
            - name: LLMCHAT_PROVIDER
              value: "openai"
            {{- if .Values.global.tls.enabled }}
            - name: REDIS_TLS_CA
              value: /etc/cordum/tls/ca/ca.crt
            - name: NATS_TLS_CA
              value: /etc/cordum/tls/ca/ca.crt
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.llmChat.resources | nindent 12 }}
          volumeMounts:
            - name: llm-chat-config
              mountPath: /etc/cordum/llmchat/system-prompt.md
              subPath: system-prompt.md
              readOnly: true
            {{- if .Values.global.tls.enabled }}
            - name: tls-ca
              mountPath: /etc/cordum/tls/ca
              readOnly: true
            {{- end }}
      volumes:
        - name: llm-chat-config
          configMap:
            name: {{ include "cordum.fullname" . }}-llm-chat-config
        {{- if .Values.global.tls.enabled }}
        - name: tls-ca
          secret:
            secretName: {{ .Values.global.tls.clientCertSecret | default (printf "%s-tls-client" (include "cordum.fullname" .)) }}
        {{- end }}
{{- end }}
