{{- $backend := include "cordum.inferenceBackend" . }}
{{- if and (eq $backend "vllm-gpu") .Values.qwenInference.enabled }}
{{- $cpuMode := .Values.qwenInference.cpuMode.enabled }}
{{- if .Values.qwenInference.hfCache.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cordum.fullname" . }}-qwen-hf-cache
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: qwen-inference
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.qwenInference.hfCache.size | quote }}
  {{- if .Values.qwenInference.hfCache.storageClass }}
  storageClassName: {{ .Values.qwenInference.hfCache.storageClass | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cordum.fullname" . }}-qwen-inference
  labels:
    {{- include "cordum.labels" . | nindent 4 }}
    app.kubernetes.io/component: qwen-inference
spec:
  replicas: {{ .Values.qwenInference.replicas }}
  # Recreate not RollingUpdate — only one pod can hold the GPU at a
  # time on a single-GPU node, and FP8 weight load is 5+ minutes; a
  # rolling overlap would deadlock.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cordum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qwen-inference
  template:
    metadata:
      labels:
        {{- include "cordum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qwen-inference
    spec:
      {{- if not $cpuMode }}
      {{- with .Values.qwenInference.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qwenInference.gpu.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: qwen-inference
          # Pinned to vLLM v0.16.0@sha256:48011517 per task-991597a4.
          # Bump only via tools/scripts/vllm_pin_digest.sh + supply-chain CI.
          # Upgrade procedure: docs/llmchat/supply-chain.md.
          image: "{{ .Values.qwenInference.image.repository }}@{{ .Values.qwenInference.image.digest }}"
          imagePullPolicy: {{ default .Values.global.image.pullPolicy .Values.qwenInference.image.pullPolicy }}
          {{- if $cpuMode }}
          env:
            - name: VLLM_TARGET_DEVICE
              value: "cpu"
            - name: VLLM_CPU_KVCACHE_SPACE
              value: {{ .Values.qwenInference.cpuMode.kvCacheSpaceGB | quote }}
          {{- end }}
          # vLLM command for the opt-in GPU/CPU inference profiles.
          # Informational-only chat uses direct text completions only.
          # GPU mode must keep the -FP8 model suffix (BF16 won't fit H100 at
          # 128K context). CPU mode intentionally uses the AWQ model declared
          # under qwenInference.cpuMode.model for interim QA-only runs.
          args:
            - --model
            - {{ ternary .Values.qwenInference.cpuMode.model .Values.qwenInference.model $cpuMode | quote }}
            - --served-model-name
            - {{ .Values.qwenInference.servedModelName | quote }}
            - --max-model-len
            - {{ ternary .Values.qwenInference.cpuMode.maxModelLen .Values.qwenInference.maxModelLen $cpuMode | quote }}
            {{- if not $cpuMode }}
            - --kv-cache-dtype
            - {{ .Values.qwenInference.kvCacheDtype | quote }}
            {{- end }}
            {{- if .Values.qwenInference.enablePrefixCaching }}
            - --enable-prefix-caching
            {{- end }}
            # Do not log prompts / request bodies from chat traffic. vLLM is
            # pinned to v0.16.0 because that tag still accepts this
            # deprecated-but-supported request-log suppression flag; later
            # releases removed it. Synthetic security probes grep vLLM logs for
            # JWT/API-key shapes and must find zero hits.
            - --disable-log-requests
            {{- if not $cpuMode }}
            - --gpu-memory-utilization
            - {{ .Values.qwenInference.gpuMemoryUtilization | quote }}
            {{- end }}
            # In-cluster: bind to all interfaces so the llm-chat pod can
            # reach us via the Service's ClusterIP. The boundary is the
            # Service.type=ClusterIP (no external exposure), NOT the
            # container bind address. Compose uses 127.0.0.1 because
            # the boundary there is the host port mapping.
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - name: openai
              containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: openai
            # FP8 weights are ~30GB; cold load takes 3-5 minutes on
            # NVMe + CUDA warmup. CPU+AWQ first load can take 5-15 minutes.
            # initialDelaySeconds matches the compose start_period.
            initialDelaySeconds: {{ ternary 900 300 $cpuMode }}
            periodSeconds: 30
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: openai
            initialDelaySeconds: {{ ternary 1200 600 $cpuMode }}
            periodSeconds: 60
            failureThreshold: 3
          resources:
            {{- if $cpuMode }}
            {{- toYaml .Values.qwenInference.cpuMode.resources | nindent 12 }}
            {{- else }}
            limits:
              nvidia.com/gpu: {{ .Values.qwenInference.gpu.count }}
              {{- with .Values.qwenInference.resources.limits.memory }}
              memory: {{ . }}
              {{- end }}
            requests:
              {{- with .Values.qwenInference.resources.requests.memory }}
              memory: {{ . }}
              {{- end }}
            {{- end }}
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          {{- if .Values.qwenInference.hfCache.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cordum.fullname" . }}-qwen-hf-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
