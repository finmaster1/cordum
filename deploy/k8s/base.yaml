apiVersion: apps/v1
kind: Deployment
metadata:
  name: cordum-api-gateway
  namespace: cordum
spec:
  replicas: 1
  selector:
    matchLabels: {app: cordum-api-gateway}
  template:
    metadata:
      labels: {app: cordum-api-gateway}
    spec:
      serviceAccountName: cordum
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: validate-secrets
        image: alpine:3.19
        command: ["sh", "-c"]
        args:
        - |
          echo 'Validating required secrets...'
          fail=0
          [ -z "$API_KEY" ] && echo 'FATAL: API_KEY secret is empty' && fail=1
          [ -z "$REDIS_PASSWORD" ] && echo 'FATAL: REDIS_PASSWORD secret is empty' && fail=1
          [ $fail -eq 1 ] && echo 'Set required secrets before deploying. See docs/production/k8s-deployment.md' && exit 1
          echo 'All required secrets present.'
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: cordum-api-key
              key: API_KEY
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cordum-redis-secret
              key: REDIS_PASSWORD
      containers:
      - name: gateway
        image: cordum-api-gateway
        imagePullPolicy: Always
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        env:
        - name: NATS_URL
          value: nats://nats:4222
        - name: NATS_USE_JETSTREAM
          value: "1"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cordum-redis-secret
              key: REDIS_PASSWORD
        - name: REDIS_URL
          value: redis://:$(REDIS_PASSWORD)@redis:6379
        - name: SAFETY_KERNEL_ADDR
          value: cordum-safety-kernel:50051
        - name: TENANT_ID
          value: default
        - name: API_RATE_LIMIT_RPS
          value: "50"
        - name: API_RATE_LIMIT_BURST
          value: "100"
        - name: REDIS_DATA_TTL
          value: 24h
        - name: JOB_META_TTL
          value: 168h
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: cordum-api-key
              key: API_KEY
        - name: CORDUM_API_KEY
          valueFrom:
            secretKeyRef:
              name: cordum-api-key
              key: API_KEY
        - name: CORDUM_USER_AUTH_ENABLED
          value: "false"
        - name: CORDUM_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: cordum-admin-creds
              key: CORDUM_ADMIN_USERNAME
              optional: true
        - name: CORDUM_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cordum-admin-creds
              key: CORDUM_ADMIN_PASSWORD
              optional: true
        - name: CORDUM_ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: cordum-admin-creds
              key: CORDUM_ADMIN_EMAIL
              optional: true
        ports:
        - containerPort: 8080
        - containerPort: 8081
        - containerPort: 9092
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cordum-api-gateway
  namespace: cordum
spec:
  selector: {app: cordum-api-gateway}
  ports:
  - name: grpc
    port: 8080
    targetPort: 8080
  - name: http
    port: 8081
    targetPort: 8081
  - name: metrics
    port: 9092
    targetPort: 9092
