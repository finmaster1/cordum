            memory: 256Mi
          limits:
            cpu: 750m
            memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cordum-workflow-engine
  namespace: cordum
spec:
  selector: {app: cordum-workflow-engine}
  ports:
  - name: http
    port: 9093
    targetPort: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cordum-dashboard
  namespace: cordum
spec:
  replicas: 1
  selector:
    matchLabels: {app: cordum-dashboard}
  template:
    metadata:
      labels: {app: cordum-dashboard}
    spec:
      serviceAccountName: cordum
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: validate-secrets
        image: alpine:3.19
        command: ["sh", "-c"]
        args:
        - |
          echo 'Validating required secrets...'
          [ -z "$CORDUM_API_KEY" ] && echo 'FATAL: API_KEY secret is empty. See docs/production/k8s-deployment.md' && exit 1
          echo 'All required secrets present.'
        env:
        - name: CORDUM_API_KEY
          valueFrom:
            secretKeyRef:
              name: cordum-api-key
              key: API_KEY
      - name: copy-static
        image: cordum-dashboard
        command: ["sh", "-c", "cp -r /usr/share/nginx/html/. /html/"]
        volumeMounts:
        - name: html
          mountPath: /html
      containers:
      - name: dashboard
        image: cordum-dashboard
        imagePullPolicy: Always
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        env:
        - name: CORDUM_API_KEY
          valueFrom:
            secretKeyRef:
              name: cordum-api-key
              key: API_KEY
        - name: CORDUM_TENANT_ID
          value: default
        - name: CORDUM_API_UPSTREAM_SCHEME
          value: http
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        - name: tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: html
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cordum-dashboard
  namespace: cordum
spec:
  selector: {app: cordum-dashboard}
  ports:
  - name: http
    port: 8080
    targetPort: 8080

