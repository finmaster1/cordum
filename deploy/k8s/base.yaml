# Core stack manifest. For enterprise gateway, apply the overlay from
# cordum-enterprise/deploy/k8s/enterprise-gateway.yaml after this file.
# NOTE: Cordum service images are intentionally untagged here. Image tags are
# set via kustomize overlays (see production/kustomization.yaml).
apiVersion: v1
kind: Namespace
metadata:
  name: cordum
---
# ServiceAccount for all Cordum workloads. automountServiceAccountToken is
# disabled because no Cordum service needs Kubernetes API access.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cordum
  namespace: cordum
automountServiceAccountToken: false
---
# ResourceQuota prevents runaway pods from consuming unbounded cluster
# resources. Values accommodate production HPA maxReplicas (36 pods) plus
# headroom for NATS, Redis, and jobs. Adjust for larger deployments.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cordum-quota
  namespace: cordum
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
---
# LimitRange assigns default resource requests/limits to containers that
# don't specify them, preventing unbounded resource consumption.
apiVersion: v1
kind: LimitRange
metadata:
  name: cordum-limits
  namespace: cordum
spec:
  limits:
  - default:
      cpu: 500m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cordum-pools
  namespace: cordum
data:
  pools.yaml: |
    topics:
      job.default: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cordum-timeouts
  namespace: cordum
data:
  timeouts.yaml: |
    workflows: {}
    topics: {}
    reconciler:
      dispatch_timeout_seconds: 300
      # Per-topic overrides available via topics.<topic>.running_timeout_seconds
      running_timeout_seconds: 900
      scan_interval_seconds: 30
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cordum-nats-config
  namespace: cordum
data:
  nats.conf: |
    port: 4222
    jetstream {
      store_dir: /data/jetstream
      sync_interval: "1s"
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cordum-safety
  namespace: cordum
data:
  safety.yaml: |
    # Fail-closed: unmatched jobs are denied.
    default_decision: deny

    rules:
      # Fraud detection jobs require human approval before execution
      - id: fraud-review-required
        match:
          topics:
            - job.fraud-detection.process
        decision: require_approval
        reason: "Fraud detection results must be reviewed by a human before action."

      # Risk assessment agents require approval — high-impact decisions
      - id: risk-assessment-approval
        match:
          topics:
            - job.risk-agents.process
        decision: require_approval
        reason: "Risk assessment outcomes require human sign-off."

      # Compliance jobs require approval — regulatory oversight
      - id: compliance-approval
        match:
          topics:
            - job.compliance-agents.process
        decision: require_approval
        reason: "Compliance checks require human verification before proceeding."

      # Bank executors (wire transfers, account changes) — always require approval
      - id: bank-executor-approval
        match:
          topics:
            - job.bank-executors.process
        decision: require_approval
        reason: "Financial execution actions require explicit human authorization."

      # Underwriting requires approval — loan decisions are high-stakes
      - id: underwriting-approval
        match:
          topics:
            - job.underwriting-agents.process
        decision: require_approval
        reason: "Underwriting decisions require human review before commitment."

      # Low-risk topics are auto-allowed
      - id: validators-auto-allow
        match:
          topics:
            - job.bank-validators.process
            - job.notification-service.process
            - job.valuation-agents.process
        decision: allow
        reason: "Read-only validation and notification jobs are auto-approved."

    output_policy:
      enabled: true
      fail_mode: closed

    output_rules:
      - id: output-secret-leak
        description: "Quarantine outputs that contain likely credential or key material."
        match:
          topics:
            - "job.*"
          scanners:
            - "secret"
        decision: quarantine
        severity: critical
        reason: "Potential secret material detected in output."

      - id: output-pii-leak
        description: "PII detection rule (disabled by default to avoid false positives)."
        enabled: true
        match:
          topics:
            - "job.*"
          scanners:
            - "pii"
        decision: quarantine
        severity: high
        reason: "Potential PII detected in output."

      - id: output-injection-detected
        description: "Quarantine outputs containing likely injection payload fragments."
        match:
          topics:
            - "job.*"
          scanners:
            - "injection"
        decision: quarantine
        severity: high
        reason: "Potential injection payload detected in output."

      - id: output-size-limit
        description: "Quarantine oversized outputs beyond the default 10 MiB threshold."
        match:
          topics:
            - "job.*"
          output_size_gt: 10485760
        decision: quarantine
        severity: medium
        reason: "Output exceeds configured size threshold."

      - id: output-error-secret-leak
        description: "Quarantine failed job outputs when secret indicators are present."
        match:
          topics:
            - "job.*"
          has_error: true
          scanners:
            - "secret"
        decision: quarantine
        severity: high
        reason: "Secrets detected in failed job output context."

    default_tenant: default
    tenants:
      default:
        allow_topics:
          - "job.*"
        deny_topics:
          - "sys.*"
        allowed_repo_hosts: []
        denied_repo_hosts: []
        mcp:
          allow_servers: []
          deny_servers: []
          allow_tools: []
          deny_tools: []
          allow_resources: []
          deny_resources: []
          allow_actions: []
          deny_actions: []
---
apiVersion: v1
kind: Secret
metadata:
  name: cordum-api-key
  namespace: cordum
type: Opaque
stringData:
  # REQUIRED: set to a strong API key before applying.
  API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: cordum-admin-creds
  namespace: cordum
type: Opaque
stringData:
  # Admin credentials for user authentication.
  # Set these before applying if CORDUM_USER_AUTH_ENABLED=true.
  CORDUM_ADMIN_USERNAME: "admin"
  CORDUM_ADMIN_PASSWORD: ""
  CORDUM_ADMIN_EMAIL: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: cordum-redis-secret
  namespace: cordum
type: Opaque
stringData:
  # REQUIRED: set to a strong Redis password before applying.
  REDIS_PASSWORD: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: cordum
spec:
  replicas: 1
  selector:
    matchLabels: {app: nats}
  template:
    metadata:
      labels: {app: nats}
    spec:
      serviceAccountName: cordum
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nats
        image: nats:2.10
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        args: ["-c", "/etc/nats/nats.conf"]
        ports:
        - name: client
          containerPort: 4222
        volumeMounts:
        - name: nats-config
          mountPath: /etc/nats/nats.conf
          subPath: nats.conf
          readOnly: true
        - name: nats-data
          mountPath: /data
        livenessProbe:
          tcpSocket: {port: 4222}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          tcpSocket: {port: 4222}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: nats-config
        configMap:
          name: cordum-nats-config
      - name: nats-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: cordum
spec:
  selector: {app: nats}
  ports:
  - name: client
    port: 4222
    targetPort: 4222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cordum
spec:
  replicas: 1
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis}
    spec:
      serviceAccountName: cordum
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: validate-secrets
        image: alpine:3.19
        command: ["sh", "-c"]
        args:
        - |
          echo 'Validating required secrets...'
          [ -z "$REDIS_PASSWORD" ] && echo 'FATAL: REDIS_PASSWORD secret is empty. See docs/production/k8s-deployment.md' && exit 1
          echo 'All required secrets present.'
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cordum-redis-secret
              key: REDIS_PASSWORD
      containers:
      - name: redis
        image: redis:7
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        command: ["redis-server"]
        args: ["--appendonly", "yes", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cordum-redis-secret
              key: REDIS_PASSWORD
        ports:
        - containerPort: 6379
        livenessProbe:
          tcpSocket: {port: 6379}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          tcpSocket: {port: 6379}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: cordum
spec:
  selector: {app: redis}
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
---
