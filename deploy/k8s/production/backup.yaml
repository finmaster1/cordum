apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cordum-backups
  namespace: cordum
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cordum-redis-backup
  namespace: cordum
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: redis-backup
            image: redis:7
            command:
            - sh
            - -c
            - |
              set -e
              ts=$(date -u +%Y%m%dT%H%M%SZ)
              TLS_ARGS="--tls --cacert /etc/cordum/tls/client/ca.crt --cert /etc/cordum/tls/client/tls.crt --key /etc/cordum/tls/client/tls.key"
              AUTH_ARGS="-a $REDIS_PASSWORD"
              backed_up=0
              failed=0
              # Iterate all 6 Redis cluster nodes, back up only primaries
              for i in 0 1 2 3 4 5; do
                host="cordum-redis-${i}.cordum-redis.cordum.svc"
                echo "Checking node ${i} (${host})..."
                role=$(redis-cli $TLS_ARGS $AUTH_ARGS -h "$host" -p 6379 INFO replication 2>/dev/null | grep "^role:" | tr -d '\r' | cut -d: -f2 || true)
                if [ "$role" != "master" ]; then
                  echo "  Node ${i} is ${role:-unreachable}, skipping."
                  continue
                fi
                echo "  Node ${i} is primary — backing up..."
                if redis-cli $TLS_ARGS $AUTH_ARGS -h "$host" -p 6379 --rdb "/backup/redis-${ts}-node${i}.rdb"; then
                  echo "  Backup of node ${i} succeeded."
                  backed_up=$((backed_up + 1))
                else
                  echo "  WARNING: Backup of node ${i} failed."
                  failed=$((failed + 1))
                fi
              done
              echo "Backup complete: ${backed_up} primaries backed up, ${failed} failed."
              if [ "$backed_up" -eq 0 ]; then
                echo "FATAL: No primaries were backed up."
                exit 1
              fi
              if [ "$failed" -gt 0 ]; then
                echo "WARNING: Some primaries failed to back up (partial backup)."
              fi
            env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cordum-redis-secret
                  key: REDIS_PASSWORD
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            volumeMounts:
            - name: backup
              mountPath: /backup
            - name: client-tls
              mountPath: /etc/cordum/tls/client
              readOnly: true
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: cordum-backups
          - name: client-tls
            secret:
              secretName: cordum-client-tls
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cordum-nats-backup
  namespace: cordum
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: nats-backup
            image: natsio/nats-box:0.15.0
            command:
            - sh
            - -c
            - |
              set -e
              ts=$(date -u +%Y%m%dT%H%M%SZ)
              mkdir -p /backup/nats-${ts}
              nats --server tls://cordum-nats:4222 \
                --tlscacert /etc/cordum/tls/client/ca.crt \
                --tlscert /etc/cordum/tls/client/tls.crt \
                --tlskey /etc/cordum/tls/client/tls.key \
                stream snapshot CORDUM_SYS /backup/nats-${ts}/CORDUM_SYS.snapshot
              nats --server tls://cordum-nats:4222 \
                --tlscacert /etc/cordum/tls/client/ca.crt \
                --tlscert /etc/cordum/tls/client/tls.crt \
                --tlskey /etc/cordum/tls/client/tls.key \
                stream snapshot CORDUM_JOBS /backup/nats-${ts}/CORDUM_JOBS.snapshot
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            volumeMounts:
            - name: backup
              mountPath: /backup
            - name: client-tls
              mountPath: /etc/cordum/tls/client
              readOnly: true
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: cordum-backups
          - name: client-tls
            secret:
              secretName: cordum-client-tls
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cordum-backup-retention
  namespace: cordum
spec:
  schedule: "30 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: busybox:1.36
            command:
            - sh
            - -c
            - |
              set -e
              echo "Cleaning Redis backups older than 7 days..."
              find /backup -name '*.rdb' -mtime +7 -delete -print
              echo "Cleaning NATS snapshot dirs older than 7 days..."
              find /backup -maxdepth 1 -name 'nats-*' -type d -mtime +7 -exec rm -rf {} + -print
              echo "Retention cleanup complete."
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            volumeMounts:
            - name: backup
              mountPath: /backup
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: cordum-backups
