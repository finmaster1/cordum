apiVersion: apps/v1
kind: Deployment
metadata:
  name: cordum-context-engine
  namespace: cordum
spec:
  template:
    spec:
      containers:
      - name: context-engine
        env:
        - name: CORDUM_LICENSE_TOKEN
          valueFrom:
            secretKeyRef:
              name: cordum-license
              key: license.json
        volumeMounts:
        - name: cordum-license
          mountPath: /etc/cordum/license.json
          subPath: license.json
          readOnly: true
      volumes:
      - name: cordum-license
        secret:
          secretName: cordum-license
---
