---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cordum-platform
  namespace: cordum
spec:
  groups:
  - name: cordum.platform
    rules:
    - alert: CordumGatewayDown
      expr: sum by (service) (up{namespace="cordum", service="cordum-api-gateway"}) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Cordum API gateway is down
        description: No targets for cordum-api-gateway have been reachable for 5m.
    - alert: CordumSchedulerDown
      expr: sum by (service) (up{namespace="cordum", service="cordum-scheduler"}) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Cordum scheduler is down
        description: No targets for cordum-scheduler have been reachable for 5m.
    - alert: CordumNATSDown
      expr: sum by (service) (up{namespace="cordum", service="cordum-nats-monitor"}) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Cordum NATS is down
        description: No NATS monitoring targets have been reachable for 5m.
    - alert: CordumRedisDown
      expr: sum by (service) (up{namespace="cordum", service="cordum-redis"}) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Cordum Redis is down
        description: No Redis exporter targets have been reachable for 5m.
    - alert: CordumWorkflowEngineDown
      expr: sum by (service) (up{namespace="cordum", service="cordum-workflow-engine"}) == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: Cordum workflow engine is down
        description: No targets for cordum-workflow-engine have been reachable for 2m.
    - alert: CordumSafetyKernelDown
      expr: sum by (service) (up{namespace="cordum", service="cordum-safety-kernel"}) == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Cordum safety kernel is down
        description: No targets for cordum-safety-kernel have been reachable for 1m.
    - alert: CordumContextEngineDown
      expr: sum by (service) (up{namespace="cordum", service="cordum-context-engine"}) == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Cordum context engine is down
        description: No targets for cordum-context-engine have been reachable for 1m. Memory and context retrieval will fail.
