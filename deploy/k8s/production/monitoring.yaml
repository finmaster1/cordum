apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cordum-api-gateway
  namespace: cordum
spec:
  namespaceSelector:
    matchNames:
    - cordum
  selector:
    matchLabels:
      app: cordum-api-gateway
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
---
apiVersion: monitoring.coreos.com/v1
