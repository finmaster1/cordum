apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cordum-allow-nats
  namespace: cordum
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nats
    - podSelector:
        matchLabels:
          app: cordum-api-gateway
    - podSelector:
        matchLabels:
          app: cordum-scheduler
    - podSelector:
        matchLabels:
          app: cordum-workflow-engine
    - podSelector:
        matchLabels:
          app: cordum-safety-kernel
    - podSelector:
        matchLabels:
          app: cordum-context-engine
    ports:
    - protocol: TCP
      port: 4222
    - protocol: TCP
      port: 6222
    - protocol: TCP
      port: 8222
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cordum-allow-redis
  namespace: cordum
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: redis
    - podSelector:
        matchLabels:
          app: cordum-api-gateway
    - podSelector:
        matchLabels:
          app: cordum-scheduler
    - podSelector:
        matchLabels:
          app: cordum-workflow-engine
    - podSelector:
        matchLabels:
          app: cordum-context-engine
    - podSelector:
        matchLabels:
          app: cordum-safety-kernel
    ports:
    - protocol: TCP
      port: 6379
    # Redis cluster bus (gossip/replication)
    - protocol: TCP
      port: 16379
---
# Egress policies — restrict outbound traffic per service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cordum-egress-api-gateway
  namespace: cordum
spec:
  podSelector:
    matchLabels:
      app: cordum-api-gateway
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: nats
    ports:
    - protocol: TCP
      port: 4222
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - podSelector:
        matchLabels:
          app: cordum-safety-kernel
    ports:
    - protocol: TCP
      port: 50051
  # DNS for service discovery
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
